function buildOneThingCard() {
  // Pick a stable "one thing" from Now tier for today
  // Seed by date so it stays the same all day
  const nowTasks = state.tasks.filter(t => !t.done && t.tier === 'now');
  if (nowTasks.length === 0) return null;

  const seed = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
  const seedNum = seed.split('-').join('').split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const idx = seedNum % nowTasks.length;
  const pick = nowTasks[idx];

  const card = document.createElement('div');
  card.className = 'one-thing-card span-6';
  const modeCrumb = pick.mode ? (DEFAULT_MODES.find(m => m.id === pick.mode) || {}) : null;
  const modeLabel = modeCrumb && modeCrumb.glyph ? `${modeCrumb.glyph} ${modeCrumb.name}` : 'unassigned';

  card.innerHTML = `
    <div class="one-thing-inner">
      <span class="card-label">★ The one thing</span>
      <div class="one-thing-label">If you only do one</div>
      <div class="one-thing-text">${escapeHtml(pick.text)}</div>
      <div class="one-thing-mode">${escapeHtml(modeLabel)}</div>
      <div class="one-thing-actions">
        <button class="pill-btn ink" data-act="done">Mark done</button>
        <button class="pill-btn" data-act="another">Pick another</button>
      </div>
    </div>
  `;

  card.querySelector('[data-act="done"]').onclick = (e) => {
    // 4d: burst from the Mark done button
    if (!pick.done) spawnTickBurst(e.currentTarget);
    toggleDone(pick.id);
    toast('done.');
    render();
  };
  card.querySelector('[data-act="another"]').onclick = () => {
    // Shuffle the seed so a different task is picked, stored just in memory
    window._oneThingSalt = (window._oneThingSalt || 0) + 1;
    pickAnotherOneThing();
  };

  // Respect one-time salt if user has pressed "Pick another"
  if (window._oneThingSalt) {
    const saltedIdx = (seedNum + window._oneThingSalt) % nowTasks.length;
    const newPick = nowTasks[saltedIdx];
    card.querySelector('.one-thing-text').textContent = newPick.text;
    const newModeCrumb = newPick.mode ? (DEFAULT_MODES.find(m => m.id === newPick.mode) || {}) : null;
    const newModeLabel = newModeCrumb && newModeCrumb.glyph ? `${newModeCrumb.glyph} ${newModeCrumb.name}` : 'unassigned';
    card.querySelector('.one-thing-mode').textContent = newModeLabel;
    card.querySelector('[data-act="done"]').onclick = (e) => {
      // 4d: burst from the Mark done button
      if (!newPick.done) spawnTickBurst(e.currentTarget);
      toggleDone(newPick.id);
      toast('done.');
      render();
    };
  }

  return card;
}

function pickAnotherOneThing() {
  // Trigger re-render; the salt counter is respected in buildOneThingCard
  render();
}

/* ============================================================
   RENDER: INBOX VIEW (2b - triage focused + list)
   ============================================================ */
function renderInboxView() {
  const root = document.createElement('div');
  const untriaged = inboxTasks();
  const noMode = noModeTasks();
  const filter = state.inboxFilter || 'untriaged';
  const inbox = filter === 'no-mode' ? noMode : untriaged;

  // 4c: If the active filter is empty but the other has items, auto-flip to it.
  if (filter === 'no-mode' && noMode.length === 0 && untriaged.length > 0) {
    state.inboxFilter = 'untriaged';
    return renderInboxView();
  }

  // True empty state - both pools empty
  if (untriaged.length === 0 && noMode.length === 0) {
    const masthead = document.createElement('div');
    masthead.className = 'mode-masthead';
    masthead.innerHTML = `
      <div class="mode-masthead-inner">
        <div class="card-label" style="margin-bottom:14px;">✦ Inbox</div>
        <h1>Inbox: <em>empty.</em></h1>
        <p>Suspicious, but we'll take it.</p>
      </div>
    `;
    root.appendChild(masthead);

    const card = document.createElement('div');
    card.className = 'candy';
    card.innerHTML = `
      <div class="empty" style="padding:40px 20px;">
        Nothing unsorted. <span class="sparkle">✦</span> Everything's where it should be, or you haven't started yet. Both acceptable.
      </div>
    `;
    root.appendChild(card);
    return root;
  }

  // Masthead with filter pills + style toggle
  const masthead = document.createElement('div');
  masthead.className = 'mode-masthead';
  const totalToSort = untriaged.length + noMode.length;
  masthead.innerHTML = `
    <div class="mode-masthead-inner">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;">
        <div>
          <div class="card-label" style="margin-bottom:10px;">✦ Inbox · ${totalToSort} to sort</div>
          <h1>The <em>Inbox.</em></h1>
          <p>Unsorted captures. Pick a tier. No pressure. Stop whenever, the rest will wait.</p>
        </div>
        <div class="triage-style-toggle" style="margin-top:6px;">
          <button class="${state.triageStyle === 'focused' ? 'active' : ''}" data-style="focused">Focused</button>
          <button class="${state.triageStyle === 'list' ? 'active' : ''}" data-style="list">List</button>
        </div>
      </div>
      <div class="inbox-filter-row" style="margin-top:14px;">
        <button class="inbox-filter-pill ${filter === 'untriaged' ? 'active' : ''}" data-filter="untriaged">
          Untriaged${untriaged.length ? ' <span class="inbox-filter-count">' + untriaged.length + '</span>' : ''}
        </button>
        ${noMode.length ? `
          <button class="inbox-filter-pill ${filter === 'no-mode' ? 'active' : ''}" data-filter="no-mode">
            No mode <span class="inbox-filter-count">${noMode.length}</span>
          </button>
        ` : ''}
      </div>
    </div>
  `;
  masthead.querySelectorAll('.triage-style-toggle button').forEach(b => {
    b.onclick = () => {
      state.triageStyle = b.dataset.style;
      state.triageIndex = 0;
      saveState();
      render();
    };
  });
  masthead.querySelectorAll('[data-filter]').forEach(b => {
    b.onclick = () => {
      state.inboxFilter = b.dataset.filter;
      state.triageIndex = 0;
      saveState();
      render();
    };
  });
  root.appendChild(masthead);

  if (inbox.length === 0) {
    const card = document.createElement('div');
    card.className = 'candy';
    card.innerHTML = `
      <div class="empty" style="padding:40px 20px;">
        Nothing in this view. <span class="sparkle">✦</span> Switch filters above.
      </div>
    `;
    root.appendChild(card);
    return root;
  }

  if (state.triageStyle === 'focused') {
    root.appendChild(renderTriageFocused(inbox));
  } else {
    root.appendChild(renderTriageList(inbox));
  }

  return root;
}

function renderTriageFocused(inbox) {
  const wrap = document.createElement('div');
  wrap.className = 'triage-shell';

  // Clamp index
  if (state.triageIndex >= inbox.length) state.triageIndex = 0;
  if (state.triageIndex < 0) state.triageIndex = 0;
  const idx = state.triageIndex;
  const task = inbox[idx];
  const total = inbox.length;
  const pct = Math.round((idx / total) * 100);

  // 4c: Staged state. In auto-commit mode (default), staged mirrors task and we commit
  // immediately on each click. In require-Submit mode, we hold edits in staged and only
  // commit on Submit.
  const requireSubmit = !!state.settings.triageRequireSubmit;
  const staged = {
    tier: null, // only set in require-Submit mode (auto-commit goes straight to update)
    mode: task.mode || null,
    subId: task.subId || null,
    memberId: task.memberId || null
  };

  // Progress
  const progress = document.createElement('div');
  progress.className = 'triage-progress';
  progress.innerHTML = `
    <span>Item ${idx + 1} of ${total}</span>
    <div class="triage-progress-bar"><div class="triage-progress-fill" style="width:${pct}%"></div></div>
    <span>${pct}%</span>
  `;
  wrap.appendChild(progress);

  // Card
  const createdDate = new Date(task.createdAt);
  const createdLabel = createdDate.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
  const timeLabel = formatTimeDisplay(createdDate);

  const card = document.createElement('div');
  card.className = 'triage-card';
  card.innerHTML = `
    <div class="triage-card-inner">
      <div class="triage-card-meta">Captured ${escapeHtml(createdLabel)} · ${escapeHtml(timeLabel)}</div>
      <div class="triage-card-body">${escapeHtml(task.text)}</div>
    </div>
  `;
  wrap.appendChild(card);

  // Tier buttons
  const actions = document.createElement('div');
  actions.className = 'triage-actions-grid';
  actions.innerHTML = `
    <button class="triage-big-btn now" data-tier="now">Now<span class="sub">This week</span></button>
    <button class="triage-big-btn soon" data-tier="soon">Soon<span class="sub">On the radar</span></button>
    <button class="triage-big-btn someday" data-tier="someday">Someday<span class="sub">No pressure</span></button>
    <button class="triage-big-btn bin" data-tier="bin">Bin<span class="sub">Never mind</span></button>
  `;
  wrap.appendChild(actions);

  // Mode row + (cascading) sub-entity row + (cascading) member row
  const modeRow = document.createElement('div');
  modeRow.className = 'triage-mode-row';
  const modeOptsHTML = [
    `<button class="triage-mode-opt ${!staged.mode ? 'active' : ''}" data-mode="">Unassigned</button>`,
    ...TASKABLE_MODES.map(mid => {
      const m = DEFAULT_MODES.find(x => x.id === mid);
      const colour = modeColour(mid);
      const darkClass = needsDarkText(colour) ? ' dark-text' : '';
      const styleAttr = `--sub-colour: ${colourCssValue(colour)};`;
      return `<button class="triage-mode-opt${staged.mode === mid ? ' active' : ''}${darkClass}" style="${styleAttr}" data-mode="${mid}"><span>${m.glyph}</span>${escapeHtml(m.name)}</button>`;
    })
  ].join('');
  modeRow.innerHTML = `
    <div class="triage-mode-row-label">Assign a mode (optional)</div>
    <div class="triage-mode-options" id="triageModeOpts">${modeOptsHTML}</div>
    <div id="triageSubBlock" style="display:none; margin-top:14px;">
      <div class="triage-mode-row-label" id="triageSubLabel">Sub-entity</div>
      <div class="triage-mode-options" id="triageSubOpts"></div>
    </div>
    <div id="triageMemberBlock" style="display:none; margin-top:14px;">
      <div class="triage-mode-row-label" id="triageMemberLabel">Who</div>
      <div class="triage-mode-options" id="triageMemberOpts"></div>
    </div>
  `;
  wrap.appendChild(modeRow);

  // 4c: Submit row (only when require-Submit is on)
  let submitBtn = null;
  if (requireSubmit) {
    const submitRow = document.createElement('div');
    submitRow.className = 'triage-submit-row';
    submitRow.innerHTML = `<button class="triage-submit-btn" id="triageSubmit" disabled>Submit ✦ pick a tier</button>`;
    wrap.appendChild(submitRow);
    submitBtn = submitRow.querySelector('#triageSubmit');
  }

  // Nav
  const nav = document.createElement('div');
  nav.className = 'triage-nav';
  nav.innerHTML = `
    <div class="triage-nav-left">
      <button class="pill-btn" data-nav="prev"${idx === 0 ? ' disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>← Previous</button>
    </div>
    <div class="triage-nav-right">
      <button class="pill-btn" data-nav="skip"${idx >= total - 1 ? ' disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>Skip</button>
      <button class="pill-btn" data-nav="next"${idx >= total - 1 ? ' disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>Next →</button>
    </div>
  `;
  wrap.appendChild(nav);

  // ---- Cascading helpers ----
  function renderTriageSubBlock() {
    const block = modeRow.querySelector('#triageSubBlock');
    const label = modeRow.querySelector('#triageSubLabel');
    const opts = modeRow.querySelector('#triageSubOpts');
    if (!staged.mode || !MODES_WITH_SUBS.includes(staged.mode)) {
      block.style.display = 'none';
      renderTriageMemberBlock();
      return;
    }
    const subs = getSubEntities(staged.mode);
    label.textContent = subEntityGroupLabel(staged.mode) + ' (optional)';
    if (!subs.length) {
      block.style.display = 'block';
      opts.innerHTML = `<div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--mute);">No ${escapeHtml(subEntityLabel(staged.mode))}s yet. Add one from the ${escapeHtml(DEFAULT_MODES.find(m => m.id === staged.mode).name)} view.</div>`;
      renderTriageMemberBlock();
      return;
    }
    block.style.display = 'block';
    let html = `<button class="triage-mode-opt ${!staged.subId ? 'active' : ''}" data-sub="">Unassigned</button>`;
    subs.forEach(s => {
      const colour = subColour(staged.mode, s.id);
      const darkClass = needsDarkText(colour) ? ' dark-text' : '';
      const styleAttr = `--sub-colour: ${colourCssValue(colour)};`;
      html += `<button class="triage-mode-opt${staged.subId === s.id ? ' active' : ''}${darkClass}" style="${styleAttr}" data-sub="${s.id}">${escapeHtml(s.name)}</button>`;
    });
    opts.innerHTML = html;
    opts.querySelectorAll('[data-sub]').forEach(b => {
      b.onclick = () => {
        staged.subId = b.dataset.sub || null;
        staged.memberId = null;
        if (!requireSubmit) {
          updateTask(task.id, { subId: staged.subId, memberId: null });
        }
        opts.querySelectorAll('[data-sub]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        renderTriageMemberBlock();
      };
    });
    renderTriageMemberBlock();
  }

  function renderTriageMemberBlock() {
    const block = modeRow.querySelector('#triageMemberBlock');
    const label = modeRow.querySelector('#triageMemberLabel');
    const opts = modeRow.querySelector('#triageMemberOpts');
    if (staged.mode !== 'family' || !staged.subId) {
      block.style.display = 'none';
      return;
    }
    const h = getHousehold(staged.subId);
    if (!h) {
      block.style.display = 'none';
      return;
    }
    if (!(h.members || []).length) {
      block.style.display = 'block';
      label.textContent = 'Who in ' + h.name;
      opts.innerHTML = `<div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--mute);">No people, pets or projects in ${escapeHtml(h.name)} yet. Add from the Family view.</div>`;
      return;
    }
    block.style.display = 'block';
    label.textContent = 'Who in ' + h.name + ' (optional)';
    let html = `<button class="triage-mode-opt ${!staged.memberId ? 'active' : ''}" data-member="">Everyone</button>`;
    h.members.forEach(mem => {
      const colour = memberColour(h.id, mem.id);
      const darkClass = needsDarkText(colour) ? ' dark-text' : '';
      const styleAttr = `--sub-colour: ${colourCssValue(colour)};`;
      html += `<button class="triage-mode-opt${staged.memberId === mem.id ? ' active' : ''}${darkClass}" style="${styleAttr}" data-member="${mem.id}">${escapeHtml(mem.name)}</button>`;
    });
    opts.innerHTML = html;
    opts.querySelectorAll('[data-member]').forEach(b => {
      b.onclick = () => {
        staged.memberId = b.dataset.member || null;
        if (!requireSubmit) {
          updateTask(task.id, { memberId: staged.memberId });
        }
        opts.querySelectorAll('[data-member]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      };
    });
  }

  function refreshSubmitState() {
    if (!submitBtn) return;
    if (!staged.tier) {
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submit ✦ pick a tier';
    } else if (staged.tier === 'bin') {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit ✦ → Bin';
    } else {
      submitBtn.disabled = false;
      const label = staged.tier === 'now' ? 'Now' : staged.tier === 'soon' ? 'Soon' : 'Someday';
      submitBtn.textContent = 'Submit ✦ → ' + label;
    }
  }

  function commitAndAdvance() {
    // Commit staged values, then advance to the next item in the active filter.
    const filter = state.inboxFilter || 'untriaged';
    if (staged.tier === 'bin') {
      const snapshot = { ...task };
      deleteTask(task.id);
      undoToast('Binned.', () => restoreTask(snapshot));
    } else {
      updateTask(task.id, {
        tier: staged.tier,
        mode: staged.mode || null,
        subId: staged.subId || null,
        memberId: staged.memberId || null
      });
      const label = staged.tier === 'now' ? 'Now' : staged.tier === 'soon' ? 'Soon' : 'Someday';
      toast('→ ' + label);
    }
    // In no-mode filter, the task only drops out of the pool if a mode was assigned or it was binned.
    // In untriaged filter, any tier change drops it out (it's no longer tier=inbox).
    const remaining = inboxFilteredTasks();
    if (state.triageIndex >= remaining.length && remaining.length > 0) {
      state.triageIndex = remaining.length - 1;
    }
    saveState();
    render();
  }

  // ---- Wire mode options ----
  modeRow.querySelectorAll('#triageModeOpts .triage-mode-opt').forEach(b => {
    b.onclick = () => {
      const newMode = b.dataset.mode || null;
      const wasNoMode = !staged.mode;
      staged.mode = newMode;
      // Changing mode clears sub and member
      staged.subId = null;
      staged.memberId = null;
      if (!requireSubmit) {
        updateTask(task.id, { mode: newMode, subId: null, memberId: null });
      }
      modeRow.querySelectorAll('#triageModeOpts .triage-mode-opt').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      renderTriageSubBlock();
      // 4c: in no-mode filter, assigning a mode removes the task from the filtered pool.
      // Auto-commit + no-mode filter: re-render so it slides out and the next item appears.
      if (!requireSubmit && state.inboxFilter === 'no-mode' && newMode) {
        const remaining = inboxFilteredTasks();
        if (state.triageIndex >= remaining.length && remaining.length > 0) {
          state.triageIndex = remaining.length - 1;
        }
        saveState();
        render();
      }
    };
  });

  // Initial render of cascading rows (in case task already had a mode)
  renderTriageSubBlock();

  // ---- Wire tier buttons ----
  actions.querySelectorAll('[data-tier]').forEach(b => {
    b.onclick = () => {
      const tier = b.dataset.tier;
      if (requireSubmit) {
        // Stage tier, update visuals (selected has staged outline, others dim)
        staged.tier = tier;
        actions.querySelectorAll('[data-tier]').forEach(x => {
          x.classList.remove('staged');
          x.classList.add('dim');
        });
        b.classList.add('staged');
        b.classList.remove('dim');
        refreshSubmitState();
      } else {
        // Auto-commit: tier click commits and advances immediately (in untriaged filter).
        // In no-mode filter, tier change doesn't remove from the pool so we stay on the same item.
        const filter = state.inboxFilter || 'untriaged';
        if (tier === 'bin') {
          const snapshot = { ...task };
          deleteTask(task.id);
          undoToast('Binned.', () => restoreTask(snapshot));
        } else {
          updateTask(task.id, { tier });
          const label = tier === 'now' ? 'Now' : tier === 'soon' ? 'Soon' : 'Someday';
          toast('→ ' + label);
        }
        const remaining = inboxFilteredTasks();
        if (state.triageIndex >= remaining.length && remaining.length > 0) {
          state.triageIndex = remaining.length - 1;
        }
        saveState();
        render();
      }
    };
  });

  // ---- Wire submit button ----
  if (submitBtn) {
    submitBtn.onclick = () => {
      if (!staged.tier) return;
      commitAndAdvance();
    };
  }

  // ---- Wire nav ----
  nav.querySelectorAll('[data-nav]').forEach(b => {
    b.onclick = () => {
      const dir = b.dataset.nav;
      if (dir === 'prev' && state.triageIndex > 0) state.triageIndex--;
      else if ((dir === 'next' || dir === 'skip') && state.triageIndex < inbox.length - 1) state.triageIndex++;
      saveState();
      render();
    };
  });

  return wrap;
}

function renderTriageList(inbox) {
  const wrap = document.createElement('div');

  inbox.forEach(task => {
    const createdDate = new Date(task.createdAt);
    const createdLabel = createdDate.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
    const timeLabel = formatTimeDisplay(createdDate);

    const card = document.createElement('div');
    card.className = 'triage-list-card';
    const modeOptsHTML = [
      `<option value="" ${!task.mode ? 'selected' : ''}>Unassigned</option>`,
      ...TASKABLE_MODES.map(mid => {
        const m = DEFAULT_MODES.find(x => x.id === mid);
        return `<option value="${mid}" ${task.mode === mid ? 'selected' : ''}>${m.glyph} ${escapeHtml(m.name)}</option>`;
      })
    ].join('');
    card.innerHTML = `
      <div class="triage-list-meta">${escapeHtml(createdLabel)} · ${escapeHtml(timeLabel)}</div>
      <div class="triage-list-body">${escapeHtml(task.text)}</div>
      <div class="triage-list-actions">
        <button class="triage-mini now" data-tier="now">Now</button>
        <button class="triage-mini soon" data-tier="soon">Soon</button>
        <button class="triage-mini someday" data-tier="someday">Someday</button>
        <button class="triage-mini bin" data-tier="bin">Bin</button>
        <select class="triage-list-mode-select" data-select="mode">${modeOptsHTML}</select>
      </div>
    `;
    card.querySelectorAll('[data-tier]').forEach(b => {
      b.onclick = () => {
        const tier = b.dataset.tier;
        if (tier === 'bin') {
          const snapshot = { ...task };
          deleteTask(task.id);
          undoToast('Binned.', () => restoreTask(snapshot));
        } else {
          updateTask(task.id, { tier });
          const label = tier === 'now' ? 'Now' : tier === 'soon' ? 'Soon' : 'Someday';
          toast(`→ ${label}`);
        }
        render();
      };
    });
    card.querySelector('[data-select="mode"]').onchange = (e) => {
      updateTask(task.id, { mode: e.target.value || null });
    };
    wrap.appendChild(card);
  });

  return wrap;
}

/* ============================================================
   RENDER: MODE VIEW (2a + 4b: unified sub-entity support across
   Work, Community, Family, Personal, Mortal Coil. Family adds
   a second level: household > member.)
   ============================================================ */
function renderModeView(modeId) {
  const mode = DEFAULT_MODES.find(m => m.id === modeId);
  if (!mode) return renderDashboard();

  const root = document.createElement('div');
  root.className = 'mode-root';

  // Level-1 sub-entity context
  const subs = getSubEntities(modeId);
  const subId = state.currentSubId;
  const activeSub = subId ? subs.find(s => s.id === subId) : null;

  // Level-2 member context (only valid for Family with a household active)
  const memberId = (modeId === 'family' && activeSub) ? state.currentMemberId : null;
  const activeMember = memberId ? getMember(activeSub.id, memberId) : null;

  // Resolve active colour for the masthead
  let activeColourId;
  if (activeMember) {
    activeColourId = memberColour(activeSub.id, activeMember.id);
  } else if (activeSub) {
    activeColourId = subColour(modeId, activeSub.id);
  } else {
    activeColourId = modeColour(modeId);
  }

  // Masthead with breadcrumb
  const masthead = document.createElement('div');
  masthead.className = 'mode-masthead';
  masthead.setAttribute('style', colourStyle(activeColourId));
  const firstWord = mode.name.split(' ')[0];
  const rest = mode.name.split(' ').slice(1).join(' ');

  // Breadcrumb: Mode [ / Sub [ / Member ] ]
  let crumbText = `${mode.glyph} ${escapeHtml(mode.name)}`;
  if (activeSub) crumbText += ` / ${escapeHtml(activeSub.name)}`;
  if (activeMember) crumbText += ` / ${escapeHtml(activeMember.name)}`;
  const crumb = `<div class="card-label" style="margin-bottom:14px;">${crumbText}</div>`;

  let title;
  if (activeMember) {
    title = `<h1>${escapeHtml(activeMember.name)}</h1>`;
  } else if (activeSub) {
    title = `<h1>${escapeHtml(activeSub.name)}</h1>`;
  } else {
    title = `<h1>${escapeHtml(firstWord)}${rest ? ' <em>' + escapeHtml(rest) + '</em>' : ' <em>mode</em>'}.</h1>`;
  }

  let mastheadDesc;
  if (activeMember) {
    mastheadDesc = `Tasks, notes and events tagged to ${escapeHtml(activeMember.name)}.`;
  } else if (activeSub) {
    mastheadDesc = subEntityDescription(modeId);
  } else {
    mastheadDesc = modeDescription(mode.id);
  }

  masthead.innerHTML = `
    <div class="mode-masthead-inner">
      ${crumb}
      ${title}
      <p>${mastheadDesc}</p>
    </div>
  `;
  root.appendChild(masthead);

  // Level-1 sub-entity bar (for any mode with sub-entities)
  if (MODES_WITH_SUBS.includes(modeId)) {
    root.appendChild(buildSubBar(modeId, subs, subId));

    // 4b: Level-2 member bar for Family, only when a household is active
    if (modeId === 'family' && activeSub) {
      root.appendChild(buildMemberBar(activeSub, memberId));
    }
  }

  // 4c: Soft cutoff banner. Shows when soft cutoff is active and the user
  // hasn't dismissed today. Sits above the tier bar, above the fade.
  const showSoftBanner = softCutoffActive(modeId) && !cutoffBannerDismissedToday(modeId);
  if (showSoftBanner) {
    const banner = document.createElement('div');
    banner.className = 'cutoff-banner' + (modeId === 'community' ? ' community' : '');
    banner.setAttribute('role', 'note');
    const now = new Date();
    const timeStr = formatTimeDisplay(now);
    banner.innerHTML = `
      <span class="cutoff-banner-time">${escapeHtml(timeStr)}</span>
      <span class="cutoff-banner-body">${escapeHtml(cutoffBannerCopy(modeId))}</span>
      <button class="cutoff-banner-dismiss" type="button" aria-label="Dismiss banner for today">✕</button>
    `;
    banner.querySelector('.cutoff-banner-dismiss').onclick = () => {
      dismissCutoffBanner(modeId);
      render();
    };
    root.appendChild(banner);
  }

  // 4c: Grace indicator. Shows when hard cutoff is active and grace is running
  // but the dialog isn't currently visible (snoozed or silenced). Live ticker
  // so the user always knows how much time is left in the 15-min cap.
  if (hardCutoffActive(modeId) && graceActiveFor(modeId)) {
    const indicator = document.createElement('div');
    indicator.className = 'grace-indicator';
    indicator.setAttribute('role', 'note');
    indicator.id = 'graceIndicator';
    let tick = null;
    const updateText = () => {
      const ms = graceMsRemaining();
      if (ms <= 0) {
        // Cap hit. Kick to dashboard.
        if (tick) clearInterval(tick);
        clearCutoffGrace();
        state.currentMode = 'dashboard';
        saveState();
        render();
        return;
      }
      const mins = Math.floor(ms / 60000);
      const secs = Math.floor((ms % 60000) / 1000);
      const timeStr = `${mins}:${String(secs).padStart(2, '0')}`;
      indicator.innerHTML = `
        <span class="grace-indicator-label">On borrowed time</span>
        <span class="grace-indicator-time">${escapeHtml(timeStr)}</span>
      `;
    };
    updateText();
    // Tick every second. Cleared automatically when the element is removed
    // (next render replaces the DOM).
    tick = setInterval(() => {
      if (!document.body.contains(indicator)) {
        clearInterval(tick);
        return;
      }
      updateText();
    }, 1000);
    root.appendChild(indicator);
  }

  // 4c: Mode content wrapper. Soft cutoff applies a fade to this element,
  // leaving the masthead, sub-bars and banner unaffected.
  // Three states:
  // - hard cutoff active (with or without grace): heavy-fade
  // - soft cutoff only: soft-fade
  // - none: no fade
  const content = document.createElement('div');
  let fadeClass = '';
  if (hardCutoffActive(modeId)) {
    fadeClass = ' hard-cutoff-fade';
  } else if (softCutoffActive(modeId)) {
    fadeClass = ' soft-cutoff-fade';
  }
  content.className = 'mode-content' + fadeClass;

  // Tier bar (filter respects sub-entity and member when active)
  const tierBar = document.createElement('div');
  tierBar.className = 'tier-bar';
  TIERS.forEach(tier => {
    const count = tasksInModeTierSub(modeId, tier.id, activeSub ? activeSub.id : null, activeMember ? activeMember.id : null).length;
    const btn = document.createElement('button');
    btn.className = 'tier-tab' + (state.currentTier === tier.id ? ' active' : '');
    btn.innerHTML = `${escapeHtml(tier.name)}${count > 0 ? `<span class="count">${count}</span>` : ''}`;
    btn.onclick = () => { state.currentTier = tier.id; saveState(); render(); };
    tierBar.appendChild(btn);
  });
  // Done tab
  const doneBtn = document.createElement('button');
  const doneCount = tasksInModeSub(modeId, activeSub ? activeSub.id : null, activeMember ? activeMember.id : null).filter(t => t.done).length;
  doneBtn.className = 'tier-tab' + (state.currentTier === 'done' ? ' active' : '');
  doneBtn.innerHTML = `Done${doneCount > 0 ? `<span class="count">${doneCount}</span>` : ''}`;
  doneBtn.onclick = () => { state.currentTier = 'done'; saveState(); render(); };
  tierBar.appendChild(doneBtn);
  content.appendChild(tierBar);

  // 4c: Chip filter row. Show only when at least one task in scope has a chip.
  // Sticky AND filter — persists across navigation. Dim chips not present in
  // current scope so the user knows what's relevant here vs everywhere.
  const scopeChipSet = chipsInScope(modeId, activeSub ? activeSub.id : null, activeMember ? activeMember.id : null);
  if (scopeChipSet.size > 0) {
    const filterRow = document.createElement('div');
    filterRow.className = 'chip-filter-row';
    const activeFilters = state.chipFilter || [];
    const chipPillsHTML = CHIP_TYPES.map(ct => {
      const isActive = activeFilters.includes(ct.id);
      const inScope = scopeChipSet.has(ct.id);
      const dimClass = (!isActive && !inScope) ? ' dim' : '';
      const activeClass = isActive ? ' active' : '';
      return `<button class="chip-filter-pill ${ct.cls}${activeClass}${dimClass}" data-chip="${ct.id}">${escapeHtml(ct.label)}</button>`;
    }).join('');
    const clearBtn = activeFilters.length
      ? `<button class="chip-filter-clear" id="chipFilterClear" title="Clear all filters">clear ✕</button>`
      : '';
    filterRow.innerHTML = `
      <span class="chip-filter-label">Filter:</span>
      ${chipPillsHTML}
      ${clearBtn}
    `;
    filterRow.querySelectorAll('[data-chip]').forEach(b => {
      b.onclick = () => {
        const id = b.dataset.chip;
        const filters = (state.chipFilter || []).slice();
        const idx = filters.indexOf(id);
        if (idx >= 0) filters.splice(idx, 1);
        else filters.push(id);
        state.chipFilter = filters;
        saveState();
        render();
      };
    });
    if (activeFilters.length) {
      filterRow.querySelector('#chipFilterClear').onclick = () => {
        state.chipFilter = [];
        saveState();
        render();
      };
    }
    content.appendChild(filterRow);
  }

  // Tasks card — inset border picks up the active mode/sub/member colour
  // so Tasks visually belongs to the current scope, while Events and
  // Notes keep their fixed section colours (sky/butter).
  const card = document.createElement('div');
  card.className = 'candy candy-tasks';
  // Soft tint of the active colour for the inset border (pale version)
  card.style.setProperty('--tasks-inset', colourCssSoft(activeColourId));

  const tierInfo = TIERS.find(t => t.id === state.currentTier);
  const isDoneView = state.currentTier === 'done';
  const rawTasks = isDoneView
    ? tasksInModeSub(modeId, activeSub ? activeSub.id : null, activeMember ? activeMember.id : null).filter(t => t.done).sort((a,b) => (b.doneAt||0) - (a.doneAt||0))
    : tasksInModeTierSub(modeId, state.currentTier, activeSub ? activeSub.id : null, activeMember ? activeMember.id : null);
  // 4d: pink glow when done view has 5+ items in this scope. Uses rawTasks
  // (pre-filter) so the glow rewards what the user has done overall, not
  // what's currently visible after a chip filter.
  const isDoneGlow = isDoneView && rawTasks.length >= 5;
  if (isDoneGlow) card.className += ' done-glow';
  // 4c: apply chip filter to whatever's shown
  const tasks = applyChipFilter(rawTasks);
  const filterIsActive = (state.chipFilter || []).length > 0;

  const tierLabel = isDoneView ? 'Done' : (tierInfo ? tierInfo.name : 'Now');
  const tierSub = !isDoneView && tierInfo && tierInfo.sub
    ? ` · <span style="opacity:0.8;">${escapeHtml(tierInfo.sub)}</span>`
    : '';
  const scopeName = activeMember ? activeMember.name : (activeSub ? activeSub.name : mode.name);
  const labelSparkle = isDoneGlow ? ' <span class="sparkle">✦</span>' : '';
  card.innerHTML = `<span class="card-label">${escapeHtml(tierLabel)} · ${escapeHtml(scopeName)}${tierSub}${labelSparkle}</span>`;

  if (tasks.length === 0) {
    let msg;
    if (filterIsActive && rawTasks.length > 0) {
      // Filter eliminated everything
      const filterLabels = state.chipFilter.map(id => {
        const ct = CHIP_TYPES.find(x => x.id === id);
        return ct ? ct.label : id;
      }).join(' + ');
      msg = `Nothing matches <strong style="font-family:'Fraunces',serif;font-style:italic;">${escapeHtml(filterLabels)}</strong>. <span class="sparkle">✦</span> Narrow your filter, or there's nothing here.`;
    } else if (isDoneView) {
      msg = `Nothing done yet in ${escapeHtml(scopeName)}. <span class="sparkle">♦</span> There is still time. Or there isn't. Who's to say.`;
    } else {
      msg = tierEmptyCopy(state.currentTier, scopeName);
    }
    card.innerHTML += `<div class="empty">${msg}</div>`;
  } else {
    const list = document.createElement('ul');
    list.className = 'task-list';
    tasks.forEach(t => list.appendChild(renderTaskRow(t)));
    card.appendChild(list);
  }

  // Add task bar (not in done view)
  if (!isDoneView) {
    const addBar = document.createElement('div');
    addBar.className = 'add-task-bar';
    const placeholder = `Add a task to ${escapeHtml(scopeName)} (${escapeHtml(tierLabel)})...`;
    addBar.innerHTML = `
      <input class="add-task-input" placeholder="${placeholder}" autocomplete="off">
      <button class="pill-btn primary">+ Add</button>
    `;
    const input = addBar.querySelector('input');
    const btn = addBar.querySelector('button');
    const doAdd = () => {
      const text = input.value.trim();
      if (!text) return;
      addTask(text, {
        mode: modeId,
        subId: activeSub ? activeSub.id : null,
        memberId: activeMember ? activeMember.id : null,
        tier: state.currentTier
      });
      input.value = '';
      toast('added.');
      render();
    };
    btn.onclick = doAdd;
    input.onkeydown = (e) => { if (e.key === 'Enter') doAdd(); };
    card.appendChild(addBar);
  }

  content.appendChild(card);

  // Events + Notes cards, scoped by mode + sub + member
  content.appendChild(renderEventsCard(modeId, activeSub, activeMember));
  content.appendChild(renderNotesCard(modeId, activeSub, activeMember));

  // 4c: append the wrapper (with potential .soft-cutoff-fade class)
  root.appendChild(content);

  return root;
}

/* ------------------------------------------------------------
   4b: Build the level-1 sub-entity pill bar.
   Used for Work, Community, Family, Personal, Mortal Coil.
   ------------------------------------------------------------ */
function buildSubBar(modeId, subs, subId) {
  const subBar = document.createElement('div');
  subBar.className = 'sub-bar';

  const lbl = document.createElement('span');
  lbl.className = 'sub-bar-label';
  lbl.textContent = subEntityGroupLabel(modeId);
  subBar.appendChild(lbl);

  // "All" button - outlined pill. Reads as "filter off" rather than a
  // solid sub-entity matching the mode colour.
  // 4c: count tasks in this mode with no sub-entity assigned, surface as a hint badge
  const noSubCount = state.tasks.filter(t => t.mode === modeId && !t.subId && !t.done).length;
  const allBtn = document.createElement('button');
  allBtn.className = 'sub-btn outline' + (!subId ? ' active' : '');
  allBtn.setAttribute('style', `--sub-colour: ${colourCssValue(modeColour(modeId))};`);
  if (noSubCount > 0) {
    allBtn.innerHTML = `All <span class="sub-btn-hint">${noSubCount} no ${escapeHtml(subEntityLabel(modeId))}</span>`;
  } else {
    allBtn.textContent = 'All';
  }
  allBtn.onclick = () => setSubEntity(null);
  subBar.appendChild(allBtn);

  subs.forEach(s => {
    const b = document.createElement('button');
    const sColour = subColour(modeId, s.id);
    b.className = 'sub-btn' + (subId === s.id ? ' active' : '') + (needsDarkText(sColour) ? ' dark-text' : '');
    b.setAttribute('style', `--sub-colour: ${colourCssValue(sColour)};`);
    b.textContent = s.name;
    b.onclick = () => setSubEntity(s.id);

    // 4a/4c: context menu / long-press → rename + colour + delete
    const openSubMenu = (anchor) => {
      const currentColour = s.colour || null;
      const label = subEntityLabel(modeId);
      openColourPopover(anchor, {
        title: 'Edit ' + label,
        renameValue: s.name,
        onRename: (newName) => {
          s.name = newName;
          saveState();
          render();
          toast('renamed.');
        },
        currentColour: currentColour,
        allowInherit: true,
        inheritLabel: 'Auto-vary from ' + DEFAULT_MODES.find(x => x.id === modeId).name,
        onPick: (newId) => {
          s.colour = newId;
          saveState();
          render();
        },
        onReset: currentColour ? () => {
          s.colour = null;
          saveState();
          render();
        } : null,
        deleteLabel: label,
        onDelete: () => {
          confirmDeleteSubEntity(modeId, s);
        }
      });
    };
    b.oncontextmenu = (ev) => { ev.preventDefault(); openSubMenu(b); };
    let pressTimer = null;
    b.addEventListener('touchstart', () => {
      pressTimer = setTimeout(() => { pressTimer = null; openSubMenu(b); }, 600);
    }, { passive: true });
    b.addEventListener('touchend', () => { if (pressTimer) clearTimeout(pressTimer); });
    b.addEventListener('touchmove', () => { if (pressTimer) clearTimeout(pressTimer); });
    subBar.appendChild(b);
  });

  // 4c: Inline add - + button morphs into an input pill
  const addBtn = document.createElement('button');
  addBtn.className = 'sub-btn add';
  addBtn.textContent = '+ ' + subEntityLabel(modeId);
  addBtn.onclick = () => {
    const label = subEntityLabel(modeId);
    // Replace add button with input pill
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'sub-add-input';
    input.placeholder = 'new ' + label + '…';
    input.setAttribute('aria-label', 'New ' + label + ' name');

    const hint = document.createElement('span');
    hint.className = 'sub-add-hint';
    hint.textContent = 'enter to save · esc to cancel';

    addBtn.replaceWith(input);
    input.after(hint);
    input.focus();

    let committed = false;
    const commit = () => {
      if (committed) return;
      const name = input.value.trim();
      if (!name) return;
      committed = true;
      const entity = { id: uid(), name: name, colour: null };
      if (modeId === 'work') {
        if (!state.clients) state.clients = [];
        state.clients.push(entity);
      } else if (modeId === 'community') {
        if (!state.orgs) state.orgs = [];
        state.orgs.push(entity);
      } else if (modeId === 'family') {
        if (!state.households) state.households = [];
        entity.members = [];
        state.households.push(entity);
      } else if (modeId === 'personal' || modeId === 'mortal-coil') {
        if (!state.categories) state.categories = { personal: [], 'mortal-coil': [] };
        if (!state.categories[modeId]) state.categories[modeId] = [];
        state.categories[modeId].push(entity);
      }
      saveState();
      toast('added.');
      setSubEntity(entity.id);
    };
    input.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        commit();
      } else if (ev.key === 'Escape') {
        ev.preventDefault();
        committed = true; // prevent blur from also committing
        render();
      }
    });
    input.addEventListener('blur', () => {
      // brief delay to let other clicks land first
      setTimeout(() => {
        if (!committed) {
          if (input.value.trim()) {
            commit();
          } else {
            render();
          }
        }
      }, 100);
    });
  };
  subBar.appendChild(addBtn);

  return subBar;
}

/* ------------------------------------------------------------
   4c: Confirmation flow for deleting a sub-entity.
   Three options: delete with data, delete but unassign data, cancel.
   ------------------------------------------------------------ */
function confirmDeleteSubEntity(modeId, sub) {
  const label = subEntityLabel(modeId);
  // Members for Family households are also "linked items" worth flagging
  const counts = countLinkedToSub(modeId, sub.id);
  let memberCount = 0;
  if (modeId === 'family' && Array.isArray(sub.members)) {
    memberCount = sub.members.length;
  }

  const parts = [];
  if (counts.tasks) parts.push(counts.tasks + ' task' + (counts.tasks === 1 ? '' : 's'));
  if (counts.events) parts.push(counts.events + ' event' + (counts.events === 1 ? '' : 's'));
  if (memberCount) parts.push(memberCount + ' member' + (memberCount === 1 ? '' : 's'));

  const body = parts.length
    ? 'Linked: ' + parts.join(', ') + '. What should happen to them?'
    : 'Nothing else is linked to it.';

  const actions = [];
  // If there's nothing linked, just one Delete button is enough
  if (parts.length === 0) {
    actions.push({
      label: 'Delete ' + label,
      kind: 'danger',
      onClick: () => {
        deleteSubEntity(modeId, sub.id, { cascade: false });
        toast('deleted.');
        render();
      }
    });
  } else {
    actions.push({
      label: 'Delete ' + label + ' and everything linked',
      kind: 'danger',
      onClick: () => {
        deleteSubEntity(modeId, sub.id, { cascade: true });
        toast('deleted.');
        render();
      }
    });
    actions.push({
      label: 'Just delete the ' + label + ' (keep linked items)',
      onClick: () => {
        deleteSubEntity(modeId, sub.id, { cascade: false });
        toast('deleted. linked items kept.');
        render();
      }
    });
  }
  actions.push({ label: 'Cancel' });

  openConfirmModal({
    title: 'Delete ' + sub.name + '?',
    body: body,
    actions: actions
  });
}

/* ------------------------------------------------------------
   4b: Build the level-2 member bar for Family.
   Shown only when a household is active.
   ------------------------------------------------------------ */
function buildMemberBar(household, memberId) {
  const bar = document.createElement('div');
  bar.className = 'sub-bar sub-bar-nested';

  const lbl = document.createElement('span');
  lbl.className = 'sub-bar-label';
  lbl.textContent = 'In ' + household.name;
  bar.appendChild(lbl);

  // "Everyone" = all tasks in this household, unfiltered by member.
  // Outlined pill style so it doesn't duplicate the household colour above.
  const allBtn = document.createElement('button');
  allBtn.className = 'sub-btn outline' + (!memberId ? ' active' : '');
  allBtn.setAttribute('style', `--sub-colour: ${colourCssValue(subColour('family', household.id))};`);
  allBtn.textContent = 'Everyone';
  allBtn.onclick = () => setMember(null);
  bar.appendChild(allBtn);

  (household.members || []).forEach(m => {
    const b = document.createElement('button');
    const mColour = memberColour(household.id, m.id);
    b.className = 'sub-btn' + (memberId === m.id ? ' active' : '') + (needsDarkText(mColour) ? ' dark-text' : '');
    b.setAttribute('style', `--sub-colour: ${colourCssValue(mColour)};`);
    b.textContent = m.name;
    b.onclick = () => setMember(m.id);

    // 4a/4c: context / long-press → rename + colour + delete
    const openMemberMenu = (anchor) => {
      const currentColour = m.colour || null;
      openColourPopover(anchor, {
        title: 'Edit member',
        renameValue: m.name,
        onRename: (newName) => {
          m.name = newName;
          saveState();
          render();
          toast('renamed.');
        },
        currentColour: currentColour,
        allowInherit: true,
        inheritLabel: 'Auto-vary from ' + household.name,
        onPick: (newId) => {
          m.colour = newId;
          saveState();
          render();
        },
        onReset: currentColour ? () => {
          m.colour = null;
          saveState();
          render();
        } : null,
        deleteLabel: 'member',
        onDelete: () => {
          confirmDeleteMember(household, m);
        }
      });
    };
    b.oncontextmenu = (ev) => { ev.preventDefault(); openMemberMenu(b); };
    let pressTimer = null;
    b.addEventListener('touchstart', () => {
      pressTimer = setTimeout(() => { pressTimer = null; openMemberMenu(b); }, 600);
    }, { passive: true });
    b.addEventListener('touchend', () => { if (pressTimer) clearTimeout(pressTimer); });
    b.addEventListener('touchmove', () => { if (pressTimer) clearTimeout(pressTimer); });
    bar.appendChild(b);
  });

  // 4c: Inline add - + button morphs into an input pill
  const addBtn = document.createElement('button');
  addBtn.className = 'sub-btn add';
  addBtn.textContent = '+ in ' + household.name;
  addBtn.onclick = () => {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'sub-add-input';
    input.placeholder = 'name…';
    input.setAttribute('aria-label', 'New member name');

    const hint = document.createElement('span');
    hint.className = 'sub-add-hint';
    hint.textContent = 'enter to save · esc to cancel';

    addBtn.replaceWith(input);
    input.after(hint);
    input.focus();

    let committed = false;
    const commit = () => {
      if (committed) return;
      const name = input.value.trim();
      if (!name) return;
      committed = true;
      const m = addMember(household.id, name);
      if (m) {
        toast('added.');
        setMember(m.id);
      }
    };
    input.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        commit();
      } else if (ev.key === 'Escape') {
        ev.preventDefault();
        committed = true;
        render();
      }
    });
    input.addEventListener('blur', () => {
      setTimeout(() => {
        if (!committed) {
          if (input.value.trim()) {
            commit();
          } else {
            render();
          }
        }
      }, 100);
    });
  };
  bar.appendChild(addBtn);

  return bar;
}

/* ------------------------------------------------------------
   4c: Confirmation flow for deleting a Family member.
   Three options: delete with data, delete but unassign data, cancel.
   ------------------------------------------------------------ */
function confirmDeleteMember(household, member) {
  const counts = countLinkedToSub('family', household.id, member.id);
  const parts = [];
  if (counts.tasks) parts.push(counts.tasks + ' task' + (counts.tasks === 1 ? '' : 's'));
  if (counts.events) parts.push(counts.events + ' event' + (counts.events === 1 ? '' : 's'));

  const body = parts.length
    ? 'Linked: ' + parts.join(' and ') + '. What should happen to them?'
    : 'Nothing else is linked to them.';

  const actions = [];
  if (parts.length === 0) {
    actions.push({
      label: 'Delete member',
      kind: 'danger',
      onClick: () => {
        deleteMember(household.id, member.id, { cascade: false });
        if (state.currentMemberId === member.id) state.currentMemberId = null;
        toast('deleted.');
        render();
      }
    });
  } else {
    actions.push({
      label: 'Delete member and everything linked',
      kind: 'danger',
      onClick: () => {
        deleteMember(household.id, member.id, { cascade: true });
        if (state.currentMemberId === member.id) state.currentMemberId = null;
        toast('deleted.');
        render();
      }
    });
    actions.push({
      label: 'Just delete the member (keep linked items)',
      onClick: () => {
        deleteMember(household.id, member.id, { cascade: false });
        if (state.currentMemberId === member.id) state.currentMemberId = null;
        toast('deleted. linked items kept.');
        render();
      }
    });
  }
  actions.push({ label: 'Cancel' });

  openConfirmModal({
    title: 'Delete ' + member.name + '?',
    body: body,
    actions: actions
  });
}

/* ============================================================
   TASK QUERIES WITH SUB-ENTITY
   ============================================================ */
function tasksInModeSub(modeId, subId, memberId) {
  let result = state.tasks.filter(t => t.mode === modeId);
  if (subId !== undefined && subId !== null) result = result.filter(t => t.subId === subId);
  if (memberId !== undefined && memberId !== null) result = result.filter(t => t.memberId === memberId);
  return result;
}

function tasksInModeTierSub(modeId, tier, subId, memberId) {
  let base = state.tasks.filter(t => t.mode === modeId && t.tier === tier && !t.done);
  if (subId !== undefined && subId !== null) base = base.filter(t => t.subId === subId);
  if (memberId !== undefined && memberId !== null) base = base.filter(t => t.memberId === memberId);
  return base;
}

// 4c: Apply the active chip filter (AND logic) to a task list.
// Returns the input unchanged if no chips are active.
function applyChipFilter(tasks) {
  const active = state.chipFilter || [];
  if (!active.length) return tasks;
  return tasks.filter(t => {
    const taskChips = t.chips || [];
    return active.every(c => taskChips.includes(c));
  });
}

// 4c: Compute which chips are present on at least one task in scope.
// Used to dim chips that aren't currently relevant.
function chipsInScope(modeId, subId, memberId) {
  const scope = tasksInModeSub(modeId, subId, memberId);
  const set = new Set();
  scope.forEach(t => (t.chips || []).forEach(c => set.add(c)));
  return set;
}

function subEntityDescription(modeId) {
  if (modeId === 'work') return "Client-specific tasks, notes and scope.";
  if (modeId === 'community') return "Org-specific work, coordination and notes.";
  if (modeId === 'family') return "Household-specific tasks and notes.";
  if (modeId === 'personal') return "Category-specific tasks and notes.";
  if (modeId === 'mortal-coil') return "Category-specific admin and paperwork.";
  return '';
}

/* ============================================================
   NOTES CARD (3a)
   ============================================================ */
function renderNotesCard(modeId, activeSub, activeMember) {
  const card = document.createElement('div');
  card.className = 'notes-card';

  const subId = activeSub ? activeSub.id : null;
  const memberId = activeMember ? activeMember.id : null;
  const scope = activeMember
    ? activeMember.name
    : (activeSub ? activeSub.name : DEFAULT_MODES.find(m => m.id === modeId).name);
  const label = `Notes · ${escapeHtml(scope)}`;
  const placeholder = activeMember
    ? `Notes about ${escapeHtml(scope)}. Saves as you type.`
    : (activeSub
        ? `Notes, scope, last contact, anything about ${escapeHtml(scope)}. Saves as you type.`
        : `General notes for ${escapeHtml(scope)}. Saves as you type.`);

  card.innerHTML = `
    <span class="card-label">${label}</span>
    <textarea class="notes-area" id="notesArea" placeholder="${placeholder}"></textarea>
    <div class="notes-status">
      <span>Auto-saves as you type</span>
      <span class="saved" id="notesSaved">✓ saved</span>
    </div>
  `;

  const textarea = card.querySelector('#notesArea');
  textarea.value = getNote(modeId, subId, memberId);

  const savedEl = card.querySelector('#notesSaved');
  let saveTimer = null;

  textarea.addEventListener('input', () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      setNote(modeId, subId, memberId, textarea.value);
      savedEl.classList.add('show');
      setTimeout(() => savedEl.classList.remove('show'), 1200);
    }, 400);
  });

  return card;
}

/* ============================================================
   EVENTS + COUNTDOWNS CARDS (3b)
   ============================================================ */
function renderEventsCard(modeId, activeSub, activeMember) {
  const card = document.createElement('div');
  card.className = 'events-card';

  const subId = activeSub ? activeSub.id : null;
  const memberId = activeMember ? activeMember.id : null;
  const scope = activeMember
    ? activeMember.name
    : (activeSub ? activeSub.name : (modeId ? DEFAULT_MODES.find(m => m.id === modeId).name : 'All'));

  const all = eventsInMode(modeId, subId, memberId);

  // Header with view toggle
  const header = document.createElement('div');
  header.className = 'events-card-header';
  header.innerHTML = `
    <span class="card-label">Events · ${escapeHtml(scope)}${all.length > 0 ? ' · ' + all.length : ''}</span>
    <div class="event-view-toggle">
      <button class="${state.eventView === 'list' ? 'active' : ''}" data-view="list">List</button>
      <button class="${state.eventView === 'calendar' ? 'active' : ''}" data-view="calendar">Calendar</button>
    </div>
  `;
  header.querySelectorAll('.event-view-toggle button').forEach(b => {
    b.onclick = () => {
      state.eventView = b.dataset.view;
      state.calSelectedDate = null;
      saveState();
      render();
    };
  });
  card.appendChild(header);

  // Body: list or calendar
  if (state.eventView === 'calendar') {
    card.appendChild(renderCalendarView(modeId, subId, all));
  } else {
    const future = all.filter(e => daysUntil(e.date) != null && daysUntil(e.date) >= 0)
      .sort((a, b) => a.date.localeCompare(b.date));
    const past = all.filter(e => daysUntil(e.date) != null && daysUntil(e.date) < 0)
      .sort((a, b) => b.date.localeCompare(a.date))
      .slice(0, 3);

    if (future.length === 0 && past.length === 0) {
      card.insertAdjacentHTML('beforeend', `
        <div class="empty">Nothing scheduled. <span class="sparkle">✦</span> Time stretches flat and uneventful.</div>
      `);
    } else {
      const list = document.createElement('ul');
      list.className = 'event-list';
      future.forEach(e => list.appendChild(renderEventRow(e, false)));
      past.forEach(e => list.appendChild(renderEventRow(e, true)));
      card.appendChild(list);
    }
  }

  // Add event form (always visible under both views)
  const form = document.createElement('div');
  form.className = 'event-add-form';
  const prefillDate = state.calSelectedDate || todayISO();
  form.innerHTML = `
    <input type="text" id="eventTitle" placeholder="Event title..." autocomplete="off">
    <input type="date" id="eventDate" value="${prefillDate}">
    <button class="pill-btn primary" id="eventAddBtn">+ Add</button>
  `;
  const toggleRow = document.createElement('div');
  toggleRow.className = 'event-add-toggle-row';
  toggleRow.innerHTML = `
    <label class="event-add-toggle" id="cdToggleWrap">
      <input type="checkbox" id="eventCountdown">
      <span>Count down on dashboard</span>
    </label>
  `;

  card.appendChild(form);
  card.appendChild(toggleRow);

  const titleInput = form.querySelector('#eventTitle');
  const dateInput = form.querySelector('#eventDate');
  const cdInput = toggleRow.querySelector('#eventCountdown');
  const cdWrap = toggleRow.querySelector('#cdToggleWrap');
  cdInput.addEventListener('change', () => {
    cdWrap.classList.toggle('active', cdInput.checked);
  });

  const doAdd = () => {
    const title = titleInput.value.trim();
    if (!title) return;
    addEvent({
      title,
      date: dateInput.value || todayISO(),
      mode: modeId || null,
      subId: subId,
      memberId: memberId,
      isCountdown: cdInput.checked
    });
    titleInput.value = '';
    cdInput.checked = false;
    cdWrap.classList.remove('active');
    toast('scheduled.');
    render();
  };

  form.querySelector('#eventAddBtn').onclick = doAdd;
  titleInput.onkeydown = (e) => { if (e.key === 'Enter') doAdd(); };

  return card;
}

function renderCalendarView(modeId, subId, events) {
  // 4c (option B): outer wrapper enables a side-by-side calendar + upcoming
  // events list at >= 1180px viewport. Below that, the .cal-main column
  // centres at max 720px and the upcoming aside is hidden via CSS.
  const outer = document.createElement('div');
  outer.className = 'cal-with-upcoming';

  const wrap = document.createElement('div');
  wrap.className = 'cal-main';

  const today = new Date();
  const viewMonth = new Date(today.getFullYear(), today.getMonth() + (state.calMonthOffset || 0), 1);
  const year = viewMonth.getFullYear();
  const month = viewMonth.getMonth();
  const monthLabel = viewMonth.toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });

  // Header
  const header = document.createElement('div');
  header.className = 'calendar-header';
  header.innerHTML = `
    <div class="calendar-month-name">${escapeHtml(monthLabel)}</div>
    <div class="calendar-nav">
      <button class="cal-nav-btn" data-nav="prev" title="Previous month">‹</button>
      <button class="cal-today-btn" data-nav="today">Today</button>
      <button class="cal-nav-btn" data-nav="next" title="Next month">›</button>
    </div>
  `;
  header.querySelectorAll('[data-nav]').forEach(b => {
    b.onclick = () => {
      const dir = b.dataset.nav;
      if (dir === 'prev') state.calMonthOffset = (state.calMonthOffset || 0) - 1;
      else if (dir === 'next') state.calMonthOffset = (state.calMonthOffset || 0) + 1;
      else if (dir === 'today') state.calMonthOffset = 0;
      state.calSelectedDate = null;
      saveState();
      render();
    };
  });
  wrap.appendChild(header);

  // Grid
  const grid = document.createElement('div');
  grid.className = 'cal-grid';

  // Monday-first day headers
  const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  dayNames.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-day-header';
    h.textContent = d;
    grid.appendChild(h);
  });

  // Calendar math
  const firstDay = new Date(year, month, 1);
  // JS: Sun=0..Sat=6; want Mon=0..Sun=6
  const startOffset = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  // Events indexed by date
  const eventsByDate = {};
  events.forEach(e => {
    if (!eventsByDate[e.date]) eventsByDate[e.date] = [];
    eventsByDate[e.date].push(e);
  });

  const todayIso = todayISO();

  // Previous-month trailing days
  for (let i = startOffset - 1; i >= 0; i--) {
    const dayNum = daysInPrev - i;
    const cell = document.createElement('div');
    cell.className = 'cal-cell other-month';
    cell.innerHTML = `<div class="cal-cell-num">${dayNum}</div>`;
    grid.appendChild(cell);
  }

  // Current month cells
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const cell = document.createElement('div');
    let classes = 'cal-cell';
    if (iso === todayIso) classes += ' today';
    if (iso < todayIso) classes += ' past';
    const dayEvents = eventsByDate[iso] || [];
    if (dayEvents.length > 0) classes += ' has-events';
    if (dayEvents.some(e => e.isCountdown)) classes += ' has-countdown';
    cell.className = classes;

    let inner = `<div class="cal-cell-num">${d}</div>`;
    if (dayEvents.length > 0) {
      inner += `<div class="cal-cell-events">`;
      dayEvents.slice(0, 2).forEach(e => {
        inner += `<div class="cal-cell-event${e.isCountdown ? ' countdown' : ''}" title="${escapeHtml(e.title)}">${escapeHtml(e.title)}</div>`;
      });
      if (dayEvents.length > 2) {
        inner += `<div class="cal-cell-more">+${dayEvents.length - 2} more</div>`;
      }
      inner += `</div>`;
    }
    cell.innerHTML = inner;
    cell.onclick = () => {
      state.calSelectedDate = iso;
      saveState();
      render();
    };
    grid.appendChild(cell);
  }

  // Next-month leading days to fill the grid
  const totalCells = startOffset + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= trailing; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell other-month';
    cell.innerHTML = `<div class="cal-cell-num">${i}</div>`;
    grid.appendChild(cell);
  }

  wrap.appendChild(grid);

  // If a day is selected, show its events below
  if (state.calSelectedDate) {
    const selected = state.calSelectedDate;
    const dayEvents = (eventsByDate[selected] || []);
    const selDate = new Date(selected + 'T00:00:00');
    const selLabel = selDate.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    const panel = document.createElement('div');
    panel.className = 'cal-selected-day';
    panel.innerHTML = `
      <div class="cal-selected-header">
        <div class="cal-selected-date">${escapeHtml(selLabel)}</div>
        <button class="pill-btn small" data-close>Close</button>
      </div>
    `;
    panel.querySelector('[data-close]').onclick = () => {
      state.calSelectedDate = null;
      saveState();
      render();
    };

    if (dayEvents.length === 0) {
      panel.insertAdjacentHTML('beforeend', `
        <div class="empty" style="text-align:left;padding:6px 0 4px;">Nothing on this day. <span class="sparkle">✦</span> Add one below.</div>
      `);
    } else {
      const list = document.createElement('ul');
      list.className = 'event-list';
      dayEvents.forEach(e => {
        const isPast = daysUntil(e.date) < 0;
        list.appendChild(renderEventRow(e, isPast));
      });
      panel.appendChild(list);
    }

    wrap.appendChild(panel);
  }

  outer.appendChild(wrap);
  outer.appendChild(renderCalendarUpcoming(events));
  return outer;
}

function renderCalendarUpcoming(events) {
  // 4c (option B): the wide-desktop sidebar that shows the next chunk of
  // events as a list. Filtered + sorted from the same events array the
  // calendar receives so it always matches the current mode/sub/member scope.
  const aside = document.createElement('aside');
  aside.className = 'cal-upcoming';

  const label = document.createElement('span');
  label.className = 'cal-upcoming-label';
  label.textContent = 'Upcoming';
  aside.appendChild(label);

  const future = (events || [])
    .filter(e => daysUntil(e.date) != null && daysUntil(e.date) >= 0)
    .sort((a, b) => a.date.localeCompare(b.date))
    .slice(0, 8);

  if (future.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'cal-upcoming-empty';
    empty.innerHTML = 'Nothing on the horizon. <span class="sparkle">✦</span> Add one below.';
    aside.appendChild(empty);
    return aside;
  }

  const list = document.createElement('div');
  list.className = 'cal-upcoming-list';

  future.forEach(e => {
    const item = document.createElement('button');
    item.type = 'button';
    let cls = 'cal-upcoming-item';
    if (e.isCountdown) cls += ' countdown';
    if (state.calSelectedDate === e.date) cls += ' selected';
    item.className = cls;

    const days = daysUntil(e.date);
    let dateLabel;
    if (days === 0) dateLabel = 'Today';
    else if (days === 1) dateLabel = 'Tomorrow';
    else dateLabel = formatEventDate(e.date);

    const metaParts = [];
    if (e.isCountdown) metaParts.push('✦');
    if (e.mode) {
      const m = DEFAULT_MODES.find(x => x.id === e.mode);
      if (m) metaParts.push(m.glyph);
    }

    item.innerHTML = `
      <span class="cal-upcoming-date">${escapeHtml(dateLabel)}</span>
      <span class="cal-upcoming-title">${escapeHtml(e.title)}</span>
      <span class="cal-upcoming-meta">${metaParts.join(' ')}</span>
    `;

    item.setAttribute('aria-label', `${dateLabel}, ${e.title}. Jump to date.`);

    // Clicking jumps the calendar grid to that month and selects the day.
    item.onclick = () => {
      const today = new Date();
      const todayMonthIdx = today.getFullYear() * 12 + today.getMonth();
      const eventDate = new Date(e.date + 'T00:00:00');
      const eventMonthIdx = eventDate.getFullYear() * 12 + eventDate.getMonth();
      state.calMonthOffset = eventMonthIdx - todayMonthIdx;
      state.calSelectedDate = e.date;
      saveState();
      render();
    };

    list.appendChild(item);
  });

  aside.appendChild(list);
  return aside;
}

function renderEventRow(event, isPast) {
  const li = document.createElement('li');
  li.className = 'event-row' + (isPast ? ' past' : '') + (event.isCountdown ? ' countdown' : '');

  const dObj = new Date(event.date + 'T00:00:00');
  const day = dObj.getDate();
  const month = dObj.toLocaleDateString('en-AU', { month: 'short' }).toUpperCase();

  const daysLeft = daysUntil(event.date);
  const daysRight = isPast
    ? `<div class="event-days-left"><span class="num" style="font-size:16px;">past</span></div>`
    : (daysLeft === 0
      ? `<div class="event-days-left"><span class="num">today</span><span class="lbl"></span></div>`
      : `<div class="event-days-left"><span class="num">${daysLeft}</span><span class="lbl">${daysLeft === 1 ? 'day' : 'days'}</span></div>`);

  // Meta: countdown label + mode crumb if not in mode view
  let meta = '';
  const crumbs = [];
  if (event.isCountdown) crumbs.push('✦ countdown');
  if (event.mode && !isPast) {
    const m = DEFAULT_MODES.find(x => x.id === event.mode);
    if (m) crumbs.push(`${m.glyph} ${m.name}`);
  }
  if (crumbs.length) meta = `<div class="event-meta">${crumbs.map(escapeHtml).join(' · ')}</div>`;

  li.innerHTML = `
    <div class="event-date-badge">
      <div class="day">${day}</div>
      <div class="month">${month}</div>
    </div>
    <div class="event-body">
      <div class="event-title">${escapeHtml(event.title)}</div>
      ${meta}
    </div>
    <div style="display:flex;align-items:center;gap:4px;">
      ${daysRight}
      <button class="event-delete-btn" title="Delete">✕</button>
    </div>
  `;

  li.querySelector('.event-delete-btn').onclick = (e) => {
    e.stopPropagation();
    const snapshot = { ...event };
    deleteEvent(event.id);
    undoToast('Event deleted.', () => restoreEvent(snapshot));
    render();
  };

  return li;
}

function renderTaskRow(task) {
  const li = document.createElement('li');
  li.className = 'task-row' + (task.done ? ' done' : '');
  // 4a: cascade task > sub > mode > pink. Live on the row as --task-colour.
  const colour = taskColour(task);
  li.style.setProperty('--task-colour', colourCssValue(colour));

  // Build chip strip
  const chipsHTML = (task.chips || []).map(c => {
    const ct = CHIP_TYPES.find(x => x.id === c);
    if (!ct) return '';
    return `<span class="chip ${ct.cls}">${escapeHtml(ct.label)}</span>`;
  }).join('');

  let waitingChipHTML = '';
  if (task.waitingOn) {
    const d = daysSince(task.waitingSince);
    const stale = d != null && d >= STALE_DAYS;
    const suffix = d != null ? ' · ' + d + 'd' : '';
    waitingChipHTML = `<span class="chip waiting${stale ? ' stale' : ''}">⏳ ${escapeHtml(task.waitingOn)}${suffix}</span>`;
  }

  const chipRow = (chipsHTML || waitingChipHTML)
    ? `<div class="chips" style="margin-top:6px;">${waitingChipHTML}${chipsHTML}</div>`
    : '';

  li.innerHTML = `
    <div class="task-check" data-act="check"></div>
    <div class="task-text">${escapeHtml(task.text)}${chipRow}</div>
    <button class="task-edit-btn" data-act="edit" title="Edit">✎</button>
  `;
  li.querySelector('[data-act="check"]').onclick = (e) => {
    e.stopPropagation();
    // 4d: spark burst on transition to done only, not on un-tick
    if (!task.done) spawnTickBurst(e.currentTarget);
    toggleDone(task.id);
    render();
  };
  li.querySelector('[data-act="edit"]').onclick = (e) => {
    e.stopPropagation();
    openTaskPanel(task.id);
  };
  li.onclick = () => openTaskPanel(task.id);
  return li;
}

function tierEmptyCopy(tier, modeName) {

  // active pill class and the "Currently showing" line in place — no drawer rebuild.
  drawer.querySelectorAll('#todPills .tod-pill').forEach(p => {
    p.onclick = () => {
      const v = p.dataset.tod || null;
      state.settings.timeOfDayOverride = v;
      saveState();
      render();
      // Update active class on tod pills only (not the time-format ones)
      drawer.querySelectorAll('#todPills .tod-pill').forEach(x => {
        x.classList.toggle('active', (x.dataset.tod || '') === (v || ''));

      // Update the "Currently showing" line
      const valEl = drawer.querySelector('#todCurrentValue');
      const modeEl = drawer.querySelector('#todCurrentMode');
      if (valEl) valEl.textContent = timeOfDay();
      if (modeEl) modeEl.textContent = v ? ' (override)' : ' (auto)';
    };
  });

  // 4c: Time format toggle (12h/24h). On click: write, save, re-render the app
  // (so all displayed times pick up the new format), then re-open the drawer
  // so the cutoff dropdown labels reflect the new format.
  drawer.querySelectorAll('#timeFormatPills .tod-pill').forEach(p => {
    p.onclick = () => {
      const v = p.dataset.fmt;
      state.settings.timeFormat = v;
      saveState();
      render();
      openSettingsDrawer();
    };
  });

  // so the cutoff inputs swap shape immediately.

      const v = p.dataset.cim;

      render();
      openSettingsDrawer();

  renderRecycleBinList(drawer.querySelector('#recycleBinList'));

  // 4c: Wire cutoff inputs. Two shapes: <select> (dropdown mode) or
  // <input type="text"> (typed mode). Save on change/blur.
  ['workCutoffSoft', 'workCutoffHard', 'communityCutoffSoft', 'communityCutoffHard'].forEach(key => {
    const el = drawer.querySelector('#' + key);
    if (!el) return;
    if (el.tagName === 'SELECT') {
      el.onchange = () => {
        state.settings[key] = el.value;
        saveState();
        render();
      };
    } else {
      // Typed input. Normalise on blur. Re-render to refresh fade/nav.
      el.onblur = () => {
        const raw = el.value.trim().toLowerCase();
        if (raw === '' || raw === 'off') {
          state.settings[key] = 'off';
          el.value = 'off';
        } else {
          const normalised = normaliseTimeInput(raw);
          if (normalised) {
            state.settings[key] = normalised;
            el.value = formatTimeDisplay(normalised);
          } else {
            // Invalid - reset display to current saved value
            const cur = state.settings[key] || 'off';
            el.value = cur === 'off' ? 'off' : formatTimeDisplay(cur);
            toast('time format: 17:00, 5pm, off', false);
          }
        }
        saveState();
        render();
      };
      el.onkeydown = (ev) => { if (ev.key === 'Enter') el.blur(); };
    }
  });

  ['workCutoffSoftWeekends', 'workCutoffHardWeekends', 'communityCutoffSoftWeekends', 'communityCutoffHardWeekends'].forEach(key => {
    const cb = drawer.querySelector('#' + key);
    if (!cb) return;
    cb.onchange = () => {
      state.settings[key] = cb.checked;
      saveState();
      render();
    };
  });

  drawer.querySelector('#restartOnboarding').onclick = () => {
    closeDrawers();
    state.onboarded = false;
    saveState();
    render();
  };

  drawer.querySelector('#wipeAll').onclick = () => {
    if (!confirm('This will wipe all data. Continue?')) return;
    resetState();
    render();
    toast('cleared.');
  };
}
