.cal-cell:hover { background: var(--cream); transform: translate(-1px, -1px); box-shadow: 0 0 0 1.5px var(--ink), 2px 2px 0 var(--ink); }

.cal-cell.other-month { background: transparent; box-shadow: none; opacity: 0.4; cursor: default; }
.cal-cell.other-month:hover { transform: none; box-shadow: none; background: transparent; }

.cal-cell.today {
  background: var(--pink);
  box-shadow: 0 0 0 1.5px var(--ink), 3px 3px 0 var(--ink);
}

.cal-cell.today:hover { background: var(--pink); }
.cal-cell.today .cal-cell-num { color: var(--cream); }
.cal-cell.today .cal-event-dot { background: var(--butter); }

.cal-cell.past { opacity: 0.65; }

.cal-cell-num {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 3px;
}

.cal-cell-events {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  overflow: hidden;
}

.cal-cell-event {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  line-height: 1.25;
  color: var(--ink);
  background: var(--cream);
  padding: 2px 4px;
  border-radius: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  box-shadow: inset 0 0 0 1px var(--ink);
}

.cal-cell-event.countdown { background: var(--pink); color: var(--cream); }
.cal-cell-event.countdown { box-shadow: inset 0 0 0 1px var(--ink); }

.cal-cell.today .cal-cell-event { background: var(--cream); color: var(--ink); }

.cal-cell-more {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  color: var(--mute);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
  margin-top: auto;
}

.cal-cell.today .cal-cell-more { color: var(--cream); }

/* Mobile: compact cells, hide event chips, just show dots */
@media (max-width: 640px) {
  .cal-grid { gap: 2px; }
  .cal-cell { padding: 4px; min-height: 42px; }
  .cal-cell-num { font-size: 11px; }
  .cal-cell-event { display: none; }
  .cal-cell-more { display: none; }
  .cal-cell.has-events::after {
    content: '';
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--pink);
    box-shadow: 0 0 0 1px var(--ink);
  }
  .cal-cell.today.has-events::after { background: var(--butter); }
  .cal-cell.has-countdown::after { background: var(--pink); }
}

/* Selected day details strip below the calendar */
.cal-selected-day {
  padding: 14px 0 4px;
  border-top: 2px dashed var(--rule);
  margin-top: 10px;
}

.cal-selected-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 8px;
}

.cal-selected-date {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-style: italic;
  font-size: 16px;
}

/* 4c (option B): Two-column calendar layout on wide desktop.
   Calendar capped at 720px on the left, upcoming events list on the right.
   Below 1180px viewport, calendar centres at max 720px and upcoming hides
   (the existing List view toggle covers that ground on narrower screens). */
.cal-with-upcoming { display: block; }
.cal-main {
  max-width: 720px;
  margin: 0 auto;
}
.cal-upcoming { display: none; }

@media (min-width: 1180px) {
  .cal-with-upcoming {
    display: grid;
    grid-template-columns: 720px minmax(0, 1fr);
    gap: 22px;
    align-items: start;
  }
  .cal-with-upcoming .cal-main { margin: 0; }
  .cal-with-upcoming .cal-upcoming { display: block; }
}

.cal-upcoming-label {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  background: var(--ink);
  color: var(--sky);
  padding: 3px 10px;
  border-radius: 100px;
  margin-bottom: 14px;
  font-weight: 500;
}

.cal-upcoming-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.cal-upcoming-item {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  padding: 10px 12px;
  background: var(--cream-2);
  border-radius: var(--r-sm);
  box-shadow: inset 0 0 0 1px var(--rule);
  border: none;
  font-family: inherit;
  text-align: left;
  width: 100%;
  cursor: pointer;
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  color: var(--ink);
}

.cal-upcoming-item:hover {
  transform: translate(-1px, -1px);
  box-shadow: inset 0 0 0 1px var(--rule), 2px 2px 0 var(--ink);
  background: var(--cream);
}

.cal-upcoming-item.countdown {
  border-left: 3px solid var(--pink);
  padding-left: 9px;
}

.cal-upcoming-item.selected {
  background: var(--pink-cream);
  box-shadow: inset 0 0 0 1.5px var(--ink), 2px 2px 0 var(--ink);
}

.cal-upcoming-item.past {
  opacity: 0.6;
}

.cal-upcoming-date {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--mute);
  min-width: 64px;
  font-weight: 500;
}

.cal-upcoming-item.selected .cal-upcoming-date,
.cal-upcoming-item.selected .cal-upcoming-meta { color: var(--ink); }

.cal-upcoming-title {
  font-size: 14px;
  font-weight: 500;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.cal-upcoming-meta {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.05em;
  color: var(--mute);
}

.cal-upcoming-empty {
  padding: 14px 0 4px;
  text-align: left;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--mute);
  line-height: 1.5;
}

/* ==========================================================
   ONE THING CARD (3d)
   ========================================================== */
.one-thing-card {
  background: var(--butter);
  border-radius: var(--r-lg);
  box-shadow: 0 0 0 2.5px var(--ink), 6px 6px 0 var(--pink);
  padding: 28px 32px;
  position: relative;
  overflow: hidden;
}

.one-thing-card::before {
  content: '✦';
  position: absolute;
  top: -10px;
  right: 20px;
  font-size: 140px;
  color: var(--butter-deep);
  opacity: 0.4;
  line-height: 1;
  font-family: 'Fraunces', serif;
}

.one-thing-inner { position: relative; z-index: 1; }

.one-thing-card .card-label { background: var(--ink); color: var(--butter); }

.one-thing-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 8px;
  font-weight: 500;
}

.one-thing-text {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-style: italic;
  font-size: clamp(22px, 3.2vw, 32px);
  line-height: 1.15;
  color: var(--ink);
  margin-bottom: 14px;
  letter-spacing: -0.01em;
}

.one-thing-mode {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--ink-soft);
  text-transform: uppercase;
}

.one-thing-actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
}

/* Time-of-day accent for the dashboard */
.tod-hint {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--mute);
  margin: -6px 0 16px;
  padding: 0 4px;
}

.tod-hint .tod-verb {
  color: var(--pink-deep);
  font-weight: 600;
}

/* ==========================================================
   INSTALL HINT
   ========================================================== */
.install-hint {
  margin-top: 40px;
  padding: 16px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--mute);
  text-align: center;
  border-top: 2px dashed var(--rule);
  line-height: 1.6;
}

.install-hint strong {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0;
  color: var(--ink);
  display: block;
  margin-bottom: 4px;
}
/* ==========================================================
   LISTS LANDING + BOARD GAMES VIEW
   ========================================================== */

/* --- Lists landing grid --- */
.lists-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
  margin-top: 4px;
}

.list-card {
  display: flex;
  align-items: stretch;
  gap: 16px;
  padding: 22px 20px;
  background: var(--cream);
  border: none;
  border-radius: var(--r-md);
  box-shadow: 0 0 0 2.5px var(--ink), 5px 5px 0 var(--pink);
  cursor: pointer;
  text-align: left;
  font: inherit;
  color: inherit;
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
}

.list-card:hover {
  transform: translate(-2px, -2px);
  box-shadow: 0 0 0 2.5px var(--ink), 7px 7px 0 var(--pink);
}

.list-card:focus-visible {
  outline: 3px solid var(--pink);
  outline-offset: 4px;
}

.list-card-glyph {
  font-family: 'DM Mono', monospace;
  font-size: 38px;
  line-height: 1;
  color: var(--pink);
  flex: 0 0 auto;
}

.list-card-body { flex: 1; min-width: 0; }

.list-card-name {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 6px;
}

.list-card-blurb {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--mute);
  line-height: 1.4;
  margin-bottom: 10px;
}

.list-card-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  background: var(--pink-cream);
  padding: 3px 8px;
  border-radius: 100px;
  display: inline-block;
}

/* --- Board Games: back row --- */
.bg-back-row {
  margin: 12px 0 16px;
}

.bg-back-btn {
  background: transparent;
  border: 1.5px solid var(--ink);
  border-radius: 100px;
  padding: 5px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--ink);
  cursor: pointer;
  transition: transform var(--dur) var(--ease), background var(--dur) var(--ease);
}

.bg-back-btn:hover {
  transform: translate(-1px, -1px);
  background: var(--cream-2);
}

/* --- Filter card --- */
.bg-filter-card {
  padding-top: 18px;
  padding-bottom: 18px;
}

.bg-filter-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
  padding: 10px 0;
  border-top: 1px dashed rgba(26, 14, 26, 0.18);
}

.bg-filter-row:first-of-type { border-top: none; padding-top: 4px; }

.bg-filter-label {
  flex: 0 0 70px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  padding-top: 7px;
}

.bg-search {
  flex: 1;
  min-width: 180px;
  background: var(--cream);
  border: 1.5px solid var(--ink);
  border-radius: 100px;
  padding: 8px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--ink);
}

.bg-search:focus {
  outline: 3px solid var(--pink);
  outline-offset: 2px;
}

.bg-stepper {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 0;
  background: var(--cream);
  border: 1.5px solid var(--ink);
  border-radius: 100px;
  padding: 3px;
}

.bg-stepper-btn {
  background: transparent;
  border: none;
  padding: 6px 12px;
  border-radius: 100px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink);
  cursor: pointer;
  min-width: 38px;
  min-height: 30px;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}

.bg-stepper-btn:hover {
  background: var(--pink-cream);
}

.bg-stepper-btn.active {
  background: var(--pink);
  color: var(--cream);
}

.bg-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 8px;
  flex: 1;
  min-width: 0;
}

.bg-tag-chip {
  background: var(--cream);
  color: var(--ink);
  border: 1.5px solid var(--ink);
  border-radius: 100px;
  padding: 5px 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 12px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: transform var(--dur) var(--ease), background var(--dur) var(--ease), color var(--dur) var(--ease);
}

.bg-tag-chip:hover { transform: translate(-1px, -1px); background: var(--pink-cream); }

.bg-tag-chip.active {
  background: var(--pink);
  color: var(--cream);
  border-color: var(--ink);
}

.bg-chip-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  background: rgba(26, 14, 26, 0.12);
  padding: 1px 6px;
  border-radius: 100px;
  color: var(--ink);
}

.bg-tag-chip.active .bg-chip-count {
  background: rgba(255, 243, 232, 0.25);
  color: var(--cream);
}

.bg-duration-chip {
  flex-direction: column;
  align-items: flex-start;
  padding: 6px 12px;
  line-height: 1.2;
}

.bg-chip-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.05em;
  color: var(--mute);
  text-transform: uppercase;
}

.bg-tag-chip.active .bg-chip-sub { color: var(--pink-cream); }

.bg-filter-footer {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed rgba(26, 14, 26, 0.18);
}

/* --- Results --- */
.bg-results-summary {
  margin: 6px 4px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--mute);
}

.bg-results-count { color: var(--ink); }

.bg-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
}

@media (min-width: 760px) {
  .bg-grid { grid-template-columns: 1fr 1fr; }
}

.bg-game-card {
  padding: 20px 22px;
}

.bg-game-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 14px;
}

.bg-game-thumb {
  flex: 0 0 auto;
}

.bg-game-tile {
  width: 64px;
  height: 64px;
  background: var(--cream-2);
  color: var(--ink);
  border-radius: var(--r-sm);
  box-shadow: 0 0 0 2px var(--ink), 3px 3px 0 var(--ink);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* Tile background variants */
.bg-game-tile-pink      { background: var(--pink); }
.bg-game-tile-pink-soft { background: var(--pink-soft); }
.bg-game-tile-butter    { background: var(--butter); }
.bg-game-tile-sage      { background: var(--sage); }
.bg-game-tile-sky       { background: var(--sky); }
.bg-game-tile-peach     { background: var(--peach); }
.bg-game-tile-cream-2   { background: var(--cream-2); }
.bg-game-tile-cream-3   { background: var(--cream-3); }
.bg-game-tile-ink       { background: var(--ink); }

/* Tile foreground variants */
.bg-game-tile-fg-cream { color: var(--cream); }
.bg-game-tile-fg-ink   { color: var(--ink); }

.bg-game-tile-letter {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 32px;
  line-height: 1;
  letter-spacing: -0.02em;
}

.bg-game-tile-glyph {
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 11px;
  line-height: 1;
  opacity: 0.7;
  font-family: 'DM Mono', monospace;
}

.bg-game-thumb-img {
  width: 64px;
  height: 64px;
  object-fit: cover;
  border-radius: var(--r-sm);
  box-shadow: 0 0 0 2px var(--ink), 3px 3px 0 var(--ink);

<script>
/* ============================================================
   DATA MODEL
   ============================================================
   Unified task model (Phase 1b Chunk 1 - skeleton only):
   - state.tasks: single array, each task has mode + tier + done
   - state.modes: list of mode objects (stable: 6 default)
   - state.clients, state.orgs: sub-entities nested under Work / Community
   - state.settings: reduced motion, calm mode, focus mode, name
   ============================================================ */
const STORAGE_KEY = 'my-planner-v1b';

/* ------------------------------------------------------------
   PALETTE (4a)
   14 named swatches. Each id maps to a triple of CSS vars
   (base / soft / deep). The 'pink' id is the canonical default.
   Order here is the order shown in pickers.
   ------------------------------------------------------------ */
const PALETTE = [
  { id: 'pink',       name: 'Pink' },
  { id: 'bubblegum',  name: 'Bubblegum' },
  { id: 'coral',      name: 'Coral' },
  { id: 'peach',      name: 'Peach' },
  { id: 'butter',     name: 'Butter' },
  { id: 'lime',       name: 'Lime' },
  { id: 'sage',       name: 'Sage' },
  { id: 'mint',       name: 'Mint' },
  { id: 'sky',        name: 'Sky' },
  { id: 'cornflower', name: 'Cornflower' },
  { id: 'lavender',   name: 'Lavender' },
  { id: 'mauve',      name: 'Mauve' },
  { id: 'rose',       name: 'Rose' },
  { id: 'terracotta', name: 'Terracotta' }
];

const PALETTE_IDS = PALETTE.map(p => p.id);

// Look up the three CSS var/value triples for a given swatch id.
// Now handles both plain palette ids and computed tint/shade markers.
function swatchVars(id) {
  if (!id) id = 'pink';
  return {
    base: colourCssValue(id),
    soft: colourCssSoft(id),
    deep: colourCssDeep(id)
  };
}

// Auto-vary a sub-entity's colour from its parent. The child is
// ALWAYS lighter than the parent (consistent "paler belonging to"
// visual), and if the parent is itself a tint (e.g. cheese is a
// tint of coral), the child's tint will be MORE diluted than its
// parent's - so Family > cheese > crackers is a real cascade, not
// a coincidence match.
// Deterministic from the child's id so colours stay stable.
function autoVaryFromParent(parentColourId, subId) {
  // Work out the underlying palette id and how tinted the parent
  // already is. A plain palette id means parent tint level = 0.
  let paletteId = parentColourId;
  let parentTintPct = 0;
  if (isComputedColour(paletteId)) {
    const parts = paletteId.split(':');
    // tint:25:coral -> mode=tint, pct=25, paletteId=coral
    parentTintPct = parts[0] === 'tint' ? parseInt(parts[1], 10) : 0;
    paletteId = parts[2];
  }
  if (!paletteId || !PALETTE_IDS.includes(paletteId)) paletteId = 'pink';

  // Hash the id to a deterministic integer
  let h = 0;
  for (let i = 0; i < (subId || '').length; i++) {
    h = (h * 31 + subId.charCodeAt(i)) | 0;
  }

  // Child's tint must be strictly more diluted than parent's.
  // Minimum gap of 20 pts so the step between levels is clearly visible.
  // Cap at 80 so we don't disappear into the cream background.
  const minTint = Math.min(parentTintPct + 20, 65);
  const maxTint = 80;
  // Pick one of a few spots within the allowed range
  const range = maxTint - minTint;
  if (range <= 0) {
    // Already too tinted to cascade further. Stay close to parent level.
    return `tint:${Math.min(parentTintPct + 15, 85)}:${paletteId}`;
  }
  // 4 slots within the allowed range, chosen by hash
  const step = range / 4;
  const slotIdx = Math.abs(h) % 4;
  const pct = Math.round(minTint + slotIdx * step);
  return `tint:${pct}:${paletteId}`;
}

// Is this a computed auto-varied colour (tint/shade marker) or a plain palette id?
function isComputedColour(colourId) {
  return typeof colourId === 'string' && (colourId.startsWith('tint:') || colourId.startsWith('shade:'));
}

// Turn any colour id (plain palette or tint/shade marker) into a CSS colour value.
function colourCssValue(colourId) {
  if (!colourId) return `var(--pal-pink)`;
  if (isComputedColour(colourId)) {
    // Format: "tint:35:pink" or "shade:20:cornflower"
    const [mode, pctStr, paletteId] = colourId.split(':');
    const pct = parseInt(pctStr, 10);
    const target = mode === 'tint' ? 'var(--cream)' : 'var(--ink)';
    return `color-mix(in srgb, var(--pal-${paletteId}) ${100 - pct}%, ${target})`;
  }
  return `var(--pal-${colourId})`;
}

// Same idea for the -soft and -deep variants used by mastheads.
function colourCssSoft(colourId) {
  if (!colourId) return `var(--pal-pink-soft)`;
  if (isComputedColour(colourId)) {
    const [, , paletteId] = colourId.split(':');
    return `var(--pal-${paletteId}-soft)`;
  }
  return `var(--pal-${colourId}-soft)`;
}

function colourCssDeep(colourId) {
  if (!colourId) return `var(--pal-pink-deep)`;
  if (isComputedColour(colourId)) {
    const [mode, pctStr, paletteId] = colourId.split(':');
    // For deep, we want a darker version: lean toward ink more.
    // Use shade:30 against the parent's base.
    return `color-mix(in srgb, var(--pal-${paletteId}) 60%, var(--ink))`;
  }
  return `var(--pal-${colourId}-deep)`;
}

// 4c: Does this colour id need DARK text when used as a pill background?
// Rule of thumb: computed tint >= 25% is pale enough that cream text vanishes.
// Butter (and its tints) also need dark text because butter is a very light
// yellow even at full saturation.
function needsDarkText(colourId) {
  if (!colourId) return false;
  if (isComputedColour(colourId)) {
    const parts = colourId.split(':');
    if (parts[0] === 'tint') {
      const pct = parseInt(parts[1], 10);
      if (pct >= 25) return true;
      // Butter tinted at any level: dark text.
      if (parts[2] === 'butter') return true;
    }
    return false;
  }
  // Plain palette ids: butter and lime are light enough to need dark text at full strength.
  return colourId === 'butter' || colourId === 'lime';
}

const TILE_FALLBACK = { bg: 'cream-2', fg: 'ink', glyph: '✦' };

function tilePreset(game) {
  for (const t of game.tags) {
    const found = TILE_PRESETS.find(p => p.tag === t);
    if (found) return found;
  }
  return TILE_FALLBACK;
}

// First letter of name, ignoring leading articles.
function tileLetter(name) {
  const stripped = (name || '').replace(/^(the|a|an)\s+/i, '').trim();
  return (stripped.charAt(0) || '?').toUpperCase();
}

// All distinct tags across the dataset, sorted by frequency desc then alpha.
function boardGameTagCounts() {
  const counter = new Map();
  for (const g of BOARD_GAMES) {
    for (const t of g.tags) counter.set(t, (counter.get(t) || 0) + 1);
  }
  const entries = Array.from(counter.entries());
  entries.sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
  return entries; // array of [tag, count]
}

function formatPlayers(p) {
  if (p.min == null && p.max == null) return 'varies';
  if (p.max == null) return `${p.min}+`;
  if (p.min === p.max) return `${p.min}`;
  return `${p.min}-${p.max}`;
}

function formatAge(a) {
  if (a.min == null) return 'any';
  return `${a.min}+`;
}

function formatDuration(d) {
  if (d.label) return d.label;
  if (d.min == null) return 'varies';
  return `${d.min}-${d.max} min`;
}

function boardGameMatchesPlayers(game, n) {
  // Variable / unknown: always show, no constraint to apply
  if (game.players.min == null && game.players.max == null) return true;
  if (game.players.min != null && game.players.min > n) return false;
  if (game.players.max != null && game.players.max < n) return false;
  return true;
}

function boardGameMatchesAge(game, youngest) {
  // Unknown age min: don't filter out
  if (game.age.min == null) return true;
  return game.age.min <= youngest;
}

function filterBoardGames() {
  const f = state.boardGameFilters || {};
  const search = (f.search || '').toLowerCase().trim();
  return BOARD_GAMES.filter(g => {
    if (f.players != null && !boardGameMatchesPlayers(g, f.players)) return false;
    if (f.ageMin != null && !boardGameMatchesAge(g, f.ageMin)) return false;
    if (f.durations && f.durations.length && !f.durations.includes(g.duration.bucket)) return false;
    if (f.tags && f.tags.length) {
      const hit = g.tags.some(t => f.tags.includes(t));
      if (!hit) return false;
    }
    if (search) {
      const hay = (g.name + ' ' + g.description + ' ' + g.tags.join(' ') + ' ' + (g.publisher || '')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function activeBoardGameFilterCount() {
  const f = state.boardGameFilters || {};
  let n = 0;
  if (f.search) n++;
  if (f.players != null) n++;
  if (f.ageMin != null) n++;
  if (f.durations && f.durations.length) n++;
  if (f.tags && f.tags.length) n++;
  return n;
}

function clearBoardGameFilters() {
  state.boardGameFilters = { search: '', players: null, ageMin: null, durations: [], tags: [] };
  saveState();
  render();
}

let state = defaultState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = { ...defaultState(), ...parsed };
      // merge settings properly in case new keys added
      state.settings = { ...defaultState().settings, ...(parsed.settings || {}) };
      // Ensure modeColours object exists (added in 4a)
      state.modeColours = { ...(parsed.modeColours || {}) };
      // Ensure boardGameFilters has all expected keys
      const defaultBGF = defaultState().boardGameFilters;
      state.boardGameFilters = { ...defaultBGF, ...(parsed.boardGameFilters || {}) };
      // Coerce arrays in case stored shape is off
      if (!Array.isArray(state.boardGameFilters.durations)) state.boardGameFilters.durations = [];
      if (!Array.isArray(state.boardGameFilters.tags)) state.boardGameFilters.tags = [];
      // 4b: Ensure categories object and its slots exist
      state.categories = {
        personal: (parsed.categories && parsed.categories.personal) || [],
        'mortal-coil': (parsed.categories && parsed.categories['mortal-coil']) || []
      };
      // ensure task records have all fields (for older captures)
      state.tasks = (state.tasks || []).map(t => ({
        id: t.id || uid(),
        text: t.text || '',
        mode: t.mode || null,
        subId: t.subId || null,
        memberId: t.memberId || null, // 4b: Family level-2
        tier: t.tier || 'inbox',
        done: !!t.done,
        doneAt: t.doneAt || null,
        waitingOn: t.waitingOn || null,
        waitingSince: t.waitingSince || null,
        chips: t.chips || [],
        colour: t.colour || null,
        createdAt: t.createdAt || Date.now()
      }));
      // Ensure events have memberId
      state.events = (state.events || []).map(e => ({
        ...e,
        memberId: e.memberId || null
      }));
      // Ensure sub-entities have colour field (nullable = auto-vary)
      ['clients', 'orgs'].forEach(key => {
        state[key] = (state[key] || []).map(s => ({
          ...s,
          colour: s.colour || null
        }));
      });
      // Ensure households have colour + members array
      state.households = (state.households || []).map(h => ({
        id: h.id || uid(),
        name: h.name || '',
        colour: h.colour || null,
        members: (h.members || []).map(mem => ({
          id: mem.id || uid(),
          name: mem.name || '',
          colour: mem.colour || null
        }))
      }));
      // Ensure categories have colour
      ['personal', 'mortal-coil'].forEach(mid => {
        state.categories[mid] = (state.categories[mid] || []).map(c => ({
          id: c.id || uid(),
          name: c.name || '',
          colour: c.colour || null
        }));
      });
    }
  } catch (e) {
    console.warn('Load failed, starting fresh', e);
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('Save failed', e);
  }
}

function resetState() {
  state = defaultState();
  saveState();
}

const uid = () => Math.random().toString(36).slice(2, 10);

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function toast(msg, sparkle = true) {

// 4c: Interactive toast with an Undo button. Shown for ~5s. If user taps Undo
// before timeout, onUndo() is called. Otherwise the toast just fades.
// If a new undoToast is shown while one is active, the old one disappears
// (its action is still committed, just no longer undoable).
function undoToast(msg, onUndo) {

  if (!el) return;

    <span class="undo-msg"><span class="sparkle" style="color:var(--pink);margin-right:6px;">✦</span>${escapeHtml(msg)}</span>

}

/* ---------- Time-of-day awareness ---------- */
function timeOfDay() {
  // 4c: optional override from settings (for irregular rhythm or testing)
  if (state && state.settings && state.settings.timeOfDayOverride) {
    return state.settings.timeOfDayOverride;
  }
  const h = new Date().getHours();
  const day = new Date().getDay();
  if (day === 0 || day === 6) return 'weekend';
  if (h < 5) return 'late';
  if (h < 11) return 'morning';
  if (h < 17) return 'midday';
  if (h < 21) return 'evening';
  return 'late';
}

/* ------------------------------------------------------------
   4c: MODE CUTOFFS
   Two layers per mode (work and community):
   - soft cutoff: a fade + dismissible banner past the time
   - hard cutoff: mode hidden from nav until the next day

   Each cutoff has a time string ('HH:MM' or 'off') and a weekend flag.
   ------------------------------------------------------------ */
function todayDateKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function isWeekend() {
  const day = new Date().getDay();
  return day === 0 || day === 6;
}

// Returns true if `now` is past the cutoff time, taking weekend setting into account.
// timeStr: 'HH:MM' or 'off'. weekendsApply: boolean.
function isPastCutoff(timeStr, weekendsApply) {
  if (!timeStr || timeStr === 'off') return false;
  if (isWeekend() && !weekendsApply) return false;
  const m = timeStr.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return false;
  const cutoffH = parseInt(m[1], 10);
  const cutoffMin = parseInt(m[2], 10);
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const cutoffMins = cutoffH * 60 + cutoffMin;
  return nowMins >= cutoffMins;
}

function softCutoffActive(modeId) {
  if (modeId !== 'work' && modeId !== 'community') return false;
  const key = modeId === 'work' ? 'workCutoffSoft' : 'communityCutoffSoft';
  const wkKey = modeId === 'work' ? 'workCutoffSoftWeekends' : 'communityCutoffSoftWeekends';
  return isPastCutoff(state.settings[key], !!state.settings[wkKey]);
}

function hardCutoffActive(modeId) {
  if (modeId !== 'work' && modeId !== 'community') return false;
  const key = modeId === 'work' ? 'workCutoffHard' : 'communityCutoffHard';
  const wkKey = modeId === 'work' ? 'workCutoffHardWeekends' : 'communityCutoffHardWeekends';
  return isPastCutoff(state.settings[key], !!state.settings[wkKey]);
}

// 4c: Grace state. When hard cutoff hits and user is on the mode, they get
// a dialog with options to extend by 5 or 15 minutes. Each extension counts
// toward a 15-min cap. Tracked in-memory only (resets on app reload).
//   _cutoffGrace = { mode, startedAt, totalUsedMins, expiresAt }
function graceActiveFor(modeId) {
  if (!state._cutoffGrace) return false;
  if (state._cutoffGrace.mode !== modeId) return false;
  // Grace is active if the cap hasn't been hit yet
  if (graceCapHit()) return false;
  return true;
}

// True if hard cutoff is in effect AND the user has no active grace.
// Used by nav and setMode redirect logic.
function effectiveHardCutoff(modeId) {
  return hardCutoffActive(modeId) && !graceActiveFor(modeId);
}

function startCutoffGrace(modeId) {
  // 4c: When hard cutoff hits and the user wants to keep working, they get
  // a single 15-minute window starting now. The dialog can be snoozed for
  // 5 mins or hidden until the 15 is up, but the cap is fixed.
  const now = Date.now();
  state._cutoffGrace = {
    mode: modeId,
    startedAt: now,
    capExpiresAt: now + 15 * 60 * 1000,
    dialogShowsAt: now // dialog showing right now
  };
}

// Snooze the dialog for N minutes. Cap is unchanged.
// If snooze would go past cap, dialog is silenced for the rest of the cap.
function snoozeGraceDialog(addMins) {
  if (!state._cutoffGrace) return;
  const target = Date.now() + addMins * 60 * 1000;
  state._cutoffGrace.dialogShowsAt = Math.min(target, state._cutoffGrace.capExpiresAt);
}

// Hide the dialog for the rest of the grace window (no more interruptions).
function silenceGraceDialog() {
  if (!state._cutoffGrace) return;
  state._cutoffGrace.dialogShowsAt = state._cutoffGrace.capExpiresAt;
}

// 4c: Track the grace expiry timer so we can cancel/replace it.
let _graceExpiryTimer = null;

function clearCutoffGrace() {
  state._cutoffGrace = null;
  if (_graceExpiryTimer) {
    clearTimeout(_graceExpiryTimer);
    _graceExpiryTimer = null;
  }
}

function graceMsRemaining() {
  if (!state._cutoffGrace) return 0;
  return Math.max(0, state._cutoffGrace.capExpiresAt - Date.now());
}

// Has the grace window expired (15 min cap hit)?
function graceCapHit() {
  return state._cutoffGrace && Date.now() >= state._cutoffGrace.capExpiresAt;
}

// Should the dialog be visible right now?
function graceDialogDue() {
  if (!state._cutoffGrace) return false;
  return Date.now() >= state._cutoffGrace.dialogShowsAt && !graceCapHit();
}

// 4c: Schedule whatever's next. Either the dialog reappearing (snooze ended)
// or the cap being hit (kick out). One timer at a time.
function scheduleGraceExpiryCheck() {
  if (_graceExpiryTimer) {
    clearTimeout(_graceExpiryTimer);
    _graceExpiryTimer = null;
  }
  if (!state._cutoffGrace) return;
  const now = Date.now();
  // The next thing to handle is whichever comes first: the dialog reappearing
  // or the cap being hit.
  const nextEvent = Math.min(state._cutoffGrace.dialogShowsAt, state._cutoffGrace.capExpiresAt);
  const ms = nextEvent - now;
  if (ms <= 0) {
    render();
    return;
  }
  _graceExpiryTimer = setTimeout(() => {
    _graceExpiryTimer = null;
    if (graceCapHit()) {
      // 15 mins are up. Clear grace and bump.
      clearCutoffGrace();
      state.currentMode = 'dashboard';
      saveState();
    }
    render();
  }, ms);
}

// Has the user dismissed the cutoff banner today for this mode?
function cutoffBannerDismissedToday(modeId) {
  if (!state.cutoffBannerDismissed) return false;
  return state.cutoffBannerDismissed[modeId] === todayDateKey();
}

function dismissCutoffBanner(modeId) {
  if (!state.cutoffBannerDismissed) state.cutoffBannerDismissed = {};
  state.cutoffBannerDismissed[modeId] = todayDateKey();
  saveState();
}

// Rotating banner copy. Picks a stable line per mode per day.
const WORK_CUTOFF_LINES = [
  "It's after hours. The work will keep.",

  "The org has tomorrow. Take tonight."
];

function cutoffBannerCopy(modeId) {

}

// 4c: Normalise loose time input. Accepts "17:00", "17", "5pm", "5:30pm",
// "9am" etc. Returns 'HH:MM' string or null if unparseable.
function normaliseTimeInput(raw) {
  if (!raw) return null;
  const s = raw.toString().trim().toLowerCase().replace(/\s+/g, '');
  // Match patterns
  let h = null, mins = 0;
  let m = s.match(/^(\d{1,2}):(\d{2})(am|pm)?$/);
  if (m) {
    h = parseInt(m[1], 10);
    mins = parseInt(m[2], 10);
    const suffix = m[3];
    if (suffix === 'pm' && h < 12) h += 12;
    if (suffix === 'am' && h === 12) h = 0;
  } else {
    m = s.match(/^(\d{1,2})(am|pm)$/);
    if (m) {
      h = parseInt(m[1], 10);
      const suffix = m[2];
      if (suffix === 'pm' && h < 12) h += 12;
      if (suffix === 'am' && h === 12) h = 0;
    } else {
      m = s.match(/^(\d{1,2})$/);
      if (m) {
        h = parseInt(m[1], 10);
      }
    }
  }
  if (h === null || isNaN(h) || h < 0 || h > 23 || isNaN(mins) || mins < 0 || mins > 59) return null;
  return String(h).padStart(2, '0') + ':' + String(mins).padStart(2, '0');
}

// 4c: Format a time according to the user's timeFormat preference.
// Accepts either a Date object or an 'HH:MM' string.
// Returns '17:00' (24h) or '5 pm' / '5:30 pm' (12h).
function formatTimeDisplay(timeOrDate) {
  let h, mins;
  if (timeOrDate instanceof Date) {
    h = timeOrDate.getHours();
    mins = timeOrDate.getMinutes();
  } else if (typeof timeOrDate === 'string') {
    const m = timeOrDate.match(/^(\d{1,2}):(\d{2})$/);
    if (!m) return timeOrDate;
    h = parseInt(m[1], 10);
    mins = parseInt(m[2], 10);
  } else {
    return '';
  }
  const fmt = (state && state.settings && state.settings.timeFormat) || '24h';
  if (fmt === '12h') {
    const period = h >= 12 ? 'pm' : 'am';
    let h12 = h % 12;
    if (h12 === 0) h12 = 12;
    return mins === 0 ? `${h12} ${period}` : `${h12}:${String(mins).padStart(2, '0')} ${period}`;
  }
  return `${String(h).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
}

// 4c: Format a time for the cutoff hour dropdown. Same as formatTimeDisplay
// but always renders the on-the-hour format.
function formatHourLabel(hour24) {
  const h = parseInt(hour24, 10);
  const fmt = (state && state.settings && state.settings.timeFormat) || '24h';
  if (fmt === '12h') {
    const period = h >= 12 ? 'pm' : 'am';
    let h12 = h % 12;
    if (h12 === 0) h12 = 12;
    return `${h12} ${period}`;
  }
  return `${String(h).padStart(2, '0')}:00`;
}

// 4c: Build the HTML for a cutoff hour dropdown.
// Off + 24 hour entries.
function cutoffHourSelect(id, currentValue) {
  const options = ['<option value="off"' + ((currentValue === 'off' || !currentValue) ? ' selected' : '') + '>Off</option>'];
  for (let h = 0; h < 24; h++) {
    const v = String(h).padStart(2, '0') + ':00';
    const label = formatHourLabel(h);
    const sel = currentValue === v ? ' selected' : '';
    options.push(`<option value="${v}"${sel}>${escapeHtml(label)}</option>`);
  }
  return `<select class="cutoff-hour-select" id="${id}">${options.join('')}</select>`;
}

// 4c: Build the HTML for a typed cutoff time input. Accepts loose formats
// like "17:00", "5pm", "9:30am", "off". Normalised on blur.
function cutoffTypedInput(id, currentValue) {
  const display = (currentValue === 'off' || !currentValue) ? 'off' : formatTimeDisplay(currentValue);
  return `<input type="text" class="cutoff-typed-input" id="${id}" value="${escapeHtml(display)}" placeholder="off, 17:00, 5pm" inputmode="text">`;
}

// 4c: Single entry point. Dispatches based on user preference.
function cutoffInput(id, currentValue) {
  const mode = (state && state.settings && state.settings.cutoffInputMode) || 'dropdown';
  return mode === 'typed' ? cutoffTypedInput(id, currentValue) : cutoffHourSelect(id, currentValue);
}

function greetingCopy() {
  const tod = timeOfDay();

function formatClock() {

  const time = formatTimeDisplay(d);
  return `${date} · ${time}`;
}

function tasksInMode(modeId) {

// 4c: Combined view: what shows in Inbox depends on the active filter.

function addTask(text, opts) {

  };

}

function updateTask(id, patch) {
  const i = state.tasks.findIndex(t => t.id === id);
  if (i === -1) return null;
  // Handle waiting timestamp: starts fresh when a new waitingOn value is set
  if ('waitingOn' in patch) {
    if (patch.waitingOn && state.tasks[i].waitingOn !== patch.waitingOn) {
      patch.waitingSince = Date.now();
    } else if (!patch.waitingOn) {
      patch.waitingSince = null;
    }
  }
  state.tasks[i] = Object.assign({}, state.tasks[i], patch);
  saveState();
  return state.tasks[i];
}

function toggleDone(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  t.doneAt = t.done ? Date.now() : null;
  saveState();
}

/* ============================================================
   4d: Tick-complete sparkle burst
   ----------------------------------------------------------
   Spawns ~7 unicode sparkle glyphs from a DOM origin in random
   radial directions with rotation and gravity. Each particle
   self-cleans after the animation. Reduced motion is handled
   by the global @media (prefers-reduced-motion: reduce) rule,
   so we don't gate spawning here. Future: settings options
   for animation beyond reduced motion (parked).
   ============================================================ */
const TICK_BURST_GLYPHS = ['✦', '★', '❀'];
const TICK_BURST_COLOURS = [
  'var(--pal-pink)',
  'var(--pal-butter)',
  'var(--pal-coral)',
  'var(--pal-lavender)',
  'var(--pal-bubblegum)',
  'var(--pal-lime)'
];

function spawnTickBurst(originEl) {
  if (!originEl) return;
  const r = originEl.getBoundingClientRect();
  if (!r || (r.width === 0 && r.height === 0)) return;

  const cx = r.left + r.width / 2;
  const cy = r.top + r.height / 2;

  let layer = document.getElementById('sparkleLayer');
  if (!layer) {
    layer = document.createElement('div');
    layer.id = 'sparkleLayer';
    layer.setAttribute('aria-hidden', 'true');
    document.body.appendChild(layer);
  }

  const count = 7;
  const duration = 520;
  const spread = 56;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle-particle';
    el.textContent = TICK_BURST_GLYPHS[Math.floor(Math.random() * TICK_BURST_GLYPHS.length)];
    el.style.color = TICK_BURST_COLOURS[Math.floor(Math.random() * TICK_BURST_COLOURS.length)];
    el.style.left = (cx - 8) + 'px';
    el.style.top = (cy - 10) + 'px';

    // Radial spray with jitter, plus a downward dy bias for slight gravity feel
    const angle = (i / count) * Math.PI * 2 + (Math.random() * 0.6 - 0.3);
    const dist = spread * (0.7 + Math.random() * 0.5);
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist + 18;
    const rot = Math.random() * 540 - 270;

    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    el.style.setProperty('--rot', rot + 'deg');
    el.style.fontSize = (12 + Math.random() * 6) + 'px';
    el.style.animation = `tick-burst ${duration}ms cubic-bezier(0.22, 0.61, 0.36, 1) forwards`;

    layer.appendChild(el);
    setTimeout(() => el.remove(), duration + 80);
  }
}

function deleteTask(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  // 4c: send to recycle bin (24h grace period)
  if (!state.recycleBin) state.recycleBin = [];
  state.recycleBin.push({
    kind: 'task',
    deletedAt: Date.now(),
    item: { ...task }
  });
  saveState();
}

// 4c: Restore a previously deleted task. Used by undoToast and recycle bin restore.
function restoreTask(taskOrId) {
  // Accept either a task object (legacy/snapshot path) or just an id
  const id = typeof taskOrId === 'string' ? taskOrId : (taskOrId && taskOrId.id);
  if (!id) return;
  if (state.tasks.find(t => t.id === id)) return; // already there
  // Find in recycle bin
  if (!state.recycleBin) state.recycleBin = [];
  const binIdx = state.recycleBin.findIndex(e => e.kind === 'task' && e.item && e.item.id === id);
  let restored;
  if (binIdx >= 0) {
    restored = state.recycleBin[binIdx].item;
    state.recycleBin.splice(binIdx, 1);
  } else if (typeof taskOrId === 'object') {
    // Snapshot fallback (shouldn't normally happen since we always go via bin)
    restored = taskOrId;
  } else {
    return;
  }
  state.tasks.push(restored);
  saveState();
  render();
}

/* ============================================================
   NOTES (3a)
   Keys: 'mode' (e.g. 'work') or 'mode:subId' (e.g. 'work:abc123')
   or 'mode:subId:memberId' for Family member-scoped notes (4b).
   ============================================================ */
function noteKey(modeId, subId, memberId) {
  if (memberId) return `${modeId}:${subId}:${memberId}`;
  if (subId) return `${modeId}:${subId}`;
  return modeId;
}

function getNote(modeId, subId, memberId) {
  if (!state.notes) state.notes = {};
  return state.notes[noteKey(modeId, subId, memberId)] || '';
}

function setNote(modeId, subId, memberId, text) {
  if (!state.notes) state.notes = {};
  const key = noteKey(modeId, subId, memberId);
  if (!text || !text.trim()) {
    delete state.notes[key];
  } else {
    state.notes[key] = text;
  }
  saveState();
}

function getSubEntities(modeId) {
  if (modeId === 'work') return state.clients || [];
  if (modeId === 'community') return state.orgs || [];
  if (modeId === 'family') return state.households || [];
  if (modeId === 'personal') return (state.categories && state.categories.personal) || [];
  if (modeId === 'mortal-coil') return (state.categories && state.categories['mortal-coil']) || [];
  return [];
}

function subEntityLabel(modeId) {
  if (modeId === 'work') return 'client';
  if (modeId === 'community') return 'org';
  if (modeId === 'family') return 'household';
  if (modeId === 'personal' || modeId === 'mortal-coil') return 'category';
  return '';
}

// Plural label used in the sub-bar row ("Clients", "Orgs", "Categories"...)
function subEntityGroupLabel(modeId) {
  if (modeId === 'work') return 'Clients';
  if (modeId === 'community') return 'Orgs';
  if (modeId === 'family') return 'Households';
  if (modeId === 'personal' || modeId === 'mortal-coil') return 'Categories';
  return '';
}

// Which modes have sub-entities at all (everything except dashboard, inbox, waiting)
const MODES_WITH_SUBS = ['work', 'community', 'family', 'personal', 'mortal-coil'];

/* ------------------------------------------------------------
   4b: FAMILY LEVEL-2 MEMBER HELPERS
   Family is two-level: households, then members inside each.
   ------------------------------------------------------------ */
function getHousehold(householdId) {
  if (!householdId) return null;
  return (state.households || []).find(h => h.id === householdId) || null;
}

function getMembers(householdId) {
  const h = getHousehold(householdId);
  return h ? (h.members || []) : [];
}

function getMember(householdId, memberId) {
  if (!householdId || !memberId) return null;
  const members = getMembers(householdId);
  return members.find(m => m.id === memberId) || null;
}

function addMember(householdId, name) {
  const h = getHousehold(householdId);
  if (!h) return null;
  if (!h.members) h.members = [];
  const m = { id: uid(), name: name.trim(), colour: null };
  h.members.push(m);
  saveState();
  return m;
}

function deleteMember(householdId, memberId, options = {}) {
  const h = getHousehold(householdId);
  if (!h) return;
  const cascade = options.cascade === true; // delete tasks/events too?
  h.members = (h.members || []).filter(m => m.id !== memberId);
  if (cascade) {
    state.tasks = state.tasks.filter(t => !(t.mode === 'family' && t.subId === householdId && t.memberId === memberId));
    state.events = state.events.filter(e => !(e.mode === 'family' && e.subId === householdId && e.memberId === memberId));
  } else {
    // Unassign any tasks/events that pointed at this member (they stay on the household)
    state.tasks.forEach(t => {
      if (t.mode === 'family' && t.subId === householdId && t.memberId === memberId) {
        t.memberId = null;
      }
    });
    state.events.forEach(e => {
      if (e.mode === 'family' && e.subId === householdId && e.memberId === memberId) {
        e.memberId = null;
      }
    });
  }
  saveState();
}

/* ------------------------------------------------------------
   4c: Counts of items linked to a sub-entity (used by delete confirm)
   ------------------------------------------------------------ */
function countLinkedToSub(modeId, subId, memberId) {
  const taskMatch = (t) => {
    if (t.mode !== modeId || t.subId !== subId) return false;
    if (memberId !== undefined) return t.memberId === memberId;
    return true;
  };
  const eventMatch = (e) => {
    if (e.mode !== modeId || e.subId !== subId) return false;
    if (memberId !== undefined) return e.memberId === memberId;
    return true;
  };
  return {
    tasks: state.tasks.filter(taskMatch).length,
    events: state.events.filter(eventMatch).length
  };
}

/* ------------------------------------------------------------
   4c: Delete a sub-entity (client/org/category/household).
   options.cascade = true → delete linked tasks and events too
   options.cascade = false → unassign linked tasks/events, they fall back to the mode
   For households, members inside go too (their tasks fall back / get deleted by the same rule).
   ------------------------------------------------------------ */
function deleteSubEntity(modeId, subId, options = {}) {
  const cascade = options.cascade === true;

  // Remove the sub-entity from its list
  if (modeId === 'work') {
    state.clients = (state.clients || []).filter(s => s.id !== subId);
  } else if (modeId === 'community') {
    state.orgs = (state.orgs || []).filter(s => s.id !== subId);
  } else if (modeId === 'family') {
    state.households = (state.households || []).filter(h => h.id !== subId);
  } else if (modeId === 'personal' || modeId === 'mortal-coil') {
    if (state.categories && state.categories[modeId]) {
      state.categories[modeId] = state.categories[modeId].filter(s => s.id !== subId);
    }
  }

  // Handle linked tasks and events
  if (cascade) {
    state.tasks = state.tasks.filter(t => !(t.mode === modeId && t.subId === subId));
    state.events = state.events.filter(e => !(e.mode === modeId && e.subId === subId));
  } else {
    state.tasks.forEach(t => {
      if (t.mode === modeId && t.subId === subId) {
        t.subId = null;
        t.memberId = null;
      }
    });
    state.events.forEach(e => {
      if (e.mode === modeId && e.subId === subId) {
        e.subId = null;
        e.memberId = null;
      }
    });
  }

  // If the deleted sub-entity is currently active, clear it
  if (state.currentMode === modeId && state.currentSubId === subId) {
    state.currentSubId = null;
    state.currentMemberId = null;
  }

  saveState();
}

/* ------------------------------------------------------------
   COLOUR RESOLUTION (4a)
   modeColour(modeId)          -> palette id, user override or default
   subColour(modeId, subId)    -> palette id, user pick or auto-varied
   taskColour(task)            -> palette id, task > sub > mode cascade
   colourVars(paletteId)       -> { '--mode-colour': 'var(--pal-x)', ... }
   ------------------------------------------------------------ */
function modeColour(modeId) {
  if (state.modeColours && state.modeColours[modeId]) {
    return state.modeColours[modeId];
  }
  const m = DEFAULT_MODES.find(x => x.id === modeId);
  return m && m.colour ? m.colour : 'pink';
}

function subColour(modeId, subId) {
  if (!subId) return modeColour(modeId);
  const subs = getSubEntities(modeId);
  const sub = subs.find(s => s.id === subId);
  if (sub && sub.colour) return sub.colour;
  // Auto-vary from parent mode
  return autoVaryFromParent(modeColour(modeId), subId);
}

// 4b: Family level-2 member colour. Varies from its household.
function memberColour(householdId, memberId) {
  if (!householdId || !memberId) return modeColour('family');
  const m = getMember(householdId, memberId);
  if (m && m.colour) return m.colour;
  // Auto-vary from the household's resolved colour
  return autoVaryFromParent(subColour('family', householdId), memberId);
}

function taskColour(task) {
  if (!task) return 'pink';
  if (task.colour) return task.colour;
  // 4b: Family member > household > mode
  if (task.mode === 'family' && task.subId && task.memberId) {
    return memberColour(task.subId, task.memberId);
  }
  if (task.mode && task.subId) return subColour(task.mode, task.subId);
  if (task.mode) return modeColour(task.mode);
  return 'pink';
}

// Build inline style string that sets --mode-colour trio from a palette id.
function colourStyle(paletteId, varPrefix) {
  const prefix = varPrefix || '--mode-colour';
  const v = swatchVars(paletteId);
  return `${prefix}: ${v.base}; ${prefix}-soft: ${v.soft}; ${prefix}-deep: ${v.deep};`;
}

/* ============================================================
   EVENTS + COUNTDOWNS (3b)
   ============================================================ */
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function daysUntil(iso) {
  if (!iso) return null;
  const target = new Date(iso + 'T00:00:00');
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  return Math.round((target - now) / 86400000);
}

function formatEventDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
}

function allEvents() {
  return state.events || [];
}

function upcomingEvents(limit) {
  const all = allEvents()
    .filter(e => daysUntil(e.date) != null && daysUntil(e.date) >= 0)
    .sort((a, b) => a.date.localeCompare(b.date));
  return limit ? all.slice(0, limit) : all;
}

function eventsInMode(modeId, subId, memberId) {
  if (!modeId) return allEvents();
  let base = allEvents().filter(e => e.mode === modeId);
  if (subId !== undefined && subId !== null) base = base.filter(e => e.subId === subId);
  if (memberId !== undefined && memberId !== null) base = base.filter(e => e.memberId === memberId);
  return base;
}

function upcomingCountdowns(limit) {
  const all = allEvents()
    .filter(e => e.isCountdown && daysUntil(e.date) != null && daysUntil(e.date) >= 0)
    .sort((a, b) => daysUntil(a.date) - daysUntil(b.date));
  return limit ? all.slice(0, limit) : all;
}

function addEvent(opts) {
  opts = opts || {};
  if (!state.events) state.events = [];
  const event = {
    id: uid(),
    title: (opts.title || '').trim(),
    date: opts.date || todayISO(),
    mode: opts.mode || null,
    subId: opts.subId || null,
    memberId: opts.memberId || null, // 4b
    isCountdown: !!opts.isCountdown,
    createdAt: Date.now()
  };
  state.events.push(event);
  saveState();
  return event;
}

function updateEvent(id, patch) {
  if (!state.events) return null;
  const i = state.events.findIndex(e => e.id === id);
  if (i === -1) return null;
  state.events[i] = Object.assign({}, state.events[i], patch);
  saveState();
  return state.events[i];
}

function deleteEvent(id) {
  if (!state.events) return;
  const event = state.events.find(e => e.id === id);
  if (!event) return;
  state.events = state.events.filter(e => e.id !== id);
  // 4c: send to recycle bin (24h grace period)
  if (!state.recycleBin) state.recycleBin = [];
  state.recycleBin.push({
    kind: 'event',
    deletedAt: Date.now(),
    item: { ...event }
  });
  saveState();
}

// 4c: Restore a previously deleted event. Used by undoToast and recycle bin restore.
function restoreEvent(eventOrId) {
  const id = typeof eventOrId === 'string' ? eventOrId : (eventOrId && eventOrId.id);
  if (!id) return;
  if (!state.events) state.events = [];
  if (state.events.find(e => e.id === id)) return;
  if (!state.recycleBin) state.recycleBin = [];
  const binIdx = state.recycleBin.findIndex(e => e.kind === 'event' && e.item && e.item.id === id);
  let restored;
  if (binIdx >= 0) {
    restored = state.recycleBin[binIdx].item;
    state.recycleBin.splice(binIdx, 1);
  } else if (typeof eventOrId === 'object') {
    restored = eventOrId;
  } else {
    return;
  }
  state.events.push(restored);
  saveState();
  render();
}

// 4c: Purge bin entries older than 24 hours. Run at app start and could be
// called periodically. 24h chosen by spec.
function purgeOldRecycleBin() {
  if (!state.recycleBin || !state.recycleBin.length) return;
  const cutoff = Date.now() - 24 * 60 * 60 * 1000;
  const before = state.recycleBin.length;
  state.recycleBin = state.recycleBin.filter(e => e.deletedAt > cutoff);
  if (state.recycleBin.length !== before) saveState();
}

   APPLY SETTINGS
   ============================================================ */
function applySettings() {
  document.body.classList.toggle('reduced-motion', state.settings.reducedMotion);
  document.body.classList.toggle('calm-mode', state.settings.calmMode);
  document.body.classList.toggle('focus-mode', state.settings.focusMode);
}

/* ============================================================
   RENDER: MODE NAV
   ============================================================ */
function renderModeBar() {
  const bar = document.createElement('nav');
  bar.className = 'modes';
  bar.setAttribute('aria-label', 'Modes');

  // Dashboard first
  const dashBtn = document.createElement('button');
  dashBtn.className = 'mode-btn' + (state.currentMode === 'dashboard' ? ' active' : '');
  dashBtn.innerHTML = `<span class="glyph">●</span>Dashboard`;
  dashBtn.onclick = () => setMode('dashboard');
  bar.appendChild(dashBtn);

  // Inbox next, with count and pulse styling if anything sitting
  const inboxCount = inboxTasks().length;
  const inboxBtn = document.createElement('button');
  inboxBtn.className = 'mode-btn' + (state.currentMode === 'inbox' ? ' active' : '');
  if (inboxCount > 0) inboxBtn.classList.add('inbox-pulse');
  inboxBtn.innerHTML = `<span class="glyph">✦</span>Inbox`;
  if (inboxCount > 0) {
    inboxBtn.insertAdjacentHTML('beforeend', `<span class="count">${inboxCount}</span>`);
  }
  inboxBtn.onclick = () => setMode('inbox');
  bar.appendChild(inboxBtn);

  // Then the 5 taskable modes
  for (const m of DEFAULT_MODES) {
    if (m.id === 'dashboard') continue;
    // 4c: hide modes that are past hard cutoff today (unless grace is active)
    if (effectiveHardCutoff(m.id)) continue;
    const btn = document.createElement('button');
    const mC = modeColour(m.id);
    btn.className = 'mode-btn' + (state.currentMode === m.id ? ' active' : '') + (needsDarkText(mC) ? ' dark-text' : '');
    btn.setAttribute('style', colourStyle(mC));
    btn.innerHTML = `<span class="glyph">${m.glyph}</span>${escapeHtml(m.name)}`;

    // Count = open Now-tier tasks (the "this week" view)
    const count = state.tasks.filter(t => t.mode === m.id && !t.done && t.tier === 'now').length;
    if (count > 0) {
      btn.insertAdjacentHTML('beforeend', `<span class="count">${count}</span>`);
    }

    btn.onclick = () => setMode(m.id);
    bar.appendChild(btn);
  }

  // Waiting mode at the end, only if relevant
  const wc = waitingTasks().length;
  if (wc > 0 || state.currentMode === 'waiting') {
    const wb = document.createElement('button');
    wb.className = 'mode-btn' + (state.currentMode === 'waiting' ? ' active' : '');
    wb.innerHTML = `<span class="glyph">⏳</span>Waiting`;
    if (wc > 0) wb.insertAdjacentHTML('beforeend', `<span class="count">${wc}</span>`);
    wb.onclick = () => setMode('waiting');
    bar.appendChild(wb);
  }

  // Lists: reference catalogues (board games for now). Sits at the end so
  // active "doing" modes lead the bar, and reference browsing is last.
  const isOnAList = state.currentMode === 'lists' || (typeof state.currentMode === 'string' && state.currentMode.startsWith('list:'));
  const lb = document.createElement('button');
  lb.className = 'mode-btn' + (isOnAList ? ' active' : '');
  lb.innerHTML = `<span class="glyph">❋</span>Lists`;
  lb.onclick = () => setMode('lists');
  bar.appendChild(lb);

  return bar;
}

function setMode(id) {
  // 4c: Refuse to navigate to a hard-cutoff mode (unless grace is active).
  // Falls back to dashboard.
  if (effectiveHardCutoff(id)) {
    state.currentMode = 'dashboard';
    saveState();
    render();
    return;
  }
  state.currentMode = id;
  state.currentClientId = null;
  state.currentOrgId = null;
  state.currentSubId = null;
  state.currentMemberId = null; // 4b
  state.currentTier = 'now';
  state.calMonthOffset = 0;
  if (id !== 'inbox') state.triageIndex = 0;
  saveState();
  render();
  window.scrollTo({ top: 0, behavior: state.settings.reducedMotion ? 'auto' : 'smooth' });
}

function setSubEntity(subId) {
  state.currentSubId = subId || null;
  state.currentMemberId = null; // 4b: changing sub clears member
  state.currentTier = 'now';
  saveState();
  render();
  window.scrollTo({ top: 0, behavior: state.settings.reducedMotion ? 'auto' : 'smooth' });
}

// 4b: Family level-2 — select a household member (nested under currentSubId)
function setMember(memberId) {
  state.currentMemberId = memberId || null;
  state.currentTier = 'now';
  saveState();
  render();
  window.scrollTo({ top: 0, behavior: state.settings.reducedMotion ? 'auto' : 'smooth' });
}

   ============================================================ */
function renderQuickCapture() {
  const el = document.createElement('div');
  el.className = 'quick-capture';
  el.innerHTML = `
    <div class="qc-label">Capture →</div>
    <input class="qc-input" id="qcInput" placeholder="jot something. sort it later." autocomplete="off">
    <button class="qc-btn" id="qcBtn">Add ✦</button>
  `;

  const handleAdd = () => {
    const input = el.querySelector('#qcInput');
    const text = input.value.trim();
    if (!text) return;
    state.tasks.push({
      id: uid(),
      text,
      mode: null,       // unsorted
      subId: null,
      tier: 'inbox',    // everything starts in inbox
      done: false,
      waitingOn: null,
      createdAt: Date.now()
    });
    input.value = '';
    saveState();
    toast('captured. sort it later.');
    // Update inbox count in greeting and mode nav
    render();
  };

  el.querySelector('#qcBtn').onclick = handleAdd;

/* ============================================================
   RENDER: DASHBOARD
   ============================================================ */
function renderDashboard() {
  const root = document.createElement('div');

  // Time-of-day hint line above the grid
  const tod = timeOfDay();
  const todVerb = {
    morning: 'plan the day',
    midday:  'do the work',
    evening: 'review the day',
    weekend: 'do as you please',
    late:    'tread lightly'
  }[tod] || 'keep going';
  const hint = document.createElement('div');
  hint.className = 'tod-hint';
  hint.innerHTML = `✦ ${escapeHtml(tod === 'late' ? 'late' : tod)} view · <span class="tod-verb">${escapeHtml(todVerb)}</span>`;
  root.appendChild(hint);

  const grid = document.createElement('div');
  grid.className = 'dash-grid';

  // Dispatch to the variation builder
  const cards = buildDashboardCards(tod);
  cards.forEach(c => { if (c) grid.appendChild(c); });
  root.appendChild(grid);

  return root;
}

function buildDashboardCards(tod) {
  // Each builder returns a card element (or null to skip).
  // Ordering here is the variation.

  if (tod === 'morning') {
    // Plan the day: inbox first, then one-thing, today+tomorrow events, waiting, modes
    return [
      buildInboxCard(),
      buildOneThingCard(),
      buildEventsTodayCard(),
      buildNowCard(),
      buildWaitingCard(),
      buildModesOverviewCard(),
      buildDoneTodayCard()
    ];
  }

  if (tod === 'midday') {
    // Do the work: Now tier hero, one-thing, waiting, events, inbox, modes
    return [
      buildNowCard(),
      buildOneThingCard(),
      buildInboxCard(),
      buildWaitingCard(),
      buildEventsComingUpCard(),
      buildModesOverviewCard(),
      buildDoneTodayCard()
    ];
  }

  if (tod === 'evening') {
    // Review the day: Done today hero, tomorrow preview, unfinished Now, waiting, inbox, modes
    return [
      buildDoneTodayHeroCard(),
      buildTomorrowPreviewCard(),
      buildNowCard(),
      buildWaitingCard(),
      buildInboxCard(),
      buildEventsComingUpCard(),
      buildModesOverviewCard()
    ];
  }

  if (tod === 'weekend') {
    // Demote work: Personal + Community up, one-thing optional, events, inbox
    return [
      buildWeekendModesCard(),
      buildOneThingCard(),
      buildEventsComingUpCard(),
      buildInboxCard(),
      buildNowCard(),
      buildWaitingCard(),
      buildDoneTodayCard()
    ];
  }

  // late (after 9pm): quiet layout, done today first if there's anything, then gentle overview
  return [
    buildDoneTodayHeroCard(),
    buildTomorrowPreviewCard(),
    buildInboxCard(),
    buildNowCard(),
    buildWaitingCard(),
    buildEventsComingUpCard()
  ];
}

/* ============================================================
   DASHBOARD CARD BUILDERS (3d)
   ============================================================ */

function buildInboxCard() {
  const inbox = inboxTasks();
  const inboxCount = inbox.length;
  const card = document.createElement('div');
  card.className = 'candy candy-pink-cream span-6';
  card.innerHTML = `
    <span class="card-label">Inbox</span>
    ${inboxCount === 0
      ? `<div class="empty">Inbox: empty. <span class="sparkle">✦</span> Suspicious, but we'll take it.</div>`
      : `<div style="font-family:'Fraunces',serif;font-weight:700;font-size:24px;line-height:1.2;margin-bottom:10px;">
           ${inboxCount} thing${inboxCount === 1 ? '' : 's'} <em style="color:var(--pink-deep);">unsorted.</em>
         </div>
         <div style="font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--ink-soft);line-height:1.5;margin-bottom:14px;">
           Small piles are easy. Big piles are also easy, just slower.
         </div>
         <button class="pill-btn primary" data-act="triage">Triage now →</button>`
    }
