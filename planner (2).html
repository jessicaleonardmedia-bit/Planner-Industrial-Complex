    row.innerHTML = `
      <button class="mode-colour-swatch" data-mode="${m.id}" style="--swatch: var(--pal-${colour});" title="Change colour"></button>
      <div class="mode-colour-label"><span class="glyph">${m.glyph}</span>${escapeHtml(m.name)}</div>
      <div class="mode-colour-hint">${isDefault ? 'default' : PALETTE.find(p => p.id === colour)?.name || ''}</div>
    `;
    row.querySelector('.mode-colour-swatch').onclick = (e) => {
      openColourPopover(e.currentTarget, {
        currentColour: colour,
        allowInherit: false,
        onPick: (newId) => {
          state.modeColours[m.id] = newId;
          saveState();
          renderModeColoursList(host);
          render();
        },
        onReset: isDefault ? null : () => {
          delete state.modeColours[m.id];
          saveState();
          renderModeColoursList(host);
          render();
        }
      });
    };
    host.appendChild(row);
  });
}

/* ------------------------------------------------------------
   4c: RECYCLE BIN LIST
   Shows deleted tasks/events from the last 24h. Tap a row to expand
   and choose Restore. Auto-purges on app load.
   ------------------------------------------------------------ */
function formatBinAge(deletedAt) {
  const ms = Date.now() - deletedAt;
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + ' min ago';
  const hrs = Math.floor(mins / 60);
  if (hrs === 1) return 'about 1 hr ago';
  return hrs + ' hrs ago';
}

function formatBinExpires(deletedAt) {
  const ms = (deletedAt + 24 * 60 * 60 * 1000) - Date.now();
  if (ms <= 0) return 'expiring now';
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return 'gone in ' + mins + ' min';
  const hrs = Math.floor(mins / 60);
  return 'gone in ' + hrs + ' hr' + (hrs === 1 ? '' : 's');
}

function renderRecycleBinList(host) {
  if (!host) return;
  host.innerHTML = '';
  const bin = (state.recycleBin || []).slice().sort((a, b) => b.deletedAt - a.deletedAt);

  if (bin.length === 0) {
    host.innerHTML = `<div class="empty" style="padding:14px 0;font-size:13px;">Nothing here. <span class="sparkle">✦</span> Either you're decisive, or you've been holding it together.</div>`;
    return;
  }

  bin.forEach((entry, idx) => {
    const row = document.createElement('div');
    row.className = 'bin-row';
    const isExpanded = state._binExpanded === entry.item.id;
    const itemLabel = entry.kind === 'task'
      ? (entry.item.text || '(untitled task)')
      : (entry.item.title || '(untitled event)');
    const kindLabel = entry.kind === 'task' ? 'Task' : 'Event';

    row.innerHTML = `
      <button class="bin-row-summary" type="button" data-idx="${idx}">
        <span class="bin-row-kind">${kindLabel}</span>
        <span class="bin-row-text">${escapeHtml(itemLabel)}</span>
        <span class="bin-row-age">${escapeHtml(formatBinAge(entry.deletedAt))}</span>
      </button>
      ${isExpanded ? `
        <div class="bin-row-expanded">
          <div class="bin-row-meta">${escapeHtml(formatBinExpires(entry.deletedAt))}</div>
          <div class="bin-row-actions">
            <button class="pill-btn primary bin-restore" data-id="${entry.item.id}" data-kind="${entry.kind}">Restore</button>
            <button class="pill-btn small bin-purge-now" data-id="${entry.item.id}" data-kind="${entry.kind}">Delete now</button>
          </div>
        </div>
      ` : ''}
    `;

    row.querySelector('.bin-row-summary').onclick = () => {
      // Toggle expanded
      if (state._binExpanded === entry.item.id) {
        state._binExpanded = null;
      } else {
        state._binExpanded = entry.item.id;
      }
      renderRecycleBinList(host);
    };

    if (isExpanded) {
      row.querySelector('.bin-restore').onclick = () => {
        if (entry.kind === 'task') {
          restoreTask(entry.item.id);
        } else {
          restoreEvent(entry.item.id);
        }
        state._binExpanded = null;
        toast('restored.');
        renderRecycleBinList(host);
      };
      row.querySelector('.bin-purge-now').onclick = () => {
        // Permanently remove from bin
        state.recycleBin = (state.recycleBin || []).filter(e =>
          !(e.kind === entry.kind && e.item && e.item.id === entry.item.id)
        );
        state._binExpanded = null;
        saveState();
        toast('gone for good.');
        renderRecycleBinList(host);
      };
    }

    host.appendChild(row);
  });
}

// Opens a floating colour picker next to `anchorEl`.
// opts: { currentColour, allowInherit, inheritLabel, onPick(id), onReset? }
function openColourPopover(anchorEl, opts) {
  // Remove any existing popover
  document.querySelectorAll('.colour-popover').forEach(el => el.remove());

  const pop = document.createElement('div');
  pop.className = 'colour-popover';
  const title = opts.title || 'Pick a colour';

  // 4c: Optional rename section
  const renameHtml = opts.onRename ? `
    <div class="popover-section">
      <div class="popover-section-label">Name</div>
      <input type="text" class="popover-rename-input" id="popRename" value="${escapeHtml(opts.renameValue || '')}" />
    </div>
  ` : '';

  // 4c: Optional delete section
  const deleteHtml = opts.onDelete ? `
    <hr class="popover-divider" />
    <button class="popover-danger-btn" id="popDelete">Delete ${escapeHtml(opts.deleteLabel || 'this')}</button>
  ` : '';

  pop.innerHTML = `
    <h5>${escapeHtml(title)}</h5>
    ${renameHtml}
    ${opts.onRename ? '<div class="popover-section-label">Colour</div>' : ''}
    <div class="colour-picker" id="popPicker" style="margin-bottom:10px;"></div>
    ${opts.onReset ? `<button class="pill-btn small" id="popReset" style="margin-bottom:10px;">Reset to default</button>` : ''}
    ${deleteHtml}
  `;

  const picker = pop.querySelector('#popPicker');

  // Inherit swatch (first, when allowed)
  if (opts.allowInherit) {
    const inh = document.createElement('button');
    inh.className = 'swatch inherit' + (!opts.currentColour ? ' selected' : '');
    inh.title = opts.inheritLabel || 'Inherit';
    inh.onclick = () => {
      opts.onPick(null);
      pop.remove();
    };
    picker.appendChild(inh);
  }

  PALETTE.forEach(p => {
    const sw = document.createElement('button');
    sw.className = 'swatch' + (opts.currentColour === p.id ? ' selected' : '');
    sw.setAttribute('style', `--swatch: var(--pal-${p.id});`);
    sw.title = p.name;
    sw.onclick = () => {
      opts.onPick(p.id);
      pop.remove();
    };
    picker.appendChild(sw);
  });

  if (opts.onReset) {
    pop.querySelector('#popReset').onclick = () => {
      opts.onReset();
      pop.remove();
    };
  }

  // 4c: Wire rename input - save on Enter or blur, Esc cancels
  if (opts.onRename) {
    const input = pop.querySelector('#popRename');
    let cancelled = false;
    const commit = () => {
      if (cancelled) return;
      const newName = input.value.trim();
      if (newName && newName !== opts.renameValue) {
        opts.onRename(newName);
      }
    };
    input.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        commit();
        pop.remove();
      } else if (ev.key === 'Escape') {
        ev.preventDefault();
        cancelled = true;
        pop.remove();
      }
    });
    input.addEventListener('blur', commit);
  }

  // 4c: Wire delete button
  if (opts.onDelete) {
    pop.querySelector('#popDelete').onclick = () => {
      pop.remove();
      opts.onDelete();
    };
  }

  // Position: place below the anchor, constrained to viewport
  document.body.appendChild(pop);
  const rect = anchorEl.getBoundingClientRect();
  const popRect = pop.getBoundingClientRect();
  let left = rect.left + window.scrollX;
  let top = rect.bottom + window.scrollY + 8;
  // Keep on-screen horizontally
  const maxLeft = window.scrollX + window.innerWidth - popRect.width - 12;
  if (left > maxLeft) left = maxLeft;
  if (left < window.scrollX + 12) left = window.scrollX + 12;
  // If it would go below viewport, put it above instead
  if (rect.bottom + popRect.height + 20 > window.innerHeight) {
    top = rect.top + window.scrollY - popRect.height - 8;
  }
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';

  // Dismiss on click outside
  setTimeout(() => {
    const onDocClick = (ev) => {
      if (!pop.contains(ev.target) && ev.target !== anchorEl) {
        pop.remove();
        document.removeEventListener('click', onDocClick, true);
      }
    };
    document.addEventListener('click', onDocClick, true);
  }, 0);
}

/* ------------------------------------------------------------
   4c: Reusable confirm modal.
   opts: { title, body, actions: [{label, kind, onClick}] }
   kind can be 'primary' (pink), 'danger' (ink) or undefined (cream)
   Auto-closes on action click. Cancel always closes.
   ------------------------------------------------------------ */
/* ------------------------------------------------------------
   4c: Hard-cutoff grace dialog.
   Triggered when the user is currently on a hard-cutoff mode and grace
   isn't yet active. Opens a single 15-minute window starting now.
   The dialog shows a live countdown of the 15-min cap.
   - "Snooze 5 min": hides dialog for 5 min, then reappears (cap unchanged)
   - "Don't ask again": hides dialog for the rest of the cap
   - "Leave now": forfeit remaining time, go to dashboard
   When the cap is hit, user is kicked.
   ------------------------------------------------------------ */
function openCutoffGraceDialog(modeId) {
  // Remove any existing instance
  document.querySelectorAll('.grace-backdrop').forEach(el => el.remove());

  // Initialise grace if not yet started for this mode. This is what starts
  // the 15-minute cap counting down.
  if (!state._cutoffGrace || state._cutoffGrace.mode !== modeId) {
    startCutoffGrace(modeId);
  }

  const backdrop = document.createElement('div');
  backdrop.className = 'grace-backdrop';
  backdrop.setAttribute('role', 'dialog');
  backdrop.setAttribute('aria-modal', 'true');
  backdrop.setAttribute('aria-label', 'Cutoff grace');

  const modal = document.createElement('div');
  modal.className = 'grace-modal';

  const isCommunity = modeId === 'community';
  const headerCopy = isCommunity
    ? "Hard cutoff. You're meant to be done."
    : "Hard cutoff. Tools down time.";
  const subCopy = isCommunity
    ? "If you have to finish a thing, you've got 15 minutes."
    : "If you have to finish a thing, you've got 15 minutes.";

  modal.innerHTML = `
    <h4>${escapeHtml(headerCopy)}</h4>
    <p>${escapeHtml(subCopy)}</p>
    <div class="grace-countdown" id="graceCountdown"></div>
    <div class="grace-actions">
      <button class="pill-btn" id="graceSnooze5" type="button">Snooze 5 min</button>
      <button class="pill-btn" id="graceSilence" type="button">Don't ask again</button>
    </div>
    <div class="grace-meta" id="graceMeta"></div>
    <div class="grace-leave">
      <button class="pill-btn small" id="graceLeave" type="button">Leave now</button>
    </div>
  `;

  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);

  // ---- Update the live countdown ----
  let intervalId = null;

  function updateUI() {
    const countdownEl = modal.querySelector('#graceCountdown');
    const metaEl = modal.querySelector('#graceMeta');

    const msLeft = graceMsRemaining();

    if (msLeft > 0) {
      const mins = Math.floor(msLeft / 60000);
      const secs = Math.floor((msLeft % 60000) / 1000);
      countdownEl.textContent = `${mins}:${String(secs).padStart(2, '0')} remaining`;
      countdownEl.classList.remove('expired');
    } else {
      countdownEl.textContent = "Time's up.";
      countdownEl.classList.add('expired');
    }

    metaEl.textContent = '15 min cap from when this dialog first appeared';

    // Cap hit: kick out automatically
    if (msLeft <= 0) {
      cleanup();
      clearCutoffGrace();
      state.currentMode = 'dashboard';
      saveState();
      render();
    }
  }

  function cleanup() {
    if (intervalId) clearInterval(intervalId);
    backdrop.remove();
  }

  // Snooze: hide the dialog for 5 mins, then reappear (cap unchanged)
  modal.querySelector('#graceSnooze5').onclick = () => {
    snoozeGraceDialog(5);
    cleanup();
    render();
    scheduleGraceExpiryCheck();
  };

  // Silence: hide the dialog for the rest of the cap (no more interruptions)
  modal.querySelector('#graceSilence').onclick = () => {
    silenceGraceDialog();
    cleanup();
    render();
    scheduleGraceExpiryCheck();
  };

  // Leave: forfeit remaining time, go to dashboard
  modal.querySelector('#graceLeave').onclick = () => {
    cleanup();
    clearCutoffGrace();
    state.currentMode = 'dashboard';
    saveState();
    render();
  };

  // Initial render
  updateUI();
  // Refresh every second so the countdown ticks
  intervalId = setInterval(updateUI, 1000);
}

function openConfirmModal(opts) {
  // Remove any existing confirm modals
  document.querySelectorAll('.confirm-backdrop').forEach(el => el.remove());

  const backdrop = document.createElement('div');
  backdrop.className = 'confirm-backdrop';
  backdrop.setAttribute('role', 'dialog');
  backdrop.setAttribute('aria-modal', 'true');
  backdrop.setAttribute('aria-label', opts.title || 'Confirm');

  const modal = document.createElement('div');
  modal.className = 'confirm-modal';

  const titleHtml = opts.title ? `<h4>${escapeHtml(opts.title)}</h4>` : '';
  const bodyHtml = opts.body ? `<p>${escapeHtml(opts.body)}</p>` : '';
  modal.innerHTML = `
    ${titleHtml}
    ${bodyHtml}
    <div class="confirm-actions"></div>
  `;

  const actionsEl = modal.querySelector('.confirm-actions');
  (opts.actions || []).forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'pill-btn' + (a.kind === 'primary' ? ' primary' : a.kind === 'danger' ? ' ink' : '');
    btn.textContent = a.label;
    btn.onclick = () => {
      backdrop.remove();
      if (a.onClick) a.onClick();
    };
    actionsEl.appendChild(btn);
  });

  backdrop.appendChild(modal);
  // Click backdrop (not modal) cancels
  backdrop.addEventListener('click', (ev) => {
    if (ev.target === backdrop) backdrop.remove();
  });
  // Esc cancels
  const onKey = (ev) => {
    if (ev.key === 'Escape') {
      backdrop.remove();
      document.removeEventListener('keydown', onKey);
    }
  };
  document.addEventListener('keydown', onKey);

  document.body.appendChild(backdrop);
  // Focus first button for keyboard users
  const firstBtn = actionsEl.querySelector('button');
  if (firstBtn) firstBtn.focus();
}

function closeDrawers() {
  document.querySelectorAll('.drawer, .drawer-backdrop, .task-panel, .task-panel-backdrop').forEach(el => el.remove());
}

/* ============================================================
   TASK-EDIT PANEL (2c)
   ============================================================ */
function openTaskPanel(taskId) {
  closeDrawers();
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) return;

  const backdrop = document.createElement('div');
  backdrop.className = 'task-panel-backdrop';
  backdrop.onclick = closeDrawers;

  const panel = document.createElement('div');
  panel.className = 'task-panel';

  const tiersOptions = [
    { id: 'inbox', name: 'Inbox' },
    { id: 'now', name: 'Now' },
    { id: 'soon', name: 'Soon' },
    { id: 'someday', name: 'Someday' }
  ];

  const createdLabel = new Date(task.createdAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
  const doneLabel = task.done && task.doneAt
    ? ' · done ' + new Date(task.doneAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })
    : '';

  const waitingDays = daysSince(task.waitingSince);
  const waitingNote = task.waitingOn && waitingDays != null
    ? `<div class="wizard-note" style="margin-top:8px;">Waiting ${waitingDays} day${waitingDays === 1 ? '' : 's'}${waitingDays >= STALE_DAYS ? ' · stale, consider chasing' : ''}.</div>`
    : '';

  panel.innerHTML = `
    <button class="task-panel-close" id="taskClose">✕</button>
    <h3>Edit task</h3>
    <div class="task-panel-meta">Created ${escapeHtml(createdLabel)}${escapeHtml(doneLabel)}</div>

    <div class="task-panel-section">
      <h4>Text</h4>
      <textarea class="task-panel-text-input" id="tpText">${escapeHtml(task.text)}</textarea>
    </div>

    <div class="task-panel-section">
      <h4>Tier</h4>
      <div class="option-row">
        ${tiersOptions.map(t => `
          <button class="option tier-${t.id} ${task.tier === t.id ? 'active' : ''}" data-tier="${t.id}">${escapeHtml(t.name)}</button>
        `).join('')}
      </div>
    </div>

    <div class="task-panel-section">
      <h4>Mode</h4>
      <div class="option-row">
        <button class="option ${!task.mode ? 'active' : ''}" data-mode="">Unassigned</button>
        ${TASKABLE_MODES.map(mid => {
          const m = DEFAULT_MODES.find(x => x.id === mid);
          const colour = modeColour(mid);
          const darkClass = needsDarkText(colour) ? ' dark-text' : '';
          const styleAttr = `--sub-colour: ${colourCssValue(colour)};`;
          return `<button class="option${task.mode === mid ? ' active' : ''}${darkClass}" style="${styleAttr}" data-mode="${mid}">${m.glyph} ${escapeHtml(m.name)}</button>`;
        }).join('')}
      </div>
    </div>

    <div class="task-panel-section" id="tpSubSection" style="display:none;">
      <h4 id="tpSubLabel">Sub-entity</h4>
      <div class="option-row" id="tpSubRow"></div>
    </div>

    <div class="task-panel-section" id="tpMemberSection" style="display:none;">
      <h4 id="tpMemberLabel">Who</h4>
      <div class="option-row" id="tpMemberRow"></div>
    </div>

    <div class="task-panel-section">
      <h4>Tags</h4>
      <div class="option-row">
        ${CHIP_TYPES.map(c => `
          <button class="option chip-opt ${c.cls} ${(task.chips||[]).includes(c.id) ? 'active' : ''}" data-chip="${c.id}">${escapeHtml(c.label)}</button>
        `).join('')}
      </div>
    </div>

    <div class="task-panel-section">
      <h4>Colour</h4>
      <div id="tpColourRow" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="mode-colour-swatch" id="tpColourSwatch" title="Change colour"></button>
        <div class="mode-colour-hint" id="tpColourHint"></div>
      </div>
      <div class="colour-picker-note">Leave as inherit to follow the mode (or client, org, household) this task belongs to.</div>
    </div>

    <div class="task-panel-section">
      <h4>Waiting on someone?</h4>
      <div class="waiting-input-row">
        <input class="waiting-input" id="tpWaiting" placeholder="e.g. Amelia, Gaffoor, hosting provider" value="${escapeHtml(task.waitingOn || '')}">
        <button class="pill-btn" id="tpWaitingClear"${!task.waitingOn ? ' style="opacity:0.5;"' : ''}>Clear</button>
      </div>
      ${waitingNote}
    </div>

    <div class="task-panel-actions">
      <button class="pill-btn ink" id="tpDelete">Delete task</button>
      <div style="display:flex;gap:8px;">
        <button class="pill-btn" id="tpCancel">Cancel</button>
        <button class="pill-btn primary" id="tpSave">Save</button>
      </div>
    </div>
  `;

  document.body.appendChild(backdrop);
  document.body.appendChild(panel);

  // Stage changes locally, commit on Save
  const staged = {
    text: task.text,
    tier: task.tier,
    mode: task.mode,
    subId: task.subId || null,          // 4b
    memberId: task.memberId || null,    // 4b
    chips: (task.chips || []).slice(),
    waitingOn: task.waitingOn,
    colour: task.colour || null
  };

  // 4b: re-render sub-entity and member pickers based on staged.mode / staged.subId
  function renderTaskSubSection() {
    const section = panel.querySelector('#tpSubSection');
    const memberSection = panel.querySelector('#tpMemberSection');
    const subRow = panel.querySelector('#tpSubRow');
    const subLabel = panel.querySelector('#tpSubLabel');
    if (!section || !subRow) return;

    if (!staged.mode || !MODES_WITH_SUBS.includes(staged.mode)) {
      section.style.display = 'none';
      memberSection.style.display = 'none';
      return;
    }

    const subs = getSubEntities(staged.mode);
    const groupLabel = subEntityGroupLabel(staged.mode);
    subLabel.textContent = groupLabel || 'Sub-entity';

    if (!subs.length) {
      section.style.display = 'block';
      subRow.innerHTML = `<div class="colour-picker-note">No ${escapeHtml(subEntityLabel(staged.mode))}s yet. Add one from the ${escapeHtml(DEFAULT_MODES.find(m => m.id === staged.mode).name)} view.</div>`;
      memberSection.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    let html = `<button class="option ${!staged.subId ? 'active' : ''}" data-sub="">Unassigned</button>`;
    subs.forEach(s => {
      const colour = subColour(staged.mode, s.id);
      const darkClass = needsDarkText(colour) ? ' dark-text' : '';
      const styleAttr = `--sub-colour: ${colourCssValue(colour)};`;
      html += `<button class="option${staged.subId === s.id ? ' active' : ''}${darkClass}" style="${styleAttr}" data-sub="${s.id}">${escapeHtml(s.name)}</button>`;
    });
    subRow.innerHTML = html;
    subRow.querySelectorAll('[data-sub]').forEach(b => {
      b.onclick = () => {
        staged.subId = b.dataset.sub || null;
        // Changing sub clears member
        staged.memberId = null;
        subRow.querySelectorAll('[data-sub]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        renderTaskMemberSection();
        renderTaskColourControl();
      };
    });

    renderTaskMemberSection();
  }

  function renderTaskMemberSection() {
    const memberSection = panel.querySelector('#tpMemberSection');
    const memberRow = panel.querySelector('#tpMemberRow');
    const memberLabel = panel.querySelector('#tpMemberLabel');
    if (!memberSection || !memberRow) return;

    // Only show for Family with a household selected
    if (staged.mode !== 'family' || !staged.subId) {
      memberSection.style.display = 'none';
      return;
    }

    const h = getHousehold(staged.subId);
    if (!h || !(h.members || []).length) {
      memberSection.style.display = 'block';
      memberLabel.textContent = 'Who in ' + h.name;
      memberRow.innerHTML = `<div class="colour-picker-note">No people, pets or projects in ${escapeHtml(h.name)} yet. Add from the Family view.</div>`;
      return;
    }

    memberSection.style.display = 'block';
    memberLabel.textContent = 'Who in ' + h.name;
    let html = `<button class="option ${!staged.memberId ? 'active' : ''}" data-member="">Everyone</button>`;
    h.members.forEach(mem => {
      const colour = memberColour(h.id, mem.id);
      const darkClass = needsDarkText(colour) ? ' dark-text' : '';
      const styleAttr = `--sub-colour: ${colourCssValue(colour)};`;
      html += `<button class="option${staged.memberId === mem.id ? ' active' : ''}${darkClass}" style="${styleAttr}" data-member="${mem.id}">${escapeHtml(mem.name)}</button>`;
    });
    memberRow.innerHTML = html;
    memberRow.querySelectorAll('[data-member]').forEach(b => {
      b.onclick = () => {
        staged.memberId = b.dataset.member || null;
        memberRow.querySelectorAll('[data-member]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        renderTaskColourControl();
      };
    });
  }

  // 4a: render the task colour control (reflects staged state)
  function renderTaskColourControl() {
    const swatch = panel.querySelector('#tpColourSwatch');
    const hint = panel.querySelector('#tpColourHint');
    if (!swatch || !hint) return;
    // Work out what colour this task would show with current staged values
    let effective = 'pink';
    let inheritLabel = 'default';
    if (staged.colour) {
      effective = staged.colour;
    } else if (staged.mode === 'family' && staged.subId && staged.memberId) {
      effective = memberColour(staged.subId, staged.memberId);
      const mem = getMember(staged.subId, staged.memberId);
      inheritLabel = 'inherits from ' + (mem ? mem.name : 'member');
    } else if (staged.mode && staged.subId) {
      effective = subColour(staged.mode, staged.subId);
      const subs = getSubEntities(staged.mode);
      const s = subs.find(x => x.id === staged.subId);
      inheritLabel = 'inherits from ' + (s ? s.name : subEntityLabel(staged.mode));
    } else if (staged.mode) {
      effective = modeColour(staged.mode);
      const m = DEFAULT_MODES.find(x => x.id === staged.mode);
      inheritLabel = 'inherits from ' + (m ? m.name : 'mode');
    }
    swatch.setAttribute('style', `--swatch: ${colourCssValue(effective)};`);
    // For computed sibling colours ("tint:20:pink"), display the parent's
    // palette name with a hint about it being a sibling tint.
    let paletteName;
    if (isComputedColour(effective)) {
      const [, , parentId] = effective.split(':');
      const parent = PALETTE.find(p => p.id === parentId);
      paletteName = (parent ? parent.name : '') + ' tint';
    } else {
      paletteName = PALETTE.find(p => p.id === effective)?.name || '';
    }
    hint.textContent = staged.colour
      ? paletteName + ' · picked'
      : paletteName + ' · ' + inheritLabel;
  }
  renderTaskSubSection();
  renderTaskColourControl();

  panel.querySelector('#tpColourSwatch').onclick = (e) => {
    e.stopPropagation();
    openColourPopover(e.currentTarget, {
      title: 'Task colour',
      currentColour: staged.colour,
      allowInherit: true,
      inheritLabel: 'Inherit from mode',
      onPick: (id) => {
        staged.colour = id; // null for inherit
        renderTaskColourControl();
      }
    });
  };

  const textInput = panel.querySelector('#tpText');
  textInput.oninput = () => { staged.text = textInput.value; };

  panel.querySelectorAll('[data-tier]').forEach(b => {
    b.onclick = () => {
      staged.tier = b.dataset.tier;
      panel.querySelectorAll('[data-tier]').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    };
  });

  panel.querySelectorAll('[data-mode]').forEach(b => {
    b.onclick = () => {
      staged.mode = b.dataset.mode || null;
      // Changing mode clears sub + member (they're mode-specific)
      staged.subId = null;
      staged.memberId = null;
      panel.querySelectorAll('[data-mode]').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      renderTaskSubSection();
      renderTaskColourControl();
    };
  });

  panel.querySelectorAll('[data-chip]').forEach(b => {
    b.onclick = () => {
      const cid = b.dataset.chip;
      if (staged.chips.includes(cid)) {
        staged.chips = staged.chips.filter(x => x !== cid);
        b.classList.remove('active');
      } else {
        staged.chips.push(cid);
        b.classList.add('active');
      }
    };
  });

  const waitingInput = panel.querySelector('#tpWaiting');
  waitingInput.oninput = () => { staged.waitingOn = waitingInput.value.trim() || null; };
  panel.querySelector('#tpWaitingClear').onclick = () => {
    waitingInput.value = '';
    staged.waitingOn = null;
  };

  panel.querySelector('#taskClose').onclick = closeDrawers;
  panel.querySelector('#tpCancel').onclick = closeDrawers;

  panel.querySelector('#tpDelete').onclick = () => {
    const snapshot = { ...task };
    deleteTask(task.id);
    closeDrawers();
    undoToast('Task deleted.', () => restoreTask(snapshot));
    render();
  };

  panel.querySelector('#tpSave').onclick = () => {
    if (!staged.text.trim()) {
      toast('task needs text.', false);
      return;
    }
    updateTask(task.id, {
      text: staged.text.trim(),
      tier: staged.tier,
      mode: staged.mode,
      subId: staged.subId,
      memberId: staged.memberId,
      chips: staged.chips,
      waitingOn: staged.waitingOn,
      colour: staged.colour
    });
    closeDrawers();
    toast('saved.');
    render();
  };
}

function renderWaitingView() {
  const root = document.createElement('div');

  const masthead = document.createElement('div');
  masthead.className = 'mode-masthead';
  masthead.innerHTML = `
    <div class="mode-masthead-inner">
      <div class="card-label" style="margin-bottom:14px;">⏳ Waiting on</div>
      <h1>Waiting <em>on others</em>.</h1>
      <p>Things you've handed off. Not your move until someone responds. Stale ones (${STALE_DAYS}+ days) are flagged in pink.</p>
    </div>
  `;
  root.appendChild(masthead);

  const waiting = waitingTasks()
    .sort((a, b) => (a.waitingSince || 0) - (b.waitingSince || 0));

  const card = document.createElement('div');
  card.className = 'candy';

  if (waiting.length === 0) {
    card.innerHTML = `
      <span class="card-label">Waiting on others</span>
      <div class="empty">Nothing's waiting on you. <span class="sparkle">★</span> Go outside.</div>
    `;
  } else {
    const stale = waiting.filter(t => daysSince(t.waitingSince) >= STALE_DAYS);
    const fresh = waiting.filter(t => daysSince(t.waitingSince) < STALE_DAYS);

    card.innerHTML = `<span class="card-label">Waiting on others · ${waiting.length}</span>`;

    if (stale.length > 0) {
      card.insertAdjacentHTML('beforeend', `
        <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--pink-deep);margin:14px 0 6px;font-weight:500;">
          Stale · ${STALE_DAYS}+ days
        </div>
      `);
      const staleList = document.createElement('ul');
      staleList.className = 'task-list';
      stale.forEach(t => staleList.appendChild(renderTaskRow(t)));
      card.appendChild(staleList);
    }

    if (fresh.length > 0) {
      card.insertAdjacentHTML('beforeend', `
        <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--mute);margin:18px 0 6px;font-weight:500;">
          Recent
        </div>
      `);
      const freshList = document.createElement('ul');
      freshList.className = 'task-list';
      fresh.forEach(t => freshList.appendChild(renderTaskRow(t)));
      card.appendChild(freshList);
    }
  }

  root.appendChild(card);
  return root;
}

let wizStep = 0;
let wizData = {};

function openWizard() {
  wizStep = 0;
  wizData = {
    name: state.settings.name || '',
    clients: state.clients.slice(),
    orgs: state.orgs.slice()
  };
  renderWizard();
}

function renderWizard() {
  document.querySelectorAll('.wizard-backdrop').forEach(el => el.remove());

  const backdrop = document.createElement('div');
  backdrop.className = 'wizard-backdrop';

  const wiz = document.createElement('div');
  wiz.className = 'wizard';

  const totalSteps = 4;
  const progress = Array.from({ length: totalSteps }, (_, i) => {
    if (i < wizStep) return '<div class="wizard-dot done"></div>';
    if (i === wizStep) return '<div class="wizard-dot current"></div>';
    return '<div class="wizard-dot"></div>';
  }).join('');

  let body = '';
  let primary = 'Next →';
  let secondary = wizStep > 0 ? '← Back' : null;
  let canSkip = wizStep > 0 && wizStep < totalSteps - 1;

  if (wizStep === 0) {
    body = `
      <div class="wizard-step">Step 1 of ${totalSteps}</div>
      <h2>Welcome <em>in.</em></h2>
      <p class="wizard-intro">
        This is your planner. Pink, sharp, dry. Built around your actual life: client work, family, community, personal, and all the mortal paperwork in between.
      </p>
      <div class="wizard-body">
        <p style="font-family:'Fraunces',serif;font-size:15px;line-height:1.6;margin-bottom:12px;">
          Quick setup, takes about two minutes. You can skip any step and fill it in later.
        </p>
        <p style="font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--mute);line-height:1.5;">
          What would you like me to call you?
        </p>
        <input class="wizard-input" id="wizName" placeholder="Your name (optional)" value="${escapeHtml(wizData.name)}" style="margin-top:10px;">
      </div>
    `;
    primary = 'Next →';
  }

  else if (wizStep === 1) {
    body = `
      <div class="wizard-step">Step 2 of ${totalSteps} · Work</div>
      <h2>Your <em>clients.</em></h2>
      <p class="wizard-intro">
        Work is divided by client, so each one gets its own timer, unbilled tracker, and notes. Add the clients you've got right now. You can add more later.
      </p>
      <div class="wizard-body">
        <div style="display:flex;gap:8px;">
          <input class="wizard-input" id="wizClient" placeholder="Client name (e.g. Slater)" style="margin:0;">
          <button class="pill-btn butter" id="wizAddClient" style="flex-shrink:0;">Add</button>
        </div>
        <div class="wizard-tags" id="wizClientTags">
          ${wizData.clients.map(c => `
            <span class="wizard-tag">${escapeHtml(c.name)}<button data-id="${c.id}">✕</button></span>
          `).join('')}
          ${wizData.clients.length === 0 ? '<span class="wizard-note" style="margin:0;">No clients added yet.</span>' : ''}
        </div>
      </div>
    `;
    canSkip = true;
  }

  else if (wizStep === 2) {
    body = `
      <div class="wizard-step">Step 3 of ${totalSteps} · Community</div>
      <h2>Your <em>orgs.</em></h2>
      <p class="wizard-intro">
        Community work is divided by organisation. C31, a volunteer group, a board you sit on. Add what you remember. You can add more as they come to you.
      </p>
      <div class="wizard-body">
        <div style="display:flex;gap:8px;">
          <input class="wizard-input" id="wizOrg" placeholder="Org name (e.g. C31)" style="margin:0;">
          <button class="pill-btn butter" id="wizAddOrg" style="flex-shrink:0;">Add</button>
        </div>
        <div class="wizard-tags" id="wizOrgTags">
          ${wizData.orgs.map(o => `
            <span class="wizard-tag">${escapeHtml(o.name)}<button data-id="${o.id}">✕</button></span>
          `).join('')}
          ${wizData.orgs.length === 0 ? '<span class="wizard-note" style="margin:0;">No orgs added yet.</span>' : ''}
        </div>
      </div>
    `;
    canSkip = true;
  }

  else if (wizStep === 3) {
    const name = wizData.name || 'you';
    body = `
      <div class="wizard-step">Step 4 of ${totalSteps}</div>
      <h2>All <em>set.</em></h2>
      <p class="wizard-intro">
        Welcome in${wizData.name ? ', ' + escapeHtml(wizData.name) : ''}. The planner's ready.
      </p>
      <div class="wizard-body">
        <p style="font-family:'Fraunces',serif;font-size:15px;line-height:1.7;margin-bottom:10px;">
          <strong>What works right now:</strong> quick capture, the six modes, settings (reduced motion, calm mode), basic dashboard.
        </p>
        <p style="font-family:'Fraunces',serif;font-size:15px;line-height:1.7;margin-bottom:10px;">
          <strong>What's coming in the next chunks:</strong> task tiers (Now / Soon / Someday), waiting-on, per-mode views, calendars, notes, timers, invoicing.
        </p>
        <p style="font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--mute);margin-top:16px;line-height:1.5;">

    <div class="wizard-actions">

      </div>
      <div style="display:flex;gap:8px;">
        ${canSkip ? `<button class="pill-btn" id="wizSkip">Skip</button>` : ''}
        <button class="pill-btn primary" id="wizNext">${primary}</button>
      </div>

  `;

    <div class="wizard-progress">${progress}</div>
    ${body}
    ${actionsHTML}
  `;

  document.body.appendChild(backdrop);

  attachWizardHandlers();
}

function attachWizardHandlers() {
  const wiz = document.querySelector('.wizard');
  if (!wiz) return;

  // Step 0: name
  const nameInput = wiz.querySelector('#wizName');
  if (nameInput) {
    nameInput.focus();
    nameInput.oninput = (e) => { wizData.name = e.target.value.trim(); };
    nameInput.onkeydown = (e) => { if (e.key === 'Enter') advanceWizard(); };
  }

  // Step 1: clients
  const clientInput = wiz.querySelector('#wizClient');
  const addClient = wiz.querySelector('#wizAddClient');
  if (clientInput && addClient) {
    const doAdd = () => {
      const v = clientInput.value.trim();
      if (!v) return;
      wizData.clients.push({ id: uid(), name: v, rate: '' });
      clientInput.value = '';
      renderWizard();
    };
    addClient.onclick = doAdd;
    clientInput.onkeydown = (e) => { if (e.key === 'Enter') doAdd(); };
    wiz.querySelectorAll('#wizClientTags button').forEach(b => {
      b.onclick = () => {
        wizData.clients = wizData.clients.filter(c => c.id !== b.dataset.id);
        renderWizard();
      };
    });
  }

  // Step 2: orgs
  const orgInput = wiz.querySelector('#wizOrg');
  const addOrg = wiz.querySelector('#wizAddOrg');
  if (orgInput && addOrg) {
    const doAdd = () => {
      const v = orgInput.value.trim();
      if (!v) return;
      wizData.orgs.push({ id: uid(), name: v });
      orgInput.value = '';
      renderWizard();
    };
    addOrg.onclick = doAdd;
    orgInput.onkeydown = (e) => { if (e.key === 'Enter') doAdd(); };
    wiz.querySelectorAll('#wizOrgTags button').forEach(b => {
      b.onclick = () => {
        wizData.orgs = wizData.orgs.filter(o => o.id !== b.dataset.id);
        renderWizard();
      };
    });
  }

  // Nav
  const nextBtn = wiz.querySelector('#wizNext');
  const backBtn = wiz.querySelector('#wizBack');
  const skipBtn = wiz.querySelector('#wizSkip');

  if (nextBtn) nextBtn.onclick = advanceWizard;
  if (backBtn) backBtn.onclick = () => {
    wizStep = Math.max(0, wizStep - 1);
    renderWizard();
  };
  if (skipBtn) skipBtn.onclick = advanceWizard;
}

function advanceWizard() {
  if (wizStep < 3) {
    wizStep++;
    renderWizard();
  } else {
    // Finish
    state.settings.name = wizData.name;
    state.clients = wizData.clients;
    state.orgs = wizData.orgs;
    state.onboarded = true;
    saveState();
    document.querySelectorAll('.wizard-backdrop').forEach(el => el.remove());
    render();
    toast('welcome in.');
  }
}

/* ============================================================
   PHOTO LIGHTBOX (board games)
   Opens a modal carousel showing front + side photos for a game.
   Triggered from the thumbnail button in the board games list.
   Follows the existing modal pattern (see openConfirmModal).
   Photo set: imageUrl is the front; sidePhotos array adds others.
   Each side photo is either a string (src) or {src, label}.
   ============================================================ */
function openPhotoLightbox(gameId) {
  const game = BOARD_GAMES.find(g => g.id === gameId);
  if (!game || !game.imageUrl) return;

  const sidePhotos = Array.isArray(game.sidePhotos) ? game.sidePhotos : [];
  const photos = [
    { src: game.imageUrl, label: 'Front' },
    ...sidePhotos.map(p => {
      if (typeof p === 'string') return { src: p, label: '' };
      return { src: p.src, label: p.label || '' };
    })
  ];

  // Remove any existing photo lightbox.
  document.querySelectorAll('.bg-photo-backdrop').forEach(el => el.remove());

  // Capture previously-focused element so we can restore on close.
  const previouslyFocused = document.activeElement;

  let idx = 0;

  const backdrop = document.createElement('div');
  backdrop.className = 'bg-photo-backdrop';
  backdrop.setAttribute('role', 'dialog');
  backdrop.setAttribute('aria-modal', 'true');
  backdrop.setAttribute('aria-label', game.name + ' box photos');

  const modal = document.createElement('div');
  modal.className = 'bg-photo-modal';
  modal.innerHTML = `
    <button type="button" class="bg-photo-close" aria-label="Close photos">×</button>
    <div class="bg-photo-stage">
      <span class="bg-photo-label" id="bg-photo-label-text"></span>
      <span class="bg-photo-counter" id="bg-photo-counter-text"></span>
      <img class="bg-photo-img" id="bg-photo-img" alt="" />
    </div>
    <div class="bg-photo-game-name">${escapeHtml(game.name)}</div>
    <div class="bg-photo-controls">
      <button type="button" class="bg-photo-nav-btn" id="bg-photo-prev" aria-label="Previous photo">‹ Prev</button>
      <div class="bg-photo-dots" id="bg-photo-dots" role="tablist"></div>
      <button type="button" class="bg-photo-nav-btn" id="bg-photo-next" aria-label="Next photo">Next ›</button>
    </div>
  `;

  const imgEl = modal.querySelector('#bg-photo-img');
  const labelEl = modal.querySelector('#bg-photo-label-text');
  const counterEl = modal.querySelector('#bg-photo-counter-text');
  const dotsEl = modal.querySelector('#bg-photo-dots');
  const prevBtn = modal.querySelector('#bg-photo-prev');
  const nextBtn = modal.querySelector('#bg-photo-next');
  const closeBtn = modal.querySelector('.bg-photo-close');

  // Build dot indicators
  for (let i = 0; i < photos.length; i++) {
    const dot = document.createElement('button');
    dot.type = 'button';
    dot.className = 'bg-photo-dot';
    dot.setAttribute('role', 'tab');
    dot.setAttribute('aria-label', 'Photo ' + (i + 1));
    dot.addEventListener('click', () => { idx = i; renderPhoto(); });
    dotsEl.appendChild(dot);
  }

  // Hide nav controls if only one photo (front only, no sides yet)
  if (photos.length === 1) {
    prevBtn.style.display = 'none';
    nextBtn.style.display = 'none';
    dotsEl.style.display = 'none';
  }

  function renderPhoto() {
    const p = photos[idx];
    imgEl.src = p.src;
    labelEl.textContent = p.label || ('Photo ' + (idx + 1));
    counterEl.textContent = (idx + 1) + ' / ' + photos.length;
    Array.from(dotsEl.children).forEach((d, i) => {
      d.classList.toggle('active', i === idx);
      d.setAttribute('aria-selected', i === idx ? 'true' : 'false');
    });
    prevBtn.disabled = idx === 0;
    nextBtn.disabled = idx === photos.length - 1;
  }

  function close() {
    backdrop.remove();
    document.removeEventListener('keydown', onKey);
    if (previouslyFocused && typeof previouslyFocused.focus === 'function') {
      previouslyFocused.focus();
    }
  }

  function onKey(ev) {
    if (ev.key === 'Escape') {
      close();
    } else if (ev.key === 'ArrowRight' && idx < photos.length - 1) {
      idx++;
      renderPhoto();
    } else if (ev.key === 'ArrowLeft' && idx > 0) {
      idx--;
      renderPhoto();
    }
  }

  prevBtn.addEventListener('click', () => { if (idx > 0) { idx--; renderPhoto(); } });
  nextBtn.addEventListener('click', () => { if (idx < photos.length - 1) { idx++; renderPhoto(); } });
  closeBtn.addEventListener('click', close);
  backdrop.addEventListener('click', (ev) => {
    if (ev.target === backdrop) close();
  });
  document.addEventListener('keydown', onKey);

  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  renderPhoto();
  closeBtn.focus();
}

    <input type="search" class="bg-search" placeholder="Name, description, tag..." value="${escapeHtml(f.search || '')}" />
  `;
  const searchInput = searchRow.querySelector('input');
  // Debounced live filter on input (no rerender per keystroke; just refresh
  // results below). Save on blur/enter.
  let searchTimer = null;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.boardGameFilters.search = searchInput.value;
      saveState();
      // Update only the results section, keep input focused
      const rs = document.getElementById('bg-results-area');
      const sm = document.getElementById('bg-results-summary');
      if (rs && sm) {
        const fresh = filterBoardGames();
        rs.replaceWith(buildResultsArea(fresh));
        sm.replaceWith(buildResultsSummary(fresh));
      }
    }, 180);
  });
  filterCard.appendChild(searchRow);

  // Players
  const playersRow = document.createElement('div');
  playersRow.className = 'bg-filter-row';
  playersRow.innerHTML = `<span class="bg-filter-label">Players</span>`;
  const playerStepper = document.createElement('div');
  playerStepper.className = 'bg-stepper';
  // any button
  const anyP = document.createElement('button');
  anyP.type = 'button';
  anyP.className = 'bg-stepper-btn' + (f.players == null ? ' active' : '');
  anyP.textContent = 'any';
  anyP.onclick = () => { state.boardGameFilters.players = null; saveState(); render(); };
  playerStepper.appendChild(anyP);
  for (const n of BOARD_GAME_PLAYER_BUTTONS) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'bg-stepper-btn' + (f.players === n ? ' active' : '');
    btn.textContent = (n === BOARD_GAME_PLAYER_BUTTONS[BOARD_GAME_PLAYER_BUTTONS.length - 1]) ? (n + '+') : String(n);
    btn.onclick = () => { state.boardGameFilters.players = n; saveState(); render(); };
    playerStepper.appendChild(btn);
  }
  playersRow.appendChild(playerStepper);
  filterCard.appendChild(playersRow);

  // Age (youngest)
  const ageRow = document.createElement('div');
  ageRow.className = 'bg-filter-row';
  ageRow.innerHTML = `<span class="bg-filter-label">Youngest</span>`;
  const ageStepper = document.createElement('div');
  ageStepper.className = 'bg-stepper';
  const anyA = document.createElement('button');
  anyA.type = 'button';
  anyA.className = 'bg-stepper-btn' + (f.ageMin == null ? ' active' : '');
  anyA.textContent = 'any';
  anyA.onclick = () => { state.boardGameFilters.ageMin = null; saveState(); render(); };
  ageStepper.appendChild(anyA);
  for (const a of BOARD_GAME_AGE_BUTTONS) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'bg-stepper-btn' + (f.ageMin === a ? ' active' : '');
    btn.textContent = a + '+';
    btn.onclick = () => { state.boardGameFilters.ageMin = a; saveState(); render(); };
    ageStepper.appendChild(btn);
  }
  ageRow.appendChild(ageStepper);
  filterCard.appendChild(ageRow);

  // Length
  const lenRow = document.createElement('div');
  lenRow.className = 'bg-filter-row';
  lenRow.innerHTML = `<span class="bg-filter-label">Length</span>`;
  const lenWrap = document.createElement('div');
  lenWrap.className = 'bg-chips';
  for (const b of BOARD_GAME_DURATION_BUCKETS) {
    const isActive = (f.durations || []).includes(b.id);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'bg-tag-chip bg-duration-chip' + (isActive ? ' active' : '');
    btn.innerHTML = `${escapeHtml(b.label)}<span class="bg-chip-sub">${escapeHtml(b.sub)}</span>`;
    btn.onclick = () => {
      const list = (state.boardGameFilters.durations || []).slice();
      const i = list.indexOf(b.id);
      if (i >= 0) list.splice(i, 1); else list.push(b.id);
      state.boardGameFilters.durations = list;
      saveState();
      render();
    };
    lenWrap.appendChild(btn);
  }
  lenRow.appendChild(lenWrap);
  filterCard.appendChild(lenRow);

  // Tags
  const tagRow = document.createElement('div');
  tagRow.className = 'bg-filter-row';
  tagRow.innerHTML = `<span class="bg-filter-label">Vibe</span>`;
  const tagWrap = document.createElement('div');
  tagWrap.className = 'bg-chips';
  for (const [t, c] of tagCounts) {
    const isActive = (f.tags || []).includes(t);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'bg-tag-chip' + (isActive ? ' active' : '');
    btn.innerHTML = `${escapeHtml(t)}<span class="bg-chip-count">${c}</span>`;
    btn.onclick = () => {
      const list = (state.boardGameFilters.tags || []).slice();
      const i = list.indexOf(t);
      if (i >= 0) list.splice(i, 1); else list.push(t);
      state.boardGameFilters.tags = list;
      saveState();
      render();
    };
    tagWrap.appendChild(btn);
  }
  tagRow.appendChild(tagWrap);
  filterCard.appendChild(tagRow);

  // Footer: clear all (only when filters active)
  if (activeCount > 0) {
    const footer = document.createElement('div');
    footer.className = 'bg-filter-footer';
    footer.innerHTML = `<button type="button" class="chip-filter-clear">clear all ✕</button>`;
    footer.querySelector('button').onclick = () => clearBoardGameFilters();
    filterCard.appendChild(footer);
  }

  content.appendChild(filterCard);

  // ---- Results summary + grid ----
  content.appendChild(buildResultsSummary(results));
  content.appendChild(buildResultsArea(results));

  root.appendChild(content);
  return root;
}

function buildResultsSummary(results) {
  const wrap = document.createElement('div');
  wrap.id = 'bg-results-summary';
  wrap.className = 'bg-results-summary';
  const total = BOARD_GAMES.length;
  const n = results.length;
  let txt;
  if (n === total) {
    txt = `${total} games`;
  } else if (n === 0) {
    txt = `Nothing matches`;
  } else {
    txt = `${n} of ${total} games match`;
  }
  wrap.innerHTML = `<span class="bg-results-count">${escapeHtml(txt)}</span>`;
  return wrap;
}

function buildResultsArea(results) {
  const wrap = document.createElement('div');
  wrap.id = 'bg-results-area';

  if (results.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'candy';
    empty.innerHTML = `<div class="empty">Filtered too far. <span class="sparkle">✦</span> Loosen something.</div>`;
    wrap.appendChild(empty);
    return wrap;
  }

  const grid = document.createElement('div');
  grid.className = 'bg-grid';

  for (const g of results) {
    const card = document.createElement('article');
    card.className = 'candy bg-game-card';

    const tagsHTML = g.tags.map(t => `<span class="bg-game-tag">${escapeHtml(t)}</span>`).join('');
    const pubHTML = g.publisher ? `<div class="bg-game-publisher">${escapeHtml(g.publisher)}</div>` : '';

    // Thumbnail: hotlinked image (wrapped in a button) if imageUrl present,
    // else coloured tile fallback. The button opens the photo lightbox.
    let thumbHTML;
    if (g.imageUrl) {
      thumbHTML = `<button type="button" class="bg-game-thumb-btn" aria-label="View ${escapeHtml(g.name)} photos"><img class="bg-game-thumb-img" src="${escapeHtml(g.imageUrl)}" alt="" loading="lazy" /></button>`;
    } else {
      const t = tilePreset(g);
      const letter = tileLetter(g.name);
      thumbHTML = `
        <div class="bg-game-tile bg-game-tile-${escapeHtml(t.bg)} bg-game-tile-fg-${escapeHtml(t.fg)}" aria-hidden="true">
          <span class="bg-game-tile-letter">${escapeHtml(letter)}</span>
          <span class="bg-game-tile-glyph">${escapeHtml(t.glyph)}</span>
        </div>
      `;
    }

    card.innerHTML = `
      <div class="bg-game-header">
        <div class="bg-game-thumb">${thumbHTML}</div>
        <div class="bg-game-header-text">
          <h3 class="bg-game-name">${escapeHtml(g.name)}</h3>
          ${pubHTML}
        </div>
      </div>
      <div class="bg-game-stats">
        <span class="bg-stat" title="Players"><span class="bg-stat-label">players</span> ${escapeHtml(formatPlayers(g.players))}</span>
        <span class="bg-stat" title="Youngest age"><span class="bg-stat-label">age</span> ${escapeHtml(formatAge(g.age))}</span>
        <span class="bg-stat" title="Duration"><span class="bg-stat-label">length</span> ${escapeHtml(formatDuration(g.duration))}</span>
      </div>
      <div class="bg-game-tags">${tagsHTML}</div>
      <p class="bg-game-description">${escapeHtml(g.description)}</p>
    `;

    // Wire up the thumb click for games with photos.
    if (g.imageUrl) {
      const btn = card.querySelector('.bg-game-thumb-btn');
      if (btn) btn.addEventListener('click', () => openPhotoLightbox(g.id));
    }

    grid.appendChild(card);
  }

  wrap.appendChild(grid);
  return wrap;
}


function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // 4c: Hard cutoff handling. If the user is currently on a hard-cutoff mode:
  // - With active grace: render the mode page (with heavier fade applied via
  //   renderModeView), no dialog
  // - Without active grace: render the page heavy-faded AND open the grace
  //   dialog (post-render so it sits on top)
  // If grace exists but the user has navigated away, clear it.
  if (hardCutoffActive(state.currentMode)) {
    // Stay on the mode. The dialog will be opened post-render if needed.
  } else if (state._cutoffGrace && state._cutoffGrace.mode !== state.currentMode) {
    // User left the mode (or hard cutoff is no longer active). Clear grace.
    clearCutoffGrace();
  }

  app.appendChild(renderTopbar());
  app.appendChild(renderModeBar());

  // 4c: Main content area is a landmark so assistive tech can jump to it.
  const main = document.createElement('main');
  main.className = 'app-main';
  main.id = 'main-content';
  main.setAttribute('tabindex', '-1');
  main.appendChild(renderGreeting());
  main.appendChild(renderQuickCapture());

  if (state.currentMode === 'dashboard') {
    main.appendChild(renderDashboard());
  } else if (state.currentMode === 'inbox') {
    main.appendChild(renderInboxView());
  } else if (state.currentMode === 'waiting') {
    main.appendChild(renderWaitingView());
  } else if (state.currentMode === 'lists') {
    main.appendChild(renderListsView());
  } else if (state.currentMode === 'list:boardgames') {
    main.appendChild(renderBoardGamesView());
  } else {
    main.appendChild(renderModeView(state.currentMode));
  }

  app.appendChild(main);

  // Install hint
  const hint = document.createElement('div');
  hint.className = 'install-hint';
  hint.innerHTML = `
    <strong>Installable as an app</strong>
    iPhone: Share → Add to Home Screen. Android/Desktop Chrome: install icon in the URL bar. Chromecast: Chrome menu → Cast.
  `;
  app.appendChild(hint);

  // Wire top-bar buttons
  document.getElementById('brandBtn').onclick = () => setMode('dashboard');
  document.getElementById('settingsBtn').onclick = openSettingsDrawer;

  applySettings();

  // 4c: After the page is rendered, decide whether to show the grace dialog.
  // Three cases:
  // - Hard cutoff just hit, grace not yet started → open dialog (this initialises grace)
  // - Grace active, dialog due (snooze ended) → reopen dialog
  // - Grace active but silenced/snoozed → no dialog
  // Don't reopen if it's already on screen.
  if (hardCutoffActive(state.currentMode)) {
    const graceExists = state._cutoffGrace && state._cutoffGrace.mode === state.currentMode;
    const shouldShow = !graceExists || graceDialogDue();
    if (shouldShow && !document.querySelector('.grace-backdrop')) {
      openCutoffGraceDialog(state.currentMode);
    }
  }
}

/* ============================================================
   CLOCK TICK
   Updates every 30s. Also re-evaluates cutoffs to catch transitions
   that happen while the user is on the page (e.g. soft cutoff hitting
   at 5pm while they're on Work).
   ============================================================ */
let _lastCutoffSnapshot = '';

function cutoffSnapshot() {
  // Compact string of all cutoff-relevant state, for change detection.
  return [
    softCutoffActive('work') ? 'ws' : '',
    hardCutoffActive('work') ? 'wh' : '',
    softCutoffActive('community') ? 'cs' : '',
    hardCutoffActive('community') ? 'ch' : '',
  ].join('|');
}

setInterval(() => {
  const clock = document.getElementById('clock');
  if (clock) clock.textContent = formatClock();
  // 4c: If any cutoff status flipped since last tick, re-render the page.
  const snap = cutoffSnapshot();
  if (snap !== _lastCutoffSnapshot) {
    _lastCutoffSnapshot = snap;
    render();
  }
}, 30000);

/* ============================================================
   BOOT
   ============================================================ */
loadState();
applySettings();
purgeOldRecycleBin(); // 4c: clear bin entries older than 24h on every load
_lastCutoffSnapshot = cutoffSnapshot(); // 4c: avoid spurious render on first tick

if (!state.onboarded) {
  render();
  openWizard();
} else {
  render();
}

// PWA install prompt capture (silent)
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  window._installPrompt = e;
});

// 4c: When the tab regains focus or becomes visible, re-check cutoff state.
// Browsers throttle/pause setInterval and setTimeout for backgrounded tabs,
// so a hard cutoff that "should" have fired while we were away wouldn't have.
// On wake, force a re-render which re-evaluates everything against wall-clock time.
function recheckOnFocus() {
  // Always render. It's cheap and catches all the time-sensitive things:
  // - hard cutoff transitions
  // - soft cutoff transitions
  // - grace cap expiry
  // - banner re-rotation if the day rolled over
  // - clock display
  render();
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') recheckOnFocus();
});
window.addEventListener('focus', recheckOnFocus);
window.addEventListener('pageshow', recheckOnFocus);
</script>
</body>
