/* ------------------------------------------------------------
   4a: MODE COLOUR LIST + PICKER POPOVER
   ------------------------------------------------------------ */
function renderModeColoursList(host) {
  if (!host) return;
  host.innerHTML = '';
  const modes = DEFAULT_MODES.filter(m => m.id !== 'dashboard');
  modes.forEach(m => {
    const row = document.createElement('div');
    row.className = 'mode-colour-row';
    const colour = modeColour(m.id);
    const isDefault = !state.modeColours[m.id];
    row.innerHTML = `
      <button class="mode-colour-swatch" data-mode="${m.id}" style="--swatch: var(--pal-${colour});" title="Change colour"></button>
      <div class="mode-colour-label"><span class="glyph">${m.glyph}</span>${escapeHtml(m.name)}</div>
      <div class="mode-colour-hint">${isDefault ? 'default' : PALETTE.find(p => p.id === colour)?.name || ''}</div>
    `;
    row.querySelector('.mode-colour-swatch').onclick = (e) => {
      openColourPopover(e.currentTarget, {
        currentColour: colour,
        allowInherit: false,
        onPick: (newId) => {
          state.modeColours[m.id] = newId;
          saveState();
          renderModeColoursList(host);
          render();
        },
        onReset: isDefault ? null : () => {
          delete state.modeColours[m.id];
          saveState();
          renderModeColoursList(host);
          render();
        }
      });
    };
    host.appendChild(row);
  });
}

// Opens a floating colour picker next to `anchorEl`.
// opts: { currentColour, allowInherit, inheritLabel, onPick(id), onReset? }
function openColourPopover(anchorEl, opts) {
  // Remove any existing popover
  document.querySelectorAll('.colour-popover').forEach(el => el.remove());

  const pop = document.createElement('div');
  pop.className = 'colour-popover';
  const title = opts.title || 'Pick a colour';

  // 4c: Optional rename section
  const renameHtml = opts.onRename ? `
    <div class="popover-section">
      <div class="popover-section-label">Name</div>
      <input type="text" class="popover-rename-input" id="popRename" value="${escapeHtml(opts.renameValue || '')}" />
    </div>
  ` : '';

  // 4c: Optional delete section
  const deleteHtml = opts.onDelete ? `
    <hr class="popover-divider" />
    <button class="popover-danger-btn" id="popDelete">Delete ${escapeHtml(opts.deleteLabel || 'this')}</button>
  ` : '';

  pop.innerHTML = `
    <h5>${escapeHtml(title)}</h5>
    ${renameHtml}
    ${opts.onRename ? '<div class="popover-section-label">Colour</div>' : ''}
    <div class="colour-picker" id="popPicker" style="margin-bottom:10px;"></div>
    ${opts.onReset ? `<button class="pill-btn small" id="popReset" style="margin-bottom:10px;">Reset to default</button>` : ''}
    ${deleteHtml}
  `;

  const picker = pop.querySelector('#popPicker');

  // Inherit swatch (first, when allowed)
  if (opts.allowInherit) {
    const inh = document.createElement('button');
    inh.className = 'swatch inherit' + (!opts.currentColour ? ' selected' : '');
    inh.title = opts.inheritLabel || 'Inherit';
    inh.onclick = () => {
      opts.onPick(null);
      pop.remove();
    };
    picker.appendChild(inh);
  }

  PALETTE.forEach(p => {
    const sw = document.createElement('button');
    sw.className = 'swatch' + (opts.currentColour === p.id ? ' selected' : '');
    sw.setAttribute('style', `--swatch: var(--pal-${p.id});`);
    sw.title = p.name;
    sw.onclick = () => {
      opts.onPick(p.id);
      pop.remove();
    };
    picker.appendChild(sw);
  });

  if (opts.onReset) {
    pop.querySelector('#popReset').onclick = () => {
      opts.onReset();
      pop.remove();
    };
  }

  // 4c: Wire rename input - save on Enter or blur, Esc cancels
  if (opts.onRename) {
    const input = pop.querySelector('#popRename');
    let cancelled = false;
    const commit = () => {
      if (cancelled) return;
      const newName = input.value.trim();
      if (newName && newName !== opts.renameValue) {
        opts.onRename(newName);
      }
    };
    input.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        commit();
        pop.remove();
      } else if (ev.key === 'Escape') {
        ev.preventDefault();
        cancelled = true;
        pop.remove();
      }
    });
    input.addEventListener('blur', commit);
  }

  // 4c: Wire delete button
  if (opts.onDelete) {
    pop.querySelector('#popDelete').onclick = () => {
      pop.remove();
      opts.onDelete();
    };
  }

  // Position: place below the anchor, constrained to viewport
  document.body.appendChild(pop);
  const rect = anchorEl.getBoundingClientRect();
  const popRect = pop.getBoundingClientRect();
  let left = rect.left + window.scrollX;
  let top = rect.bottom + window.scrollY + 8;
  // Keep on-screen horizontally
  const maxLeft = window.scrollX + window.innerWidth - popRect.width - 12;
  if (left > maxLeft) left = maxLeft;
  if (left < window.scrollX + 12) left = window.scrollX + 12;
  // If it would go below viewport, put it above instead
  if (rect.bottom + popRect.height + 20 > window.innerHeight) {
    top = rect.top + window.scrollY - popRect.height - 8;
  }
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';

  // Dismiss on click outside
  setTimeout(() => {
    const onDocClick = (ev) => {
      if (!pop.contains(ev.target) && ev.target !== anchorEl) {
        pop.remove();
        document.removeEventListener('click', onDocClick, true);
      }
    };
    document.addEventListener('click', onDocClick, true);
  }, 0);
}

/* ------------------------------------------------------------
   4c: Reusable confirm modal.
   opts: { title, body, actions: [{label, kind, onClick}] }
   kind can be 'primary' (pink), 'danger' (ink) or undefined (cream)
   Auto-closes on action click. Cancel always closes.
   ------------------------------------------------------------ */
function openConfirmModal(opts) {
  // Remove any existing confirm modals
  document.querySelectorAll('.confirm-backdrop').forEach(el => el.remove());

  const backdrop = document.createElement('div');
  backdrop.className = 'confirm-backdrop';
  backdrop.setAttribute('role', 'dialog');
  backdrop.setAttribute('aria-modal', 'true');
  backdrop.setAttribute('aria-label', opts.title || 'Confirm');

  const modal = document.createElement('div');
  modal.className = 'confirm-modal';

  const titleHtml = opts.title ? `<h4>${escapeHtml(opts.title)}</h4>` : '';
  const bodyHtml = opts.body ? `<p>${escapeHtml(opts.body)}</p>` : '';
  modal.innerHTML = `
    ${titleHtml}
    ${bodyHtml}
    <div class="confirm-actions"></div>
  `;

  const actionsEl = modal.querySelector('.confirm-actions');
  (opts.actions || []).forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'pill-btn' + (a.kind === 'primary' ? ' primary' : a.kind === 'danger' ? ' ink' : '');
    btn.textContent = a.label;
    btn.onclick = () => {
      backdrop.remove();
      if (a.onClick) a.onClick();
    };
    actionsEl.appendChild(btn);
  });

  backdrop.appendChild(modal);
  // Click backdrop (not modal) cancels
  backdrop.addEventListener('click', (ev) => {
    if (ev.target === backdrop) backdrop.remove();
  });
  // Esc cancels
  const onKey = (ev) => {
    if (ev.key === 'Escape') {
      backdrop.remove();
      document.removeEventListener('keydown', onKey);
    }
  };
  document.addEventListener('keydown', onKey);

  document.body.appendChild(backdrop);
  // Focus first button for keyboard users
  const firstBtn = actionsEl.querySelector('button');
  if (firstBtn) firstBtn.focus();
}

function closeDrawers() {
  document.querySelectorAll('.drawer, .drawer-backdrop, .task-panel, .task-panel-backdrop').forEach(el => el.remove());
}

/* ============================================================
   TASK-EDIT PANEL (2c)
   ============================================================ */
function openTaskPanel(taskId) {
  closeDrawers();
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) return;

  const backdrop = document.createElement('div');
  backdrop.className = 'task-panel-backdrop';
  backdrop.onclick = closeDrawers;

  const panel = document.createElement('div');
  panel.className = 'task-panel';

  const tiersOptions = [
    { id: 'inbox', name: 'Inbox' },
    { id: 'now', name: 'Now' },
    { id: 'soon', name: 'Soon' },
    { id: 'someday', name: 'Someday' }
  ];

  const createdLabel = new Date(task.createdAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
  const doneLabel = task.done && task.doneAt
    ? ' · done ' + new Date(task.doneAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })
    : '';

  const waitingDays = daysSince(task.waitingSince);
  const waitingNote = task.waitingOn && waitingDays != null
    ? `<div class="wizard-note" style="margin-top:8px;">Waiting ${waitingDays} day${waitingDays === 1 ? '' : 's'}${waitingDays >= STALE_DAYS ? ' · stale, consider chasing' : ''}.</div>`
    : '';

  panel.innerHTML = `
    <button class="task-panel-close" id="taskClose">✕</button>
    <h3>Edit task</h3>
    <div class="task-panel-meta">Created ${escapeHtml(createdLabel)}${escapeHtml(doneLabel)}</div>

    <div class="task-panel-section">
      <h4>Text</h4>
      <textarea class="task-panel-text-input" id="tpText">${escapeHtml(task.text)}</textarea>
    </div>

    <div class="task-panel-section">
      <h4>Tier</h4>
      <div class="option-row">
        ${tiersOptions.map(t => `
          <button class="option tier-${t.id} ${task.tier === t.id ? 'active' : ''}" data-tier="${t.id}">${escapeHtml(t.name)}</button>
        `).join('')}
      </div>
    </div>

    <div class="task-panel-section">
      <h4>Mode</h4>
      <div class="option-row">
        <button class="option ${!task.mode ? 'active' : ''}" data-mode="">Unassigned</button>
        ${TASKABLE_MODES.map(mid => {
          const m = DEFAULT_MODES.find(x => x.id === mid);
          return `<button class="option ${task.mode === mid ? 'active' : ''}" data-mode="${mid}">${m.glyph} ${escapeHtml(m.name)}</button>`;
        }).join('')}
      </div>
    </div>

    <div class="task-panel-section" id="tpSubSection" style="display:none;">
      <h4 id="tpSubLabel">Sub-entity</h4>
      <div class="option-row" id="tpSubRow"></div>
    </div>

    <div class="task-panel-section" id="tpMemberSection" style="display:none;">
      <h4 id="tpMemberLabel">Who</h4>
      <div class="option-row" id="tpMemberRow"></div>
    </div>

    <div class="task-panel-section">
      <h4>Tags</h4>
      <div class="option-row">
        ${CHIP_TYPES.map(c => `
          <button class="option chip-opt ${(task.chips||[]).includes(c.id) ? 'active' : ''}" data-chip="${c.id}">${escapeHtml(c.label)}</button>
        `).join('')}
      </div>
    </div>

    <div class="task-panel-section">
      <h4>Colour</h4>
      <div id="tpColourRow" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="mode-colour-swatch" id="tpColourSwatch" title="Change colour"></button>
        <div class="mode-colour-hint" id="tpColourHint"></div>
      </div>
      <div class="colour-picker-note">Leave as inherit to follow the mode (or client, org, household) this task belongs to.</div>
    </div>

    <div class="task-panel-section">
      <h4>Waiting on someone?</h4>
      <div class="waiting-input-row">
        <input class="waiting-input" id="tpWaiting" placeholder="e.g. Amelia, Gaffoor, hosting provider" value="${escapeHtml(task.waitingOn || '')}">
        <button class="pill-btn" id="tpWaitingClear"${!task.waitingOn ? ' style="opacity:0.5;"' : ''}>Clear</button>
      </div>
      ${waitingNote}
    </div>

    <div class="task-panel-actions">
      <button class="pill-btn ink" id="tpDelete">Delete task</button>
      <div style="display:flex;gap:8px;">
        <button class="pill-btn" id="tpCancel">Cancel</button>
        <button class="pill-btn primary" id="tpSave">Save</button>
      </div>
    </div>
  `;

  document.body.appendChild(backdrop);
  document.body.appendChild(panel);

  // Stage changes locally, commit on Save
  const staged = {
    text: task.text,
    tier: task.tier,
    mode: task.mode,
    subId: task.subId || null,          // 4b
    memberId: task.memberId || null,    // 4b
    chips: (task.chips || []).slice(),
    waitingOn: task.waitingOn,
    colour: task.colour || null
  };

  // 4b: re-render sub-entity and member pickers based on staged.mode / staged.subId
  function renderTaskSubSection() {
    const section = panel.querySelector('#tpSubSection');
    const memberSection = panel.querySelector('#tpMemberSection');
    const subRow = panel.querySelector('#tpSubRow');
    const subLabel = panel.querySelector('#tpSubLabel');
    if (!section || !subRow) return;

    if (!staged.mode || !MODES_WITH_SUBS.includes(staged.mode)) {
      section.style.display = 'none';
      memberSection.style.display = 'none';
      return;
    }

    const subs = getSubEntities(staged.mode);
    const groupLabel = subEntityGroupLabel(staged.mode);
    subLabel.textContent = groupLabel || 'Sub-entity';

    if (!subs.length) {
      section.style.display = 'block';
      subRow.innerHTML = `<div class="colour-picker-note">No ${escapeHtml(subEntityLabel(staged.mode))}s yet. Add one from the ${escapeHtml(DEFAULT_MODES.find(m => m.id === staged.mode).name)} view.</div>`;
      memberSection.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    let html = `<button class="option ${!staged.subId ? 'active' : ''}" data-sub="">Unassigned</button>`;
    subs.forEach(s => {
      html += `<button class="option ${staged.subId === s.id ? 'active' : ''}" data-sub="${s.id}">${escapeHtml(s.name)}</button>`;
    });
    subRow.innerHTML = html;
    subRow.querySelectorAll('[data-sub]').forEach(b => {
      b.onclick = () => {
        staged.subId = b.dataset.sub || null;
        // Changing sub clears member
        staged.memberId = null;
        subRow.querySelectorAll('[data-sub]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        renderTaskMemberSection();
        renderTaskColourControl();
      };
    });

    renderTaskMemberSection();
  }

  function renderTaskMemberSection() {
    const memberSection = panel.querySelector('#tpMemberSection');
    const memberRow = panel.querySelector('#tpMemberRow');
    const memberLabel = panel.querySelector('#tpMemberLabel');
    if (!memberSection || !memberRow) return;

    // Only show for Family with a household selected
    if (staged.mode !== 'family' || !staged.subId) {
      memberSection.style.display = 'none';
      return;
    }

    const h = getHousehold(staged.subId);
    if (!h || !(h.members || []).length) {
      memberSection.style.display = 'block';
      memberLabel.textContent = 'Who in ' + h.name;
      memberRow.innerHTML = `<div class="colour-picker-note">No people, pets or projects in ${escapeHtml(h.name)} yet. Add from the Family view.</div>`;
      return;
    }

    memberSection.style.display = 'block';
    memberLabel.textContent = 'Who in ' + h.name;
    let html = `<button class="option ${!staged.memberId ? 'active' : ''}" data-member="">Everyone</button>`;
    h.members.forEach(mem => {
      html += `<button class="option ${staged.memberId === mem.id ? 'active' : ''}" data-member="${mem.id}">${escapeHtml(mem.name)}</button>`;
    });
    memberRow.innerHTML = html;
    memberRow.querySelectorAll('[data-member]').forEach(b => {
      b.onclick = () => {
        staged.memberId = b.dataset.member || null;
        memberRow.querySelectorAll('[data-member]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        renderTaskColourControl();
      };
    });
  }

  // 4a: render the task colour control (reflects staged state)
  function renderTaskColourControl() {
    const swatch = panel.querySelector('#tpColourSwatch');
    const hint = panel.querySelector('#tpColourHint');
    if (!swatch || !hint) return;
    // Work out what colour this task would show with current staged values
    let effective = 'pink';
    let inheritLabel = 'default';
    if (staged.colour) {
      effective = staged.colour;
    } else if (staged.mode === 'family' && staged.subId && staged.memberId) {
      effective = memberColour(staged.subId, staged.memberId);
      const mem = getMember(staged.subId, staged.memberId);
      inheritLabel = 'inherits from ' + (mem ? mem.name : 'member');
    } else if (staged.mode && staged.subId) {
      effective = subColour(staged.mode, staged.subId);
      const subs = getSubEntities(staged.mode);
      const s = subs.find(x => x.id === staged.subId);
      inheritLabel = 'inherits from ' + (s ? s.name : subEntityLabel(staged.mode));
    } else if (staged.mode) {
      effective = modeColour(staged.mode);
      const m = DEFAULT_MODES.find(x => x.id === staged.mode);
      inheritLabel = 'inherits from ' + (m ? m.name : 'mode');
    }
    swatch.setAttribute('style', `--swatch: ${colourCssValue(effective)};`);
    // For computed sibling colours ("tint:20:pink"), display the parent's
    // palette name with a hint about it being a sibling tint.
    let paletteName;
    if (isComputedColour(effective)) {
      const [, , parentId] = effective.split(':');
      const parent = PALETTE.find(p => p.id === parentId);
      paletteName = (parent ? parent.name : '') + ' tint';
    } else {
      paletteName = PALETTE.find(p => p.id === effective)?.name || '';
    }
    hint.textContent = staged.colour
      ? paletteName + ' · picked'
      : paletteName + ' · ' + inheritLabel;
  }
  renderTaskSubSection();
  renderTaskColourControl();

  panel.querySelector('#tpColourSwatch').onclick = (e) => {
    e.stopPropagation();
    openColourPopover(e.currentTarget, {
      title: 'Task colour',
      currentColour: staged.colour,
      allowInherit: true,
      inheritLabel: 'Inherit from mode',
      onPick: (id) => {
        staged.colour = id; // null for inherit
        renderTaskColourControl();
      }
    });
  };

  const textInput = panel.querySelector('#tpText');
  textInput.oninput = () => { staged.text = textInput.value; };

  panel.querySelectorAll('[data-tier]').forEach(b => {
    b.onclick = () => {
      staged.tier = b.dataset.tier;
      panel.querySelectorAll('[data-tier]').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    };
  });

  panel.querySelectorAll('[data-mode]').forEach(b => {
    b.onclick = () => {
      staged.mode = b.dataset.mode || null;
      // Changing mode clears sub + member (they're mode-specific)
      staged.subId = null;
      staged.memberId = null;
      panel.querySelectorAll('[data-mode]').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      renderTaskSubSection();
      renderTaskColourControl();
    };
  });

  panel.querySelectorAll('[data-chip]').forEach(b => {
    b.onclick = () => {
      const cid = b.dataset.chip;
      if (staged.chips.includes(cid)) {
        staged.chips = staged.chips.filter(x => x !== cid);
        b.classList.remove('active');
      } else {
        staged.chips.push(cid);
        b.classList.add('active');
      }
    };
  });

  const waitingInput = panel.querySelector('#tpWaiting');
  waitingInput.oninput = () => { staged.waitingOn = waitingInput.value.trim() || null; };
  panel.querySelector('#tpWaitingClear').onclick = () => {
    waitingInput.value = '';
    staged.waitingOn = null;
  };

  panel.querySelector('#taskClose').onclick = closeDrawers;
  panel.querySelector('#tpCancel').onclick = closeDrawers;

  panel.querySelector('#tpDelete').onclick = () => {
    if (!confirm('Delete this task?')) return;
    deleteTask(task.id);
    closeDrawers();
    toast('deleted.');
    render();
  };

  panel.querySelector('#tpSave').onclick = () => {
    if (!staged.text.trim()) {
      toast('task needs text.', false);
      return;
    }
    updateTask(task.id, {
      text: staged.text.trim(),
      tier: staged.tier,
      mode: staged.mode,
      subId: staged.subId,
      memberId: staged.memberId,
      chips: staged.chips,
      waitingOn: staged.waitingOn,
      colour: staged.colour
    });
    closeDrawers();
    toast('saved.');
    render();
  };
}

/* ============================================================
   WAITING-ON VIEW (2c)
   ============================================================ */
function renderWaitingView() {
  const root = document.createElement('div');

  const masthead = document.createElement('div');
  masthead.className = 'mode-masthead';
  masthead.innerHTML = `
    <div class="mode-masthead-inner">
      <div class="card-label" style="margin-bottom:14px;">⏳ Waiting on</div>
      <h1>Waiting <em>on others</em>.</h1>
      <p>Things you've handed off. Not your move until someone responds. Stale ones (${STALE_DAYS}+ days) are flagged in pink.</p>
    </div>
  `;
  root.appendChild(masthead);

  const waiting = waitingTasks()
    .sort((a, b) => (a.waitingSince || 0) - (b.waitingSince || 0));

  const card = document.createElement('div');
  card.className = 'candy';

  if (waiting.length === 0) {
    card.innerHTML = `
      <span class="card-label">Waiting on others</span>
      <div class="empty">Nothing's waiting on you. <span class="sparkle">★</span> Go outside.</div>
    `;
  } else {
    const stale = waiting.filter(t => daysSince(t.waitingSince) >= STALE_DAYS);
    const fresh = waiting.filter(t => daysSince(t.waitingSince) < STALE_DAYS);

    card.innerHTML = `<span class="card-label">Waiting on others · ${waiting.length}</span>`;

    if (stale.length > 0) {
      card.insertAdjacentHTML('beforeend', `
        <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--pink-deep);margin:14px 0 6px;font-weight:500;">
          Stale · ${STALE_DAYS}+ days
        </div>
      `);
      const staleList = document.createElement('ul');
      staleList.className = 'task-list';
      stale.forEach(t => staleList.appendChild(renderTaskRow(t)));
      card.appendChild(staleList);
    }

    if (fresh.length > 0) {
      card.insertAdjacentHTML('beforeend', `
        <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--mute);margin:18px 0 6px;font-weight:500;">
          Recent
        </div>
      `);
      const freshList = document.createElement('ul');
      freshList.className = 'task-list';
      fresh.forEach(t => freshList.appendChild(renderTaskRow(t)));
      card.appendChild(freshList);
    }
  }

  root.appendChild(card);
  return root;
}

/* ============================================================
   ONBOARDING WIZARD
   ============================================================ */
let wizStep = 0;
let wizData = {};

function openWizard() {
  wizStep = 0;
  wizData = {
    name: state.settings.name || '',
    clients: state.clients.slice(),
    orgs: state.orgs.slice()
  };
  renderWizard();
}

function renderWizard() {
  document.querySelectorAll('.wizard-backdrop').forEach(el => el.remove());

  const backdrop = document.createElement('div');
  backdrop.className = 'wizard-backdrop';

  const wiz = document.createElement('div');
  wiz.className = 'wizard';

  const totalSteps = 4;
  const progress = Array.from({ length: totalSteps }, (_, i) => {
    if (i < wizStep) return '<div class="wizard-dot done"></div>';
    if (i === wizStep) return '<div class="wizard-dot current"></div>';
    return '<div class="wizard-dot"></div>';
  }).join('');

  let body = '';
  let primary = 'Next →';
  let secondary = wizStep > 0 ? '← Back' : null;
  let canSkip = wizStep > 0 && wizStep < totalSteps - 1;

  if (wizStep === 0) {
    body = `
      <div class="wizard-step">Step 1 of ${totalSteps}</div>
      <h2>Welcome <em>in.</em></h2>
      <p class="wizard-intro">
        This is your planner. Pink, sharp, dry. Built around your actual life: client work, family, community, personal, and all the mortal paperwork in between.
      </p>
      <div class="wizard-body">
        <p style="font-family:'Fraunces',serif;font-size:15px;line-height:1.6;margin-bottom:12px;">
          Quick setup, takes about two minutes. You can skip any step and fill it in later.
        </p>
        <p style="font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--mute);line-height:1.5;">
          What would you like me to call you?
        </p>
        <input class="wizard-input" id="wizName" placeholder="Your name (optional)" value="${escapeHtml(wizData.name)}" style="margin-top:10px;">
      </div>
    `;
    primary = 'Next →';
  }

  else if (wizStep === 1) {
    body = `
      <div class="wizard-step">Step 2 of ${totalSteps} · Work</div>
      <h2>Your <em>clients.</em></h2>
      <p class="wizard-intro">
        Work is divided by client, so each one gets its own timer, unbilled tracker, and notes. Add the clients you've got right now. You can add more later.
      </p>
      <div class="wizard-body">
        <div style="display:flex;gap:8px;">
          <input class="wizard-input" id="wizClient" placeholder="Client name (e.g. Slater)" style="margin:0;">
          <button class="pill-btn butter" id="wizAddClient" style="flex-shrink:0;">Add</button>
        </div>
        <div class="wizard-tags" id="wizClientTags">
          ${wizData.clients.map(c => `
            <span class="wizard-tag">${escapeHtml(c.name)}<button data-id="${c.id}">✕</button></span>
          `).join('')}
          ${wizData.clients.length === 0 ? '<span class="wizard-note" style="margin:0;">No clients added yet.</span>' : ''}
        </div>
      </div>
    `;
    canSkip = true;
  }

  else if (wizStep === 2) {
    body = `
      <div class="wizard-step">Step 3 of ${totalSteps} · Community</div>
      <h2>Your <em>orgs.</em></h2>
      <p class="wizard-intro">
        Community work is divided by organisation. C31, a volunteer group, a board you sit on. Add what you remember. You can add more as they come to you.
      </p>
      <div class="wizard-body">
        <div style="display:flex;gap:8px;">
          <input class="wizard-input" id="wizOrg" placeholder="Org name (e.g. C31)" style="margin:0;">
          <button class="pill-btn butter" id="wizAddOrg" style="flex-shrink:0;">Add</button>
        </div>
        <div class="wizard-tags" id="wizOrgTags">
          ${wizData.orgs.map(o => `
            <span class="wizard-tag">${escapeHtml(o.name)}<button data-id="${o.id}">✕</button></span>
          `).join('')}
          ${wizData.orgs.length === 0 ? '<span class="wizard-note" style="margin:0;">No orgs added yet.</span>' : ''}
        </div>
      </div>
    `;
    canSkip = true;
  }

  else if (wizStep === 3) {
    const name = wizData.name || 'you';
    body = `
      <div class="wizard-step">Step 4 of ${totalSteps}</div>
      <h2>All <em>set.</em></h2>
      <p class="wizard-intro">
        Welcome in${wizData.name ? ', ' + escapeHtml(wizData.name) : ''}. The planner's ready.
      </p>
      <div class="wizard-body">
        <p style="font-family:'Fraunces',serif;font-size:15px;line-height:1.7;margin-bottom:10px;">
          <strong>What works right now:</strong> quick capture, the six modes, settings (reduced motion, calm mode), basic dashboard.
        </p>
        <p style="font-family:'Fraunces',serif;font-size:15px;line-height:1.7;margin-bottom:10px;">
          <strong>What's coming in the next chunks:</strong> task tiers (Now / Soon / Someday), waiting-on, per-mode views, calendars, notes, timers, invoicing.
        </p>
        <p style="font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--mute);margin-top:16px;line-height:1.5;">
          Anything you capture now will carry forward. This is a scaffolding build, not a throwaway.
        </p>
      </div>
    `;
    primary = 'Let me in ✦';
    secondary = '← Back';
    canSkip = false;
  }

  const actionsHTML = `
    <div class="wizard-actions">
      <div style="display:flex;gap:8px;">
        ${secondary ? `<button class="pill-btn" id="wizBack">${secondary}</button>` : ''}
      </div>
      <div style="display:flex;gap:8px;">
        ${canSkip ? `<button class="pill-btn" id="wizSkip">Skip</button>` : ''}
        <button class="pill-btn primary" id="wizNext">${primary}</button>
      </div>
    </div>
  `;

  wiz.innerHTML = `
    <div class="wizard-progress">${progress}</div>
    ${body}
    ${actionsHTML}
  `;

  backdrop.appendChild(wiz);
  document.body.appendChild(backdrop);

  attachWizardHandlers();
}

function attachWizardHandlers() {
  const wiz = document.querySelector('.wizard');
  if (!wiz) return;

  // Step 0: name
  const nameInput = wiz.querySelector('#wizName');
  if (nameInput) {
    nameInput.focus();
    nameInput.oninput = (e) => { wizData.name = e.target.value.trim(); };
    nameInput.onkeydown = (e) => { if (e.key === 'Enter') advanceWizard(); };
  }

  // Step 1: clients
  const clientInput = wiz.querySelector('#wizClient');
  const addClient = wiz.querySelector('#wizAddClient');
  if (clientInput && addClient) {
    const doAdd = () => {
      const v = clientInput.value.trim();
      if (!v) return;
      wizData.clients.push({ id: uid(), name: v, rate: '' });
      clientInput.value = '';
      renderWizard();
    };
    addClient.onclick = doAdd;
    clientInput.onkeydown = (e) => { if (e.key === 'Enter') doAdd(); };
    wiz.querySelectorAll('#wizClientTags button').forEach(b => {
      b.onclick = () => {
        wizData.clients = wizData.clients.filter(c => c.id !== b.dataset.id);
        renderWizard();
      };
    });
  }

  // Step 2: orgs
  const orgInput = wiz.querySelector('#wizOrg');
  const addOrg = wiz.querySelector('#wizAddOrg');
  if (orgInput && addOrg) {
    const doAdd = () => {
      const v = orgInput.value.trim();
      if (!v) return;
      wizData.orgs.push({ id: uid(), name: v });
      orgInput.value = '';
      renderWizard();
    };
    addOrg.onclick = doAdd;
    orgInput.onkeydown = (e) => { if (e.key === 'Enter') doAdd(); };
    wiz.querySelectorAll('#wizOrgTags button').forEach(b => {
      b.onclick = () => {
        wizData.orgs = wizData.orgs.filter(o => o.id !== b.dataset.id);
        renderWizard();
      };
    });
  }

  // Nav
  const nextBtn = wiz.querySelector('#wizNext');
  const backBtn = wiz.querySelector('#wizBack');
  const skipBtn = wiz.querySelector('#wizSkip');

  if (nextBtn) nextBtn.onclick = advanceWizard;
  if (backBtn) backBtn.onclick = () => {
    wizStep = Math.max(0, wizStep - 1);
    renderWizard();
  };
  if (skipBtn) skipBtn.onclick = advanceWizard;
}

function advanceWizard() {
  if (wizStep < 3) {
    wizStep++;
    renderWizard();
  } else {
    // Finish
    state.settings.name = wizData.name;
    state.clients = wizData.clients;
    state.orgs = wizData.orgs;
    state.onboarded = true;
    saveState();
    document.querySelectorAll('.wizard-backdrop').forEach(el => el.remove());
    render();
    toast('welcome in.');
  }
}

/* ============================================================
   MASTER RENDER
   ============================================================ */
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(renderTopbar());
  app.appendChild(renderModeBar());

  // 4c: Main content area is a landmark so assistive tech can jump to it.
  const main = document.createElement('main');
  main.className = 'app-main';
  main.id = 'main-content';
  main.setAttribute('tabindex', '-1');
  main.appendChild(renderGreeting());
  main.appendChild(renderQuickCapture());

  if (state.currentMode === 'dashboard') {
    main.appendChild(renderDashboard());
  } else if (state.currentMode === 'inbox') {
    main.appendChild(renderInboxView());
  } else if (state.currentMode === 'waiting') {
    main.appendChild(renderWaitingView());
  } else {
    main.appendChild(renderModeView(state.currentMode));
  }

  app.appendChild(main);

  // Install hint
  const hint = document.createElement('div');
  hint.className = 'install-hint';
  hint.innerHTML = `
    <strong>Installable as an app</strong>
    iPhone: Share → Add to Home Screen. Android/Desktop Chrome: install icon in the URL bar. Chromecast: Chrome menu → Cast.
  `;
  app.appendChild(hint);

  // Wire top-bar buttons
  document.getElementById('brandBtn').onclick = () => setMode('dashboard');
  document.getElementById('settingsBtn').onclick = openSettingsDrawer;

  applySettings();
}

/* ============================================================
   CLOCK TICK
   ============================================================ */
setInterval(() => {
  const clock = document.getElementById('clock');
  if (clock) clock.textContent = formatClock();
}, 30000);

/* ============================================================
   BOOT
   ============================================================ */
loadState();
applySettings();

if (!state.onboarded) {
  render();
  openWizard();
} else {
  render();
}

// PWA install prompt capture (silent)
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  window._installPrompt = e;
});
</script>
</body>
</html>
